<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Era 8 Command</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/kvk-theme.css">
  <style>
    body { background: var(--bg-deep); color: var(--text-primary); font-family: 'Barlow', sans-serif; margin: 0; padding: 0 1rem 3rem; }
    .wrap { max-width: 560px; margin: 0 auto; }
    .banner { background: rgba(212,168,67,0.08); border: 1px dashed var(--kvk-accent-dim); border-radius: 8px;
              padding: 9px 14px; font-size: 12.5px; color: var(--kvk-accent); text-align: center; margin: 22px 0;
              font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.5px; }
    .pcard { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 26px; }
    .phead { display: flex; align-items: center; gap: 16px; }
    .pav { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
           font-size: 30px; background: rgba(var(--kvk-accent-rgb),0.16); border: 1px solid var(--kvk-accent-dim); }
    .pname { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1.5px; line-height: 1; }
    .prole { color: var(--kvk-accent); font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
             letter-spacing: 1px; text-transform: uppercase; font-size: 12px; margin-top: 4px; }
    .rows { margin-top: 22px; border-top: 1px solid var(--border); }
    .row { display: flex; justify-content: space-between; padding: 12px 2px; border-bottom: 1px solid var(--border); font-size: 14px; }
    .row .k { color: var(--text-muted); font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.5px; text-transform: uppercase; font-size: 12px; }
    .row .v { color: var(--text-primary); }
    .actions { margin-top: 22px; display: flex; gap: 10px; }
    .btn { flex: 1; padding: 11px; border-radius: 8px; cursor: pointer; font-family: 'Barlow Condensed', sans-serif;
           font-weight: 700; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; border: 1px solid var(--border);
           background: var(--bg-card2); color: var(--text-secondary); }
    .btn.primary { background: var(--kvk-accent); color: var(--bg-deep); border-color: var(--kvk-accent); }
    .btn:hover { filter: brightness(1.08); }
    .note { color: var(--text-muted); font-size: 11.5px; margin-top: 14px; text-align: center; line-height: 1.5; }
  </style>
</head>
<body data-kvk="generic">
  <div class="wrap">
    <div class="banner">⚙ Preview build — profile is cosmetic; real account identity activates when hosted.</div>

    <div class="pcard">
      <div class="phead">
        <div class="pav" id="pav">🛡️</div>
        <div>
          <div class="pname" id="pname">Commander</div>
          <div class="prole" id="prole">Maintainer</div>
        </div>
      </div>

      <div class="rows">
        <div class="row"><span class="k">Username</span><span class="v" id="puser">—</span></div>
        <div class="row"><span class="k">Role</span><span class="v" id="prole2">—</span></div>
        <div class="row"><span class="k">Home Server</span><span class="v" id="psrv">—</span></div>
        <div class="row"><span class="k">Session</span><span class="v" id="pstate">—</span></div>
      </div>

      <div class="actions">
        <a class="btn primary" href="index.html">Open Admin Portal</a>
        <button class="btn" id="logoutBtn" type="button">Log Out</button>
      </div>
      <div class="note">Buttons render now; the log-out action wires to Auth.logout() at go-live.</div>
    </div>
  </div>

  <script src="../assets/auth.js"></script>
  <script src="../assets/site-header.js"></script>
  <script>
    (function () {
      var u = (window.Auth && Auth.currentUser) ? Auth.currentUser() : { displayName: 'Guest', avatar: '👤' };
      var set = function (id, v) { var el = document.getElementById(id); if (el) el.textContent = v; };
      document.getElementById('pav').textContent = u.avatar || '👤';
      set('pname', u.displayName || u.username || 'Commander');
      set('prole', u.role || '—');
      set('puser', u.username || '—');
      set('prole2', u.role || '—');
      set('psrv', u.server || '—');
      set('pstate', (window.Auth && Auth.isAuthed && Auth.isAuthed()) ? 'Signed in' : 'Guest (preview)');

      // PREVIEW: log-out is shown but not wired to a real session end.
      document.getElementById('logoutBtn').addEventListener('click', function () {
        // WIRE LATER: Auth.logout(); location.href = 'login.html';
        alert('Log-out activates when hosted (preview build).');
      });
    })();
  </script>
</body>
</html>
