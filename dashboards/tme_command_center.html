function genOppCode(name) {
  const m = name.match(/\d+/);
  return m ? `E#${m[0].padStart(3, "0")}` : "";
}

function towerIcon(towerStr) {
  const icons = [];
  if (towerStr.includes("Swordsman")) icons.push("\u2694\uFE0F");
  if (towerStr.includes("Pikeman")) icons.push("\uD83D\uDD31");
  if (towerStr.includes("Cavalry")) icons.push("\uD83D\uDC34");
  if (towerStr.includes("Archer")) icons.push("\uD83C\uDFF9");
  return icons.join(" ") || "\u2014";
}

/* ═══════════════════════════════════════════════════
   ZOOMABLE MAP WRAPPER
   ═══════════════════════════════════════════════════ */
function ZoomableMap({ children, resetLabel }) {
  const [scale, setScale] = useState(1);
  const [pan, setPan] = useState({ x: 0, y: 0 });
  const [dragging, setDragging] = useState(false);
  const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
  const containerRef = useRef(null);

  const handleWheel = useCallback((e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.15 : 0.15;
    setScale(s => Math.min(4, Math.max(1, s + delta)));
  }, []);

  useEffect(() => {
    const el = containerRef.current;
    if (el) { el.addEventListener("wheel", handleWheel, { passive: false }); return () => el.removeEventListener("wheel", handleWheel); }
  }, [handleWheel]);

  const onPointerDown = (e) => { setDragging(true); setDragStart({ x: e.clientX - pan.x, y: e.clientY - pan.y }); e.currentTarget.setPointerCapture(e.pointerId); };
  const onPointerMove = (e) => { if (dragging) setPan({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y }); };
  const onPointerUp = () => setDragging(false);
  const reset = () => { setScale(1); setPan({ x: 0, y: 0 }); };

  return (
    <div>
      <div style={{ display: "flex", gap: 6, marginBottom: 8, alignItems: "center" }}>
        <button onClick={() => setScale(s => Math.min(4, s + 0.3))} style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 4, color: "#fbbf24", width: 28, height: 28, fontSize: 16, cursor: "pointer", fontFamily: "monospace" }}>+</button>
        <button onClick={() => setScale(s => Math.max(1, s - 0.3))} style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 4, color: "#fbbf24", width: 28, height: 28, fontSize: 16, cursor: "pointer", fontFamily: "monospace" }}>{"\u2212"}</button>
        <button onClick={reset} style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 4, color: "#94a3b8", padding: "4px 10px", fontSize: 10, cursor: "pointer", fontFamily: "monospace" }}>{resetLabel||"Reset"}</button>
        <span style={{ fontSize: 10, color: "#64748b", marginLeft: 4 }}>{Math.round(scale * 100)}%</span>
      </div>
      <div ref={containerRef} onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerLeave={onPointerUp}
        style={{ overflow: "hidden", borderRadius: 8, border: "1px solid #1e3a5f", cursor: dragging ? "grabbing" : "grab", touchAction: "none" }}>
        <div style={{ transform: `translate(${pan.x}px, ${pan.y}px) scale(${scale})`, transformOrigin: "center center", transition: dragging ? "none" : "transform 0.15s ease" }}>
          {children}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   DIAMOND MAP
   ═══════════════════════════════════════════════════ */
function DiamondMap({ alliances, isDefense, t }) {
  const w = 820, h = 820;
  const cx = w / 2, cy = h / 2;
  const outerR = 300, innerR = 160, gateR = 62, towerDist = 90;

  const oN={x:cx,y:cy-outerR},oE={x:cx+outerR,y:cy},oS={x:cx,y:cy+outerR},oW={x:cx-outerR,y:cy};
  const iN={x:cx,y:cy-innerR},iE={x:cx+innerR,y:cy},iS={x:cx,y:cy+innerR},iW={x:cx-innerR,y:cy};
  const mid=(a,b)=>({x:(a.x+b.x)/2,y:(a.y+b.y)/2});
  const lerp=(a,b,t)=>({x:a.x+(b.x-a.x)*t,y:a.y+(b.y-a.y)*t});
  const poly=pts=>pts.map(p=>`${p.x},${p.y}`).join(" ");
  const oNE=mid(oN,oE),oSE=mid(oE,oS),oSW=mid(oS,oW),oNW=mid(oW,oN);
  const iNE=mid(iN,iE),iSE=mid(iE,iS),iSW=mid(iS,iW),iNW=mid(iW,iN);

  // NE line: split at 1/3 from N (outer=1/3, inner=2/3).
  // NW line: split at 2/3 from N so WC1 (outer) gets 2/3, AGC (inner) gets 1/3.
  const oNE3=lerp(oN,oE,1/3), iNE3=lerp(iN,iE,1/3);
  const oNW23=lerp(oN,oW,2/3), iNW23=lerp(iN,iW,2/3);

  const zones={
    "NE-outer":[oN,oNE3,iNE3,iN],         // 1/3 slice (AGC on def)
    "NE-inner":[oNE3,oE,iE,iNE3],          // 2/3 slice (WC1 on def)
    "SE-outer":[oSE,oS,iS,iSE],            // 1/2 (MyT)
    "SE-inner":[oE,oSE,iSE,iE],            // 1/2 (REU)
    "NW-outer":[oN,oNW23,iNW23,iN],        // 2/3 slice (WC1 on off)
    "NW-inner":[oNW23,oW,iW,iNW23],        // 1/3 slice (AGC on off)
    "SW-outer":[oSW,oS,iS,iSW],
    "SW-inner":[oW,oSW,iSW,iW],
  };
  const offRemap={"NE-outer":"NW-inner","NE-inner":"NW-outer","SE-outer":"SW-outer","SE-inner":"SW-inner"};
  const enemyKeys=isDefense?["NW-outer","NW-inner","SW-outer","SW-inner"]:["NE-outer","NE-inner","SE-outer","SE-inner"];
  const aZone=a=>{const k=isDefense?a.position:offRemap[a.position];return{key:k,pts:zones[k]};};
  const centroid=pts=>({x:pts.reduce((s,p)=>s+p.x,0)/pts.length,y:pts.reduce((s,p)=>s+p.y,0)/pts.length});

  const towerNames=[t.towerSword,t.towerArrow,t.towerCavalry,t.towerPike];
  const towers=[
    {label:towerNames[0],emoji:"\u2694\uFE0F",dir:"N",x:cx,y:cy-towerDist},
    {label:towerNames[1],emoji:"\uD83C\uDFF9",dir:"E",x:cx+towerDist,y:cy},
    {label:towerNames[2],emoji:"\uD83D\uDC34",dir:"S",x:cx,y:cy+towerDist},
    {label:towerNames[3],emoji:"\uD83D\uDD31",dir:"W",x:cx-towerDist,y:cy},
  ];

  const ga=Math.PI/4;
  const gates=[
    {x:cx+gateR*Math.cos(ga),y:cy+gateR*Math.sin(ga)},
    {x:cx+gateR*Math.cos(-ga),y:cy+gateR*Math.sin(-ga)},
    {x:cx+gateR*Math.cos(Math.PI+ga),y:cy+gateR*Math.sin(Math.PI+ga)},
    {x:cx+gateR*Math.cos(Math.PI-ga),y:cy+gateR*Math.sin(Math.PI-ga)},
  ];

  // Rally arrows originate from the NE and SE split points on inner diamond
  const rallyMids=isDefense?[iNE3,iSE]:[iNW23,iSW];

  // Rally leader markers — pushed into colored zones from the split point
  const rallyMarkers=[];
  const pushDist=0.22;
  if(isDefense){
    const a1=alliances.find(a=>a.position==="NE-outer"),a2=alliances.find(a=>a.position==="NE-inner");
    const a3=alliances.find(a=>a.position==="SE-outer"),a4=alliances.find(a=>a.position==="SE-inner");
    rallyMarkers.push({pt:lerp(iNE3,iN,pushDist),color:a1?.color||"#ef4444"});
    rallyMarkers.push({pt:lerp(iNE3,iE,pushDist),color:a2?.color||"#3b82f6"});
    rallyMarkers.push({pt:lerp(iSE,iS,pushDist),color:a3?.color||"#22c55e"});
    rallyMarkers.push({pt:lerp(iSE,iE,pushDist),color:a4?.color||"#f59e0b"});
  } else {
    const a1=alliances.find(a=>a.position==="NE-outer"),a2=alliances.find(a=>a.position==="NE-inner");
    const a3=alliances.find(a=>a.position==="SE-outer"),a4=alliances.find(a=>a.position==="SE-inner");
    // On offense: NE-outer(AGC) maps to NW-inner, NE-inner(WC1) maps to NW-outer (swapped)
    rallyMarkers.push({pt:lerp(iNW23,iW,pushDist),color:a1?.color||"#ef4444"});  // AGC inner
    rallyMarkers.push({pt:lerp(iNW23,iN,pushDist),color:a2?.color||"#3b82f6"});  // WC1 outer
    rallyMarkers.push({pt:lerp(iSW,iS,pushDist),color:a3?.color||"#22c55e"});
    rallyMarkers.push({pt:lerp(iSW,iW,pushDist),color:a4?.color||"#f59e0b"});
  }

  // WC1 rally leader point for gate-to-leader dashed line
  const wc1RallyLdrPt=isDefense?lerp(iNE3,iE,pushDist):lerp(iNW23,iN,pushDist);
  const wc1Gate=isDefense?gates[1]:gates[2]; // NE gate on defense, NW gate on offense

  // Siege markers — arrows only on defense; on offense show positions without arrows (enemy sieges us)
  const pb=28;
  const siegeMarkers=isDefense?[
    {x:oN.x-28,y:oN.y-pb,dir:"N",tag:"AGC",color:"#ef4444",targetX:mid(oN,oW).x+30,targetY:mid(oN,oW).y+30},
    {x:oN.x+28,y:oN.y-pb,dir:"N",tag:"WC1",color:"#3b82f6",targetX:mid(oN,oW).x+50,targetY:mid(oN,oW).y+10},
    {x:oS.x,y:oS.y+pb,dir:"S",tag:"MyT",color:"#22c55e",targetX:mid(oS,oW).x+30,targetY:mid(oS,oW).y-30},
    {x:oW.x-pb,y:oW.y-20,dir:"W",tag:"REU",color:"#f59e0b",targetX:oW.x+55,targetY:oW.y-10},
    {x:oW.x-pb,y:oW.y,dir:"W",tag:"WC1",color:"#3b82f6",targetX:oW.x+55,targetY:oW.y},
    {x:oW.x-pb,y:oW.y+20,dir:"W",tag:"AGC",color:"#ef4444",targetX:oW.x+55,targetY:oW.y+10},
    {x:wc1RallyLdrPt.x+18,y:wc1RallyLdrPt.y,dir:"NE",tag:"WC1",color:"#3b82f6",targetX:cx+gateR*Math.cos(-Math.PI/4),targetY:cy+gateR*Math.sin(-Math.PI/4)},
  ]:[
    {x:oN.x,y:oN.y-pb,dir:"N",tag:"",color:"#f87171"},
    {x:oW.x-pb,y:oW.y,dir:"W",tag:"",color:"#f87171"},
    {x:oS.x,y:oS.y+pb,dir:"S",tag:"",color:"#f87171"},
  ];

  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",maxWidth:620,margin:"0 auto",display:"block"}}>
      <defs>
        <radialGradient id="icGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stopColor="#fbbf24" stopOpacity="0.3"/><stop offset="100%" stopColor="#fbbf24" stopOpacity="0"/></radialGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <marker id="arrY" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/></marker>
        <marker id="arrSiege" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f87171"/></marker>
      </defs>

      {/* Outer boundary */}
      <polygon points={poly([oN,oE,oS,oW])} fill="none" stroke="#dc2626" strokeWidth="2" strokeDasharray="8,4" opacity="0.5"/>

      {/* Enemy zones */}
      {enemyKeys.map(k=><polygon key={`ez-${k}`} points={poly(zones[k])} fill="#64748b" opacity="0.04"/>)}

      {/* Alliance zones */}
      {alliances.map(a=>{const{pts}=aZone(a);return <polygon key={`az-${a.tag}`} points={poly(pts)} fill={a.color} opacity="0.15" stroke={a.color} strokeWidth="1" strokeOpacity="0.3"/>;
      })}

      {/* Split lines */}
      {(isDefense?[[oNE3,iNE3],[oSE,iSE]]:[[oNW23,iNW23],[oSW,iSW]]).map(([a,b],i)=>(
        <line key={`sp${i}`} x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke="#e2e8f0" strokeWidth="1" strokeDasharray="5,4" opacity="0.3"/>
      ))}

      {/* Inner diamond */}
      <polygon points={poly([iN,iE,iS,iW])} fill="#1e293b" fillOpacity="0.35" stroke="#3b82f6" strokeWidth="2"/>

      {/* Gate ring */}
      <circle cx={cx} cy={cy} r={gateR} fill="none" stroke="#94a3b8" strokeWidth="2.5" strokeDasharray="6,3"/>
      {gates.map((g,i)=><rect key={`g${i}`} x={g.x-5} y={g.y-5} width="10" height="10" rx="2" fill="#475569" stroke="#94a3b8" strokeWidth="1.5"/>)}

      {/* Rally leader markers — triangles pushed into zones */}
      {rallyMarkers.map((m,i)=>{
        const dx=cx-m.pt.x,dy=cy-m.pt.y;
        const ang=Math.atan2(dy,dx);
        const size=8;
        const p1={x:m.pt.x+Math.cos(ang)*size,y:m.pt.y+Math.sin(ang)*size};
        const p2={x:m.pt.x+Math.cos(ang+2.3)*size,y:m.pt.y+Math.sin(ang+2.3)*size};
        const p3={x:m.pt.x+Math.cos(ang-2.3)*size,y:m.pt.y+Math.sin(ang-2.3)*size};
        const labelDx=Math.cos(ang+Math.PI)*24,labelDy=Math.sin(ang+Math.PI)*24;
        return (
          <g key={`rm${i}`}>
            <polygon points={`${p1.x},${p1.y} ${p2.x},${p2.y} ${p3.x},${p3.y}`} fill={m.color} opacity="0.9" stroke="#0f172a" strokeWidth="1"/>
            <text x={m.pt.x+labelDx} y={m.pt.y+labelDy} fontSize="10" fill={m.color} fontFamily="monospace" fontWeight="bold" textAnchor="middle" dominantBaseline="middle" opacity="0.9">{t.mapRallyLeader}</text>
          </g>
        );
      })}

      {/* Siege markers — arrows on defense, static "Siege Defense" on offense */}
      {isDefense&&siegeMarkers.map((s,i)=>{
        const dx=s.targetX-s.x,dy=s.targetY-s.y;
        const len=Math.sqrt(dx*dx+dy*dy)||1;
        const nx=dx/len,ny=dy/len;
        const ax=s.x+nx*18,ay=s.y+ny*18;
        const bx=s.targetX-nx*8,by=s.targetY-ny*8;
        const isGateMarker = s.dir==="NE"||s.dir==="NW";
        const lx=isGateMarker ? s.x : s.x-nx*22;
        const ly=isGateMarker ? s.y+16 : s.y-ny*22;
        return(
          <g key={`sm${i}`}>
            <line x1={ax} y1={ay} x2={bx} y2={by} stroke={s.color} strokeWidth="2" strokeDasharray="4,3" opacity="0.6" markerEnd="url(#arrSiege)"/>
            <polygon points={`${s.x},${s.y-9} ${s.x+8},${s.y} ${s.x},${s.y+9} ${s.x-8},${s.y}`} fill={s.color} opacity="0.85" stroke="#0f172a" strokeWidth="1.5"/>
            <text x={lx} y={isGateMarker?ly:ly-6} fontSize="10" fill={s.color} fontFamily="monospace" fontWeight="bold" textAnchor="middle" opacity="0.9">{t.mapSiegeLeader}</text>
            <text x={lx} y={isGateMarker?ly+13:ly+7} fontSize="11" fill={s.color} fontFamily="monospace" fontWeight="bold" textAnchor="middle" opacity="0.9">{s.tag}</text>
          </g>
        );
      })}
      {!isDefense&&siegeMarkers.map((s,i)=>(
        <g key={`smd${i}`}>
          <polygon points={`${s.x},${s.y-9} ${s.x+8},${s.y} ${s.x},${s.y+9} ${s.x-8},${s.y}`} fill={s.color} opacity="0.6" stroke="#0f172a" strokeWidth="1.5"/>
          <text x={s.x} y={s.y+20} fontSize="8" fill={s.color} fontFamily="monospace" fontWeight="bold" textAnchor="middle" opacity="0.7">{t.mapSiegeDef}</text>
        </g>
      ))}


      {/* Rally arrows — two segments: rally leader → gate → IC */}
      {rallyMids.map((from,i)=>{
        // Find the nearest gate to this rally start point
        const gateIdx = isDefense ? (i===0 ? 1 : 0) : (i===0 ? 2 : 3); // def: NE=gate1, SE=gate0; off: NW=gate2, SW=gate3
        const gate = gates[gateIdx];

        // Segment 1: from rally start to gate
        const dx1=gate.x-from.x, dy1=gate.y-from.y;
        const len1=Math.sqrt(dx1*dx1+dy1*dy1)||1;
        const nx1=dx1/len1, ny1=dy1/len1;
        const s1x=from.x-nx1*8, s1y=from.y-ny1*8;
        const e1x=gate.x-nx1*8, e1y=gate.y-ny1*8;
        const m1x=(s1x+e1x)/2, m1y=(s1y+e1y)/2;

        // Segment 2: from gate to IC center
        const dx2=cx-gate.x, dy2=cy-gate.y;
        const len2=Math.sqrt(dx2*dx2+dy2*dy2)||1;
        const nx2=dx2/len2, ny2=dy2/len2;
        const s2x=gate.x+nx2*8, s2y=gate.y+ny2*8;
        const e2x=cx, e2y=cy;

        return (
          <g key={`r${i}`}>
            {/* Segment 1: to gate — no arrowhead */}
            <line x1={s1x} y1={s1y} x2={e1x} y2={e1y} stroke="#fbbf24" strokeWidth="2.5" strokeDasharray="6,4" opacity="0.9"/>
            {/* Segment 2: gate to IC */}
            <line x1={s2x} y1={s2y} x2={e2x} y2={e2y} stroke="#fbbf24" strokeWidth="2.5" strokeDasharray="6,4" markerEnd="url(#arrY)" opacity="0.9"/>
            {/* Label on segment 1 — NE line: left side, SE line: right side */}
            <text x={m1x+(i===0?-1:1)*ny1*18} y={m1y-(i===0?-1:1)*nx1*18} fontSize="10" fill="#fbbf24" fontFamily="monospace" fontWeight="bold" textAnchor="middle" dominantBaseline="middle">{t.mapRally}</text>
          </g>
        );
      })}

      {/* WC1 rally leader — gate connection */}
      {(()=>{
        const dx=wc1Gate.x-wc1RallyLdrPt.x, dy=wc1Gate.y-wc1RallyLdrPt.y;
        const len=Math.sqrt(dx*dx+dy*dy)||1;
        const nx=dx/len, ny=dy/len;
        return <line x1={wc1RallyLdrPt.x+nx*12} y1={wc1RallyLdrPt.y+ny*12} x2={wc1Gate.x-nx*8} y2={wc1Gate.y-ny*8} stroke="#fbbf24" strokeWidth="2" strokeDasharray="5,4" opacity="0.8"/>;
      })()}

      {/* IC */}
      <circle cx={cx} cy={cy} r="36" fill="url(#icGlow)"/>
      <circle cx={cx} cy={cy} r="18" fill="#1e293b" stroke="#fbbf24" strokeWidth="2.5" filter="url(#glow)"/>
      <text x={cx} y={cy+1} textAnchor="middle" dominantBaseline="middle" fill="#fbbf24" fontSize="9" fontWeight="bold" fontFamily="monospace">IC</text>

      {/* Towers */}
      {towers.map(tw=>(
        <g key={tw.dir}>
          <circle cx={tw.x} cy={tw.y} r="14" fill="#1e293b" stroke="#64748b" strokeWidth="1.5"/>
          <text x={tw.x} y={tw.y-1} textAnchor="middle" dominantBaseline="middle" fontSize="11">{tw.emoji}</text>
          <text x={tw.x} y={tw.y+16} textAnchor="middle" fontSize="7" fill="#94a3b8" fontFamily="monospace">{tw.label} ({tw.dir})</text>
        </g>
      ))}

      {/* Entry labels */}
      {[{l:"NE",p:oNE,a:isDefense,ox:14,oy:-14},{l:"SE",p:oSE,a:isDefense,ox:14,oy:14},{l:"SW",p:oSW,a:!isDefense,ox:-14,oy:14},{l:"NW",p:oNW,a:!isDefense,ox:-14,oy:-14}].map(ep=>(
        <g key={ep.l}><circle cx={ep.p.x} cy={ep.p.y} r="4" fill={ep.a?"#4ade80":"#475569"} opacity={ep.a?0.8:0.3}/><text x={ep.p.x+ep.ox} y={ep.p.y+ep.oy} textAnchor="middle" fontSize="10" fontFamily="monospace" fontWeight="bold" fill={ep.a?"#4ade80":"#475569"}>{ep.l}</text></g>

      );})}

      {/* Legend */}
      <g transform="translate(8,8)">

        <line x1="8" y1="68" x2="18" y2="68" stroke="#3b82f6" strokeWidth="2"/><text x="24" y="71" fontSize="7.5" fill="#94a3b8" fontFamily="monospace">{t.mapICZone}</text>
        <rect x="8" y="78" width="10" height="10" rx="2" fill="#475569" stroke="#94a3b8" strokeWidth="1"/><text x="24" y="86" fontSize="7.5" fill="#94a3b8" fontFamily="monospace">{t.mapGates}</text>
        <polygon points="8,98 13,92 18,98" fill="#4ade80" opacity="0.8"/><text x="24" y="99" fontSize="7.5" fill="#94a3b8" fontFamily="monospace">{t.mapRallyStaging}</text>
      </g>
    </svg>
  );
}

function PrepChart({stages,t,totalOur,totalOpp}){
  const mx=Math.max(...stages.map(s=>Math.max(s.ourPts,s.oppPts)),totalOur,totalOpp);
  const icon=s=>{if(s.ourPts===0&&s.oppPts===0)return"\u2014";return s.ourPts>=s.oppPts?"\u2705":"\u274C";};
  return(<div style={{display:"flex",flexDirection:"column",gap:10}}>{stages.map((s,i)=>(<div key={i}><div style={{fontSize:12,color:"#cbd5e1",fontFamily:"monospace",marginBottom:3}}>{icon(s)} {t[s.nameKey]||s.nameKey}</div><div style={{display:"flex",gap:4,alignItems:"center"}}><span style={{fontSize:10,color:"#60a5fa",width:40,textAlign:"right",fontFamily:"monospace"}}>{s.ourPts}B</span><div style={{flex:1}}><div style={{height:14,width:`${mx>0?(s.ourPts/mx)*100:0}%`,background:"linear-gradient(90deg,#1e40af,#3b82f6)",borderRadius:3}}/></div></div><div style={{display:"flex",gap:4,alignItems:"center"}}><span style={{fontSize:10,color:"#f87171",width:40,textAlign:"right",fontFamily:"monospace"}}>{s.oppPts}B</span><div style={{flex:1}}><div style={{height:14,width:`${mx>0?(s.oppPts/mx)*100:0}%`,background:"linear-gradient(90deg,#991b1b,#ef4444)",borderRadius:3}}/></div></div></div>))}
    <div style={{borderTop:"1px solid #334155",marginTop:6,paddingTop:10}}>
      <div style={{fontSize:12,color:"#e2e8f0",fontFamily:"monospace",marginBottom:3,fontWeight:700}}>{totalOur>=totalOpp?"\u2705":"\u274C"} {t.colTotal}</div>
      <div style={{display:"flex",gap:4,alignItems:"center"}}><span style={{fontSize:10,color:"#60a5fa",width:40,textAlign:"right",fontFamily:"monospace"}}>{totalOur}B</span><div style={{flex:1}}><div style={{height:14,width:`${mx>0?(totalOur/mx)*100:0}%`,background:"linear-gradient(90deg,#1e40af,#3b82f6)",borderRadius:3}}/></div></div>
      <div style={{display:"flex",gap:4,alignItems:"center"}}><span style={{fontSize:10,color:"#f87171",width:40,textAlign:"right",fontFamily:"monospace"}}>{totalOpp}B</span><div style={{flex:1}}><div style={{height:14,width:`${mx>0?(totalOpp/mx)*100:0}%`,background:"linear-gradient(90deg,#991b1b,#ef4444)",borderRadius:3}}/></div></div>
    </div>
  </div>);
}

function fmt(str){const n=parseInt(String(str).replace(/,/g,""),10);if(n>=1e9)return(n/1e9).toFixed(2)+"B";if(n>=1e6)return(n/1e6).toFixed(1)+"M";return str;}
function sumF(arr,f){return arr.reduce((s,a)=>s+(parseInt(String(a[f]).replace(/,/g,""),10)||0),0);}
function fmtN(n){if(n>=1e9)return(n/1e9).toFixed(2)+"B";if(n>=1e6)return(n/1e6).toFixed(1)+"M";return n.toLocaleString();}
function mpRatio(merits,power){const m=parseInt(String(merits).replace(/,/g,""),10)||0;const p=parseInt(String(power).replace(/,/g,""),10)||1;return((m/p)*100).toFixed(1)+"%";}

function TMECommandCenter(){
  const[config,setConfig]=useState(DEFAULT_CONFIG);
  const[activeTab,setActiveTab]=useState("overview");
  const[uiLang,setUiLang]=useState("en");
  const[t,setT]=useState(EN);
  const[mapViewOverride,setMapViewOverride]=useState(null);

  const isDefense=config.totalOur < config.totalOpp;
  const mapIsDefense=mapViewOverride!==null?mapViewOverride:isDefense;
  const oppCode=genOppCode(config.oppServer);

  const parseNum=s=>parseInt(String(s).replace(/,/g,""),10)||0;
  const tpOffsetByRank=[-30,-20,-10,0];
  const computedAlliances=(()=>{
    const m=config.invasionTime.match(/(\d{1,2}):(\d{2})/);
    const baseMin=(m?parseInt(m[1],10):11)*60+(m?parseInt(m[2],10):0);
    const tz=config.invasionTime.replace(/\d{1,2}:\d{2}\s*/,"").trim()||"UTC";
    const pad=n=>String(n).padStart(2,"0");
    const fmt=mins=>{const h=Math.floor(((mins%1440)+1440)%1440/60);const mn=((mins%60)+60)%60;return`${pad(h)}:${pad(mn)} ${tz}`;};
    const sorted=[...config.alliances].sort((a,b)=>parseNum(b.prepPoints)-parseNum(a.prepPoints));
    const rankMap={};sorted.forEach((a,i)=>{rankMap[a.tag]=i;});
    return config.alliances.map(a=>({...a,prepRank:rankMap[a.tag]+1,teleportTime:fmt(baseMin+tpOffsetByRank[rankMap[a.tag]])}));
  })();
  const computedOppAlliances=(()=>{
    const sorted=[...config.oppAlliances].sort((a,b)=>parseNum(b.prepPoints)-parseNum(a.prepPoints));
    const m=config.invasionTime.match(/(\d{1,2}):(\d{2})/);
    const baseMin=(m?parseInt(m[1],10):11)*60+(m?parseInt(m[2],10):0);
    const tz=config.invasionTime.replace(/\d{1,2}:\d{2}\s*/,"").trim()||"UTC";
    const pad=n=>String(n).padStart(2,"0");
    const fmt=mins=>{const h=Math.floor(((mins%1440)+1440)%1440/60);const mn=((mins%60)+60)%60;return`${pad(h)}:${pad(mn)} ${tz}`;};
    return sorted.map((a,i)=>({...a,prepRank:i+1,teleportTime:fmt(baseMin+tpOffsetByRank[i])}));
  })();

  const handleLang=useCallback((code)=>{
    setT(TRANSLATIONS[code]||EN);
    setUiLang(code);
  },[]);


  const byRank=computedAlliances.slice().sort((a,b)=>a.prepRank-b.prepRank);
  const tlPhases=(()=>{
    const allianceDescKey=(tag)=>{
      const idx=config.alliances.findIndex(a=>a.tag===tag);
      const tlIdx=idx+1;
      return(!isDefense&&t[`tl${tlIdx}DescOff`])||t[`tl${tlIdx}Desc`];
    };
    return[
      {phase:t.tl0Phase,desc:t.tl0Desc},
      {phase:`${byRank[0]?.tag} Teleports`,desc:allianceDescKey(byRank[0]?.tag)},
      {phase:`${byRank[1]?.tag} Teleports`,desc:allianceDescKey(byRank[1]?.tag)},
      {phase:`${byRank[2]?.tag} Teleports`,desc:allianceDescKey(byRank[2]?.tag)},
      {phase:`${t.tl4Phase.replace(/\+\s*\w+/,`+ ${byRank[3]?.tag}`)}`,desc:allianceDescKey(byRank[3]?.tag)},
      {phase:t.tl5Phase,desc:(!isDefense&&t.tl5DescOff)||t.tl5Desc},
      {phase:t.tl6Phase,desc:t.tl6Desc},
      {phase:t.tl7Phase,desc:t.tl7Desc},
      {phase:t.tl8Phase,desc:t.tl8Desc},
    ];
  })();
  const tlTimesCalc=()=>{
    const m=config.invasionTime.match(/(\d{1,2}):(\d{2})/);
    const baseMin=(m?parseInt(m[1],10):11)*60+(m?parseInt(m[2],10):0);
    const tz=config.invasionTime.replace(/\d{1,2}:\d{2}\s*/,"").trim()||"UTC";
    const pad=n=>String(n).padStart(2,"0");
    const fmt=mins=>{const h=Math.floor(((mins%1440)+1440)%1440/60);const mn=((mins%60)+60)%60;return`${pad(h)}:${pad(mn)} ${tz}`;};
    return[
      fmt(baseMin-120),
      fmt(baseMin-30),
      fmt(baseMin-20),
      fmt(baseMin-10),
      fmt(baseMin),
      fmt(baseMin),
      fmt(baseMin+5),
      `${fmt(baseMin)}\u2013${fmt(baseMin+240)}`,
      `${fmt(baseMin+240)}\u2013${fmt(baseMin+360)}`,
    ];
  };
  const tlTimes=tlTimesCalc();

  const tabs=[
    {id:"overview",label:`\uD83D\uDCCB ${t.tabOverview}`},{id:"map",label:`\uD83D\uDDFA\uFE0F ${t.tabMap}`},

        <div style={{fontSize:13,color:"#94a3b8",marginTop:4}}>
          <span style={{color:"#60a5fa",fontWeight:700}}>Era 8 (E#008)</span> {"\u2694\uFE0F"}{" "}
          <span style={{color:"#f87171",fontWeight:700}}>{config.oppServer} ({oppCode})</span> {"\u00B7"}{" "}
          <span style={{color:isDefense?"#f59e0b":"#4ade80"}}>{isDefense?`\uD83D\uDEE1\uFE0F ${t.defending}`:`\u2694\uFE0F ${t.attacking}`}</span>
        </div>
        <div style={{fontSize:11,color:"#64748b",marginTop:4}}>{t.invasionLabel} {"\u00B7"} {config.invasionTime}</div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",background:"#0f172a",borderBottom:"1px solid #1e3a5f",padding:"0 8px"}}>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div style={{fontSize:11,color:"#94a3b8"}}>{t.oppServerLabel}<div style={{color:"#e2e8f0",fontSize:12,marginTop:2}}>{config.oppServer}</div></div>
              <div style={{fontSize:11,color:"#94a3b8"}}>{t.invTimeLabel}<div style={{color:"#e2e8f0",fontSize:12,marginTop:2}}>{config.invasionTime}</div></div>
            </div>
            <div style={{fontSize:11,color:isDefense?"#f87171":"#4ade80",marginTop:10,fontWeight:700}}>
              {isDefense?"\uD83D\uDEE1\uFE0F Defending":"\u2694\uFE0F Attacking"} (auto: {config.totalOur} vs {config.totalOpp})
            </div>
          </div>
        </>)}

        {activeTab==="map"&&(<>
          <div style={card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontSize:13,fontWeight:700,color:"#fbbf24"}}>{"\uD83D\uDDFA\uFE0F"} {t.battlefield} {"\u2014"} {mapIsDefense?t.defPositions:t.offPositions}</div>
              <button onClick={()=>setMapViewOverride(v=>v===null?!isDefense:v===isDefense?!isDefense:null)} style={{padding:"4px 12px",fontSize:10,background:mapViewOverride!==null?"#1e3a5f":"#0f172a",border:"1px solid #334155",borderRadius:4,color:mapViewOverride!==null?"#fbbf24":"#64748b",cursor:"pointer",fontFamily:"monospace"}}>{mapIsDefense?"\uD83D\uDEE1\uFE0F DEF":"\u2694\uFE0F ATK"}</button>
            </div>
            <div style={{fontSize:10,color:"#94a3b8",marginBottom:12}}>{t.mapDesc}</div>
            <ZoomableMap resetLabel={t.mapReset}>
              <DiamondMap alliances={computedAlliances} isDefense={mapIsDefense} t={t}/>
            </ZoomableMap>
          </div>
          <div style={card}>
            <div style={{fontSize:13,fontWeight:700,color:"#fbbf24",marginBottom:8}}>{"\uD83C\uDFD7\uFE0F"} {t.towerAssign}</div>
            {computedAlliances.map((a,i)=>(
              <div key={a.tag} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:i<3?"1px solid #1e3a5f":"none"}}>
                <span style={{color:a.color,fontWeight:700,fontSize:12}}>{a.tag}</span>
                <span style={{fontSize:11,color:"#cbd5e1"}}>{towerIcon(a.tower)} {a.tower}</span>
              </div>
            ))}
            <div style={{fontSize:10,color:"#f59e0b",marginTop:8}}>{"\u26A0\uFE0F"} {isDefense?t.towerWarn:t.towerWarnOff}</div>
          </div>
          <div style={{...card,opacity:isDefense?1:0.4}}>
            <div style={{fontSize:13,fontWeight:700,color:isDefense?"#fbbf24":"#64748b",marginBottom:8}}>{"\uD83D\uDCA3"} {t.warMachines}</div>
            {!isDefense&&<div style={{fontSize:11,color:"#f59e0b",marginBottom:8,textAlign:"center"}}>{"\u26A0\uFE0F"} {t.siegeWarn}</div>}
            <div style={{display:"grid",gridTemplateColumns:"auto 1fr 1fr 1fr",gap:"6px 16px",fontSize:11}}>
              <div></div><div style={{color:"#94a3b8",textAlign:"center"}}>Trebs (12)</div><div style={{color:"#94a3b8",textAlign:"center"}}>Rams (3)</div><div style={{color:"#94a3b8",textAlign:"center"}}>Esc (3)</div>
              {computedAlliances.map(a=>[
                <div key={`l${a.tag}`} style={{color:a.color,fontWeight:700}}>{a.tag}</div>,
                <div key={`t${a.tag}`} style={{textAlign:"center",color:"#cbd5e1"}}>12</div>,
                <div key={`r${a.tag}`} style={{textAlign:"center",color:"#cbd5e1"}}>3</div>,
                <div key={`e${a.tag}`} style={{textAlign:"center",color:"#cbd5e1"}}>3</div>,
              ])}
            </div>
            <div style={{fontSize:10,color:"#94a3b8",marginTop:8,lineHeight:1.6}}>{t.siegeDesc}</div>
            <div style={{fontSize:10,color:"#64748b",marginTop:4}}>{t.siegeStats}</div>
            {isDefense&&<div style={{fontSize:10,color:"#f59e0b",marginTop:6}}>{"\u26A0\uFE0F"} {t.siegeWarn}</div>}
          </div>
          <div style={card}>
            <div style={{fontSize:13,fontWeight:700,color:"#fbbf24",marginBottom:8}}>{"\uD83C\uDFDB\uFE0F"} {t.icHoldTitle}</div>
            <ul style={{margin:0,paddingLeft:18,fontSize:11,color:"#cbd5e1",lineHeight:1.8}}>
              <li>{t.icHoldRule1}</li><li>{t.icHoldRule2}</li><li>{t.icHoldRule3}</li>
            </ul>
          </div>
        </>)}

        {activeTab==="timeline"&&(
          <div style={card}>
            <div style={{fontSize:13,fontWeight:700,color:"#fbbf24",marginBottom:12}}>{"\u23F1\uFE0F"} {isDefense?t.defTimeline:t.offTimeline}</div>
            {tlPhases.map((ph,i)=>{
              const tlColor=i>=1&&i<=4?byRank[i-1]?.color||PHASE_COLORS[i]:PHASE_COLORS[i]||"#94a3b8";
              return(
              <div key={i} style={{display:"flex",gap:12,marginBottom:16}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:20,flexShrink:0}}>
                  <div style={{width:10,height:10,borderRadius:"50%",background:tlColor,border:"2px solid #0f172a",boxShadow:`0 0 6px ${tlColor}`}}/>
                  {i<tlPhases.length-1&&<div style={{width:2,flex:1,background:"#1e3a5f",marginTop:2}}/>}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,color:"#fbbf24",fontWeight:700,letterSpacing:1}}>{tlTimes[i]}</div>
                  <div style={{fontSize:12,fontWeight:700,color:tlColor,margin:"2px 0"}}>{ph.phase}</div>
                  <div style={{fontSize:11,color:"#94a3b8",lineHeight:1.5}}>{ph.desc}</div>
                </div>
              </div>);
            })}
          </div>
        )}

        {activeTab==="prep"&&(<>
          <div style={card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <div style={{fontSize:13,fontWeight:700,color:"#fbbf24"}}>{"\uD83D\uDCCA"} {t.prepResults}</div>
              <div style={{fontSize:9,color:"#64748b",fontFamily:"monospace"}}>Updated: {config.prepLastUpdated}</div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:12,fontSize:12}}>
              <span><span style={{color:"#60a5fa"}}>{"\u25A0"}</span> Era 8: <strong>{config.totalOur}B</strong></span>
              <span><span style={{color:"#f87171"}}>{"\u25A0"}</span> {config.oppServer}: <strong>{config.totalOpp}B</strong></span>
            </div>
            <PrepChart stages={config.prepStages} t={t} totalOur={config.totalOur} totalOpp={config.totalOpp}/>
          </div>
          <div style={card}>
            <div style={{fontSize:13,fontWeight:700,color:"#fbbf24",marginBottom:4}}>{"\uD83D\uDCC5"} {t.stageSchedule||"PREP STAGE SCHEDULE"}</div>
            {/* column headers */}
            <div style={{display:"grid",gridTemplateColumns:"40% 60%",gap:8,padding:"0 2px 4px",borderBottom:"1px solid #1e3a5f",marginBottom:8}}>
              <div style={{fontSize:9,color:"#64748b",letterSpacing:1,textTransform:"uppercase"}}>{t.prepColHead||"Prep ahead"}</div>
              <div style={{fontSize:9,color:"#64748b",letterSpacing:1,textTransform:"uppercase"}}>{t.stageColHead||"Stage & how to score"}</div>
            </div>
            {STAGE_SCHEDULE.map((s)=>{
              const stg=s.stageIdx>=1?config.prepStages[s.stageIdx-1]:null;
              const active=stg&&(stg.ourPts>0||stg.oppPts>0);
              const prepTxt=s.prepKey?(t[s.prepKey]??s.prepKey):"";
              const kingTxt=s.kingBuffKey?(t[s.kingBuffKey]??""):"";
              const empty=!s.methodKeys.length;
              return(
                <div key={s.nameKey} style={{display:"grid",gridTemplateColumns:"40% 60%",gap:8,alignItems:"stretch",marginBottom:8}}>
                  {/* LEFT: prep-ahead instructions for the coming day(s) */}
                  <div style={{fontSize:11,lineHeight:1.5,color:prepTxt?"#a7f3d0":"#475569",background:"#0b1220",borderRadius:6,border:"1px dashed #1e3a5f",padding:"8px 10px",display:"flex",alignItems:"center",fontStyle:prepTxt?"normal":"italic"}}>
                    {prepTxt||(t.prepNone||"\u2014")}
                  </div>
                  {/* RIGHT: the day's stage + how to score */}
                  <div style={{padding:"8px 10px",background:active?"#0f172a":"transparent",borderRadius:6,borderLeft:`3px solid ${active?s.color:"#1e3a5f"}`,opacity:active?1:(empty?0.55:0.72)}}>
                    <div style={{display:"flex",alignItems:"baseline",gap:8,flexWrap:"wrap",marginBottom:4}}>
                      <span style={{fontSize:11,color:"#64748b",fontFamily:"monospace"}}>{s.date}</span>
                      <span style={{fontSize:13,fontWeight:700,color:s.color}}>{t.stageWord||"Stage"} {s.stageIdx}: {t[s.nameKey]}</span>
                      {active&&<span style={{fontSize:9,color:"#fbbf24",border:"1px solid #fbbf24",borderRadius:3,padding:"0 5px"}}>{t.stageScored||"scored"}</span>}
                    </div>
                    {kingTxt&&<div style={{fontSize:10,lineHeight:1.5,color:"#fcd34d",background:"rgba(251,191,36,0.08)",border:"1px solid rgba(251,191,36,0.3)",borderRadius:4,padding:"4px 7px",marginBottom:6}}>{"\uD83D\uDC51"} {kingTxt}</div>}
                    {empty
                      ? <div style={{fontSize:10,color:"#475569",fontStyle:"italic"}}>{t.stageNoMethods||"\u2014"}</div>
                      : <ul style={{margin:0,paddingLeft:18}}>{s.methodKeys.map((mk,j)=>(<li key={j} style={{fontSize:11,lineHeight:1.6,color:"#cbd5e1"}}>{t[mk]||mk}</li>))}</ul>}
                  </div>
                </div>
              );
            })}
            <div style={{fontSize:9,color:"#64748b",marginTop:2}}>{t.stageScheduleNote||"One stage per day during the Preparation phase. Point methods are the same for both servers \u2014 out-earn them each day."}</div>
          </div>
          <div style={card}>
            <div style={{fontSize:13,fontWeight:700,color:"#fbbf24",marginBottom:10}}>{"\uD83C\uDFC6"} TME ALLIANCE RANKINGS</div>
            <div style={{fontSize:9,color:"#64748b",marginBottom:8}}>Teleport offset: #1 per server = 30min early, #2 = 20min, #3 = 10min, #4 = event start</div>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"2px 8px",marginBottom:4}}>
              <div style={{width:20}}></div>
              <div style={{fontSize:9,color:"#64748b",width:40}}>Tag</div>
              <div style={{fontSize:9,color:"#64748b",flex:1}}>Prep Pts</div>
              <div style={{fontSize:9,color:"#64748b",textAlign:"right"}}>{t.invTimeLabel}</div>
            </div>
            {[...computedAlliances.map(a=>({...a,server:"era8"})),...computedOppAlliances.map(a=>({...a,server:"era38"}))].sort((a,b)=>parseNum(b.prepPoints)-parseNum(a.prepPoints)).map((a,i)=>(
              <div key={`${a.tag}-${i}`} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 8px",background:i%2===0?"#0f172a":"transparent",borderRadius:4,borderLeft:`3px solid ${a.server==="era8"?"#60a5fa":"#f87171"}`,marginBottom:2}}>
                <div style={{fontSize:14,fontWeight:800,color:"#fbbf24",width:20,textAlign:"center"}}>#{i+1}</div>
                <div style={{fontSize:12,fontWeight:700,color:a.server==="era8"?"#60a5fa":"#f87171",width:40}}>{a.tag}</div>
                <div style={{fontSize:10,color:"#cbd5e1",flex:1}}>{fmt(a.prepPoints)}</div>
                <div style={{fontSize:10,color:a.server==="era8"?"#60a5fa":"#f87171",fontFamily:"monospace"}}>{a.teleportTime} (#{a.prepRank})</div>
              </div>
            ))}
          </div>
        </>)}

        {activeTab==="roles"&&(<>
          {computedAlliances.map(a=>(
            <div key={a.tag} style={card}>
              <div style={{fontSize:13,fontWeight:700,color:a.color,marginBottom:10,display:"flex",justifyContent:"space-between"}}>
                <span>{a.tag} {"\u2014"} {t[a.roleKey]||a.roleKey}</span>
                <span style={{fontSize:10,color:"#64748b"}}>{a.teleportTime}</span>
              </div>
              <div style={{marginBottom:10}}>
                <div style={{fontSize:10,color:"#fbbf24",marginBottom:2,letterSpacing:1}}>{"\uD83D\uDCE3"} {t.rallyLead}</div>
                <div style={{fontSize:9,color:"#64748b",marginBottom:4}}>{t.rallyLeadDesc}</div>
                <div style={{fontSize:12,color:"#e2e8f0"}}>{config.roles[a.tag]?.rallyLead||"\u2014"}</div>
              </div>
              <div style={{marginBottom:10}}>
                <div style={{fontSize:10,color:"#fbbf24",marginBottom:2,letterSpacing:1}}>{"\uD83D\uDE95"} {t.taxiRunners}</div>
                <div style={{fontSize:9,color:"#64748b",marginBottom:4}}>{t.taxiRunnersDesc}</div>
                <div style={{fontSize:12,color:"#e2e8f0"}}>{config.roles[a.tag]?.taxiRunners.filter(x=>x!=="TBD").join(", ")||"\u2014"}</div>
              </div>
              <div style={{marginBottom:10}}>
                <div style={{fontSize:10,color:"#fbbf24",marginBottom:2,letterSpacing:1}}>{"\uD83C\uDFAF"} {t.siegeCoord}</div>
                <div style={{fontSize:9,color:"#64748b",marginBottom:4}}>{t.siegeCoordDesc}</div>
                <div style={{fontSize:12,color:"#e2e8f0"}}>{config.roles[a.tag]?.siegeCoord||"\u2014"}</div>
              </div>
              <div>
                <div style={{fontSize:10,color:"#fbbf24",marginBottom:2,letterSpacing:1}}>{"\uD83D\uDD27"} {t.siegeHelpers}</div>
                <div style={{fontSize:9,color:"#64748b",marginBottom:4}}>{t.siegeHelpersDesc}</div>
                <div style={{fontSize:12,color:"#e2e8f0"}}>{config.roles[a.tag]?.siegeHelpers.filter(x=>x!=="TBD").join(", ")||"\u2014"}</div>
              </div>
            </div>
          ))}
          <div style={card}>
            <div style={{fontSize:13,fontWeight:700,color:"#fbbf24",marginBottom:8}}>{"\uD83D\uDE95"} {t.taxiProtocol}</div>
            <ol style={{margin:0,paddingLeft:18,fontSize:11,color:"#cbd5e1",lineHeight:1.8}}>
              <li>{t.taxiStep1}</li><li>{t.taxiStep2}</li><li>{t.taxiStep3}</li><li>{t.taxiStep4}</li><li>{t.taxiStep5}</li>
            </ol>
            <div style={{fontSize:10,color:"#f59e0b",marginTop:8}}>{"\u26A0\uFE0F"} {t.taxiWarn}</div>
          </div>
        </>)}

      </div>

      <div style={{textAlign:"center",padding:16,fontSize:9,color:"#334155",borderTop:"1px solid #1e3a5f"}}>TME Command Center {"\u00B7"} TommyTorpedo {"\u00B7"} Era 8 {"\u00B7"} v1.4</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(TMECommandCenter));
    </script>
</body>
</html>
