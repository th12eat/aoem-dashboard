/* ═══════════════════════════════════════════════════
   BREEDING LOGIC (Kermanni model + Glossary data)

   Two-phase trait determination:
   1. Mode: Inherit parent trait (keep) vs Mutate to new trait (shift)
      - Base: 50/50 split
      - Spirited: +5% to shift (mutation)
      - Docile: +5% to keep (inheritance)
      - Mischievous: neutral 50/50
   2. Pool: When mutating, which trait the offspring gets
      - Warbred/Alert/Fearless/Protective own trait pools
      - ~80% chance to draw from the offspring's temperament pool
      - ~20% distributed among other temperament pools

   Temperament inheritance:
   - Same temperament on both parents: 90% to keep, 10%/6 for others
   - Different temperaments: 30% each parent's, 40%/5 for others

   Trait inheritance:
   - Same trait on both parents: 80% to inherit that trait
   - Different traits: 50% each
   ═══════════════════════════════════════════════════ */

const TRAIT_POOL_SIZES = { warbred: 5, alert: 4, fearless: 14, protective: 3 };
const TOTAL_TRAITS = 30;

function getRarityTier(rarity) {
  const r = RARITIES.find(x => x.id === rarity);
  return r ? r.tier : 1;
}

function calcTemperamentChance(parent1Temp, parent2Temp, targetTemp) {
  if (parent1Temp === parent2Temp) {
    return targetTemp === parent1Temp ? 0.90 : (0.10 / 6);
  }
  if (targetTemp === parent1Temp || targetTemp === parent2Temp) return 0.30;
  return 0.40 / 5;
}

function calcTraitInheritanceChance(parent1, parent2, targetTraitId) {
  const p1Traits = (parent1.traits || []).map(t => t.traitId);
  const p2Traits = (parent2.traits || []).map(t => t.traitId);
  const p1Has = p1Traits.includes(targetTraitId);
  const p2Has = p2Traits.includes(targetTraitId);
  if (p1Has && p2Has) return 0.80;
  if (p1Has || p2Has) return 0.50;
  return 0;
}

function calcModeChances(parent1, parent2) {
  let shiftChance = 0.50;
  let keepChance = 0.50;
  const temps = [parent1.temperament, parent2.temperament];
  if (temps.includes("spirited")) { shiftChance += 0.05; keepChance -= 0.05; }
  if (temps.includes("docile")) { keepChance += 0.05; shiftChance -= 0.05; }
  return { shift: shiftChance, keep: keepChance };
}

function calcMutationTraitProb(offspringTemp, targetTraitId) {
  const tempDef = TEMPERAMENTS.find(t => t.id === offspringTemp);
  if (!tempDef || tempDef.group !== "pool") {
    return 1 / TOTAL_TRAITS;
  }
  const poolCategory = tempDef.traitPool;
  const poolSize = TRAIT_POOL_SIZES[offspringTemp] || 1;
  const respectRate = TEMPERAMENT_RESPECT_RATES[offspringTemp] || 0.80;
  const poolTraits = TRAITS[poolCategory] || [];
  const isInPool = poolTraits.some(t => t.id === targetTraitId);
  if (isInPool) {
    return respectRate / poolSize;
  } else {
    return (1 - respectRate) / (TOTAL_TRAITS - poolSize);
  }
}

function calcFullTraitProbability(parent1, parent2, offspringTemp, targetTraitId) {
  const mode = calcModeChances(parent1, parent2);
  const inheritChance = calcTraitInheritanceChance(parent1, parent2, targetTraitId);
  const keepProb = mode.keep * inheritChance;
  const mutationProb = mode.shift * calcMutationTraitProb(offspringTemp, targetTraitId);
  return keepProb + mutationProb;
}

function calcRarityOutcomes(parent1, parent2) {
  const r1 = parent1.rarity;
  const r2 = parent2.rarity;
  const key1 = `${r1}+${r2}`;
  const key2 = `${r2}+${r1}`;
  return RARITY_BREEDING_OUTCOMES[key1] || RARITY_BREEDING_OUTCOMES[key2] || [{ rarity: r1, chance: 1.0 }];
}

function calcAttributeInheritance(parent1, parent2) {
  const p1Sum = (parent1.attr1Val || 0) + (parent1.attr2Val || 0);
  const p2Sum = (parent2.attr1Val || 0) + (parent2.attr2Val || 0);
  const avgSum = (p1Sum + p2Sum) / 2;
  return { expectedSum: avgSum, range: [avgSum * 0.85, avgSum * 1.15] };
}

function scoreBreedingPair(parent1, parent2, target) {
  let score = 0;
  const bestTemp = target.traitCategory
    ? TEMPERAMENTS.find(t => t.traitPool === target.traitCategory)?.id || parent1.temperament
    : parent1.temperament;

  if (target.traitCategory && target.targetTrait) {
    const prob = calcFullTraitProbability(parent1, parent2, bestTemp, target.targetTrait);
    score += prob * 100 * 40;
  } else if (target.traitCategory) {
    const poolTraits = TRAITS[target.traitCategory] || [];
    let totalProb = 0;
    for (const t of poolTraits) {
      totalProb += calcFullTraitProbability(parent1, parent2, bestTemp, t.id);
    }
    score += totalProb * 40;
  }

  const mode = calcModeChances(parent1, parent2);
  if (target.preferInheritance) score += mode.keep * 20;
  if (target.preferMutation) score += mode.shift * 20;

  const rarityOutcomes = calcRarityOutcomes(parent1, parent2);
  const bestRarityChance = rarityOutcomes[0]?.chance || 0;
  const bestRarityTier = getRarityTier(rarityOutcomes[0]?.rarity);
  score += bestRarityTier * bestRarityChance * 5;

  if (target.attribute) {
    const p1Has = parent1.attr1 === target.attribute || parent1.attr2 === target.attribute;
    const p2Has = parent2.attr1 === target.attribute || parent2.attr2 === target.attribute;
    if (p1Has && p2Has) score += 15;
    else if (p1Has || p2Has) score += 8;
  }

  const attrResult = calcAttributeInheritance(parent1, parent2);
  score += attrResult.expectedSum * 0.5;

  return Math.round(score * 10) / 10;
}

        </div>
        <div>
          <span style={{ fontSize: "0.75rem", color: "#64748b" }}>{ATTRIBUTES.find(a => a.id === horse.attr2)?.icon} {ATTRIBUTES.find(a => a.id === horse.attr2)?.label}</span>
          <div style={{ fontWeight: 600, color: "#fbbf24" }}>{horse.attr2Val}</div>

        <div style={{ marginTop: "0.75rem" }}>
          {horse.traits.map((t, i) => {
            const cat = TRAIT_CATEGORIES.find(c => c.id === t.category);
            const qual = TRAIT_QUALITIES.find(q => q.id === t.quality);

              <div key={i} style={{ display: "flex", alignItems: "center", gap: "0.5rem", marginTop: "0.3rem" }}>

function HorseForm({ horse, onSave, onCancel }) {
  const [form, setForm] = useState(horse || {
    id: Date.now().toString(),
    name: "",
    rarity: "courser",
    temperament: "spirited",
    attr1: "might",
    attr1Val: 1.0,
    attr2: "armor",
    attr2Val: 1.0,
    traits: [],
    assignedTo: "",
  });

  const [newTrait, setNewTrait] = useState({ category: "might_damage", traitId: "", quality: "grey" });

  const update = (field, val) => setForm({ ...form, [field]: val });

  const addTrait = () => {
    if (!newTrait.traitId) return;
    const catTraits = TRAITS[newTrait.category] || [];
    const traitDef = catTraits.find(t => t.id === newTrait.traitId);
    if (!traitDef) return;
    const traits = [...(form.traits || []), { category: newTrait.category, traitId: newTrait.traitId, label: traitDef.label, quality: newTrait.quality }];
    setForm({ ...form, traits });
    setNewTrait({ category: newTrait.category, traitId: "", quality: "grey" });
  };

  const removeTrait = (idx) => {
    const traits = form.traits.filter((_, i) => i !== idx);
    setForm({ ...form, traits });
  };

  return (
    <div style={{ ...css.card, border: "1px solid #fbbf24" }}>
      <div style={{ fontSize: "1rem", fontWeight: 600, color: "#fbbf24", marginBottom: "1rem" }}>
        {horse ? "Edit Horse" : "Add Horse"}
      </div>
      <div style={css.formGrid}>
        <div>
          <label style={css.label}>Name</label>
          <input style={css.input} value={form.name} onChange={e => update("name", e.target.value)} placeholder="e.g. Highland Horse" />
        </div>
        <div>
          <label style={css.label}>Rarity</label>
          <select style={css.select} value={form.rarity} onChange={e => update("rarity", e.target.value)}>
            {RARITIES.map(r => <option key={r.id} value={r.id}>{r.label}</option>)}
          </select>
        </div>
        <div>
          <label style={css.label}>Temperament</label>
          <select style={css.select} value={form.temperament} onChange={e => update("temperament", e.target.value)}>
            {TEMPERAMENTS.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
          </select>
        </div>
        <div>
          <label style={css.label}>Assigned March</label>
          <select style={css.select} value={form.assignedTo || ""} onChange={e => update("assignedTo", e.target.value)}>
            <option value="">Unassigned</option>
            {loadMarches().map(m => <option key={m.id} value={m.id}>{m.name || getMarchAutoName(m)}</option>)}
          </select>
        </div>
        <div>
          <label style={css.label}>Attribute 1</label>
          <select style={css.select} value={form.attr1} onChange={e => update("attr1", e.target.value)}>
            {ATTRIBUTES.map(a => <option key={a.id} value={a.id}>{a.label}</option>)}
          </select>
          <input style={{ ...css.input, marginTop: "0.25rem" }} type="number" step="0.1" min="0" max="5"
            value={form.attr1Val} onChange={e => update("attr1Val", parseFloat(e.target.value) || 0)} />
        </div>
        <div>
          <label style={css.label}>Attribute 2</label>
          <select style={css.select} value={form.attr2} onChange={e => update("attr2", e.target.value)}>
            {ATTRIBUTES.map(a => <option key={a.id} value={a.id}>{a.label}</option>)}
          </select>
          <input style={{ ...css.input, marginTop: "0.25rem" }} type="number" step="0.1" min="0" max="5"
            value={form.attr2Val} onChange={e => update("attr2Val", parseFloat(e.target.value) || 0)} />
        </div>
      </div>

      <div style={{ marginTop: "1rem" }}>
        <label style={css.label}>Traits</label>
        {(form.traits || []).map((t, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: "0.5rem", marginBottom: "0.3rem" }}>
            <span style={css.badge(TRAIT_QUALITIES.find(q => q.id === t.quality)?.color || "#666")}>{t.quality}</span>
            <span style={{ fontSize: "0.85rem" }}>{t.label}</span>
            <button style={css.deleteBtn} onClick={() => removeTrait(i)}>&times;</button>

        <div style={{ display: "flex", gap: "0.5rem", marginTop: "0.5rem", flexWrap: "wrap" }}>
          <select style={{ ...css.select, width: "auto" }} value={newTrait.category}
            onChange={e => setNewTrait({ ...newTrait, category: e.target.value, traitId: "" })}>
            {TRAIT_CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
          </select>
          <select style={{ ...css.select, width: "auto" }} value={newTrait.traitId}
            onChange={e => setNewTrait({ ...newTrait, traitId: e.target.value })}>
            <option value="">Select trait...</option>
            {(TRAITS[newTrait.category] || []).map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
          </select>
          <select style={{ ...css.select, width: "auto" }} value={newTrait.quality}
            onChange={e => setNewTrait({ ...newTrait, quality: e.target.value })}>

        <button style={css.btnOutline("#94a3b8")} onClick={onCancel}>Cancel</button>
      </div>
    </div>
  );

function StableTab({ horses, setHorses }) {
  const [editing, setEditing] = useState(null);
  const [adding, setAdding] = useState(false);
  const [filter, setFilter] = useState({ rarity: "", temperament: "", attribute: "" });

  const filtered = useMemo(() => {
    return horses.filter(h => {
      if (filter.rarity && h.rarity !== filter.rarity) return false;
      if (filter.temperament && h.temperament !== filter.temperament) return false;
      if (filter.attribute && h.attr1 !== filter.attribute && h.attr2 !== filter.attribute) return false;
      return true;
    });
  }, [horses, filter]);

  const handleSave = (horse) => {
    let updated;
    if (editing) {
      updated = horses.map(h => h.id === horse.id ? horse : h);
    } else {
      updated = [...horses, { ...horse, id: Date.now().toString() }];
    }
    setHorses(updated);
    saveStable(updated);
    setEditing(null);
    setAdding(false);
  };

  const handleDelete = (id) => {
    const updated = horses.filter(h => h.id !== id);
    setHorses(updated);
    saveStable(updated);
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem", flexWrap: "wrap", gap: "0.5rem" }}>
        <div style={css.row}>
          <select style={{ ...css.select, width: "auto" }} value={filter.rarity} onChange={e => setFilter({ ...filter, rarity: e.target.value })}>
            <option value="">All Rarities</option>
            {RARITIES.map(r => <option key={r.id} value={r.id}>{r.label}</option>)}
          </select>
          <select style={{ ...css.select, width: "auto" }} value={filter.temperament} onChange={e => setFilter({ ...filter, temperament: e.target.value })}>
            <option value="">All Temperaments</option>
            {TEMPERAMENTS.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
          </select>
          <select style={{ ...css.select, width: "auto" }} value={filter.attribute} onChange={e => setFilter({ ...filter, attribute: e.target.value })}>
            <option value="">All Attributes</option>
            {ATTRIBUTES.map(a => <option key={a.id} value={a.id}>{a.label}</option>)}
          </select>
        </div>
        <button style={css.btn()} onClick={() => setAdding(true)}>+ Add Horse</button>
      </div>

      {adding && <HorseForm onSave={handleSave} onCancel={() => setAdding(false)} />}
      {editing && <HorseForm horse={editing} onSave={handleSave} onCancel={() => setEditing(null)} />}

      <div style={{ fontSize: "0.85rem", color: "#64748b", marginBottom: "0.75rem" }}>
        {filtered.length} horse{filtered.length !== 1 ? "s" : ""} in stable
      </div>
      <div style={css.grid}>
        {filtered.map(h => (
          <HorseCard key={h.id} horse={h} onEdit={(h) => { setAdding(false); setEditing(h); }} onDelete={handleDelete} />
        ))}
      </div>
      {filtered.length === 0 && !adding && (
        <div style={{ textAlign: "center", padding: "3rem", color: "#475569" }}>
          No horses in stable. Add your first horse to get started.
        </div>
      )}
    </div>
  );
}

function BreedingTab({ horses }) {
  const [target, setTarget] = useState({
    traitCategory: "might_damage",
    targetTrait: "",
    attribute: "might",
    preferInheritance: false,
    preferMutation: false,
  });

  const pairs = useMemo(() => {
    if (horses.length < 2) return [];
    const results = [];
    for (let i = 0; i < horses.length; i++) {
      for (let j = i + 1; j < horses.length; j++) {
        const score = scoreBreedingPair(horses[i], horses[j], target);
        results.push({ p1: horses[i], p2: horses[j], score });
      }
    }
    results.sort((a, b) => b.score - a.score);
    return results.slice(0, 10);
  }, [horses, target]);

  return (
    <div>
      <div style={css.card}>
        <div style={{ fontSize: "1rem", fontWeight: 600, color: "#fbbf24", marginBottom: "0.75rem" }}>Breeding Target</div>
        <div style={css.formGrid}>
          <div>
            <label style={css.label}>Desired Trait Category</label>
            <select style={css.select} value={target.traitCategory} onChange={e => setTarget({ ...target, traitCategory: e.target.value, targetTrait: "" })}>
              {TRAIT_CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
            </select>
          </div>
          <div>
            <label style={css.label}>Specific Trait (optional)</label>
            <select style={css.select} value={target.targetTrait} onChange={e => setTarget({ ...target, targetTrait: e.target.value })}>
              <option value="">Any in category</option>
              {(TRAITS[target.traitCategory] || []).map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
            </select>
          </div>
          <div>
            <label style={css.label}>Desired Attribute</label>
            <select style={css.select} value={target.attribute} onChange={e => setTarget({ ...target, attribute: e.target.value })}>
              {ATTRIBUTES.map(a => <option key={a.id} value={a.id}>{a.label}</option>)}
            </select>
          </div>
          <div style={{ paddingTop: "1rem" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "0.5rem", marginBottom: "0.3rem" }}>
              <input type="checkbox" checked={target.preferInheritance}
                onChange={e => setTarget({ ...target, preferInheritance: e.target.checked, preferMutation: false })} />
              <label style={{ fontSize: "0.85rem", color: "#e2e8f0" }}>Prefer inheritance (keep parent trait)</label>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: "0.5rem" }}>
              <input type="checkbox" checked={target.preferMutation}
                onChange={e => setTarget({ ...target, preferMutation: e.target.checked, preferInheritance: false })} />
              <label style={{ fontSize: "0.85rem", color: "#e2e8f0" }}>Prefer mutation (new trait from pool)</label>
            </div>
          </div>
        </div>
      </div>

      {horses.length < 2 ? (
        <div style={{ textAlign: "center", padding: "2rem", color: "#475569" }}>
          Add at least 2 horses to your stable to see breeding recommendations.
        </div>
      ) : (
        <div>
          <div style={{ fontSize: "0.9rem", fontWeight: 600, color: "#94a3b8", marginBottom: "0.75rem" }}>
            Top Breeding Pairs (by score)
          </div>
          {pairs.map((pair, i) => (
            <div key={i} style={{ ...css.card, display: "flex", alignItems: "center", gap: "1rem", flexWrap: "wrap" }}>
              <div style={{ fontSize: "1.5rem", fontWeight: 700, color: i === 0 ? "#fbbf24" : "#64748b", minWidth: 40 }}>#{i + 1}</div>
              <div style={{ flex: 1, minWidth: 200 }}>
                <div style={{ fontWeight: 600, color: RARITIES.find(r => r.id === pair.p1.rarity)?.color }}>
                  {pair.p1.name || "Unnamed"} <span style={{ fontSize: "0.75rem", color: "#64748b" }}>({TEMPERAMENTS.find(t => t.id === pair.p1.temperament)?.label})</span>
                </div>
                <div style={{ fontSize: "0.8rem", color: "#64748b" }}>
                  {ATTRIBUTES.find(a => a.id === pair.p1.attr1)?.label} {pair.p1.attr1Val} / {ATTRIBUTES.find(a => a.id === pair.p1.attr2)?.label} {pair.p1.attr2Val}
                </div>
              </div>
              <div style={{ fontSize: "1.2rem", color: "#475569" }}>&times;</div>
              <div style={{ flex: 1, minWidth: 200 }}>
                <div style={{ fontWeight: 600, color: RARITIES.find(r => r.id === pair.p2.rarity)?.color }}>
                  {pair.p2.name || "Unnamed"} <span style={{ fontSize: "0.75rem", color: "#64748b" }}>({TEMPERAMENTS.find(t => t.id === pair.p2.temperament)?.label})</span>
                </div>
                <div style={{ fontSize: "0.8rem", color: "#64748b" }}>
                  {ATTRIBUTES.find(a => a.id === pair.p2.attr1)?.label} {pair.p2.attr1Val} / {ATTRIBUTES.find(a => a.id === pair.p2.attr2)?.label} {pair.p2.attr2Val}

function ProbabilityTab({ horses }) {
  const [p1Id, setP1Id] = useState("");
  const [p2Id, setP2Id] = useState("");

  const p1 = horses.find(h => h.id === p1Id);
  const p2 = horses.find(h => h.id === p2Id);

  const analysis = useMemo(() => {
    if (!p1 || !p2) return null;

    const mode = calcModeChances(p1, p2);

    const tempProbs = TEMPERAMENTS.map(t => ({
      ...t,
      chance: calcTemperamentChance(p1.temperament, p2.temperament, t.id),
    }));

    const allTraits = [];
    for (const [catId, traits] of Object.entries(TRAITS)) {
      for (const trait of traits) {
        const bestTemp = TEMPERAMENTS.find(t => t.traitPool === catId)?.id || "warbred";
        const prob = calcFullTraitProbability(p1, p2, bestTemp, trait.id);
        allTraits.push({ ...trait, category: catId, prob });
      }
    }
    allTraits.sort((a, b) => b.prob - a.prob);

    const rarityOutcomes = calcRarityOutcomes(p1, p2);
    const attrInherit = calcAttributeInheritance(p1, p2);

    return { mode, tempProbs, allTraits, rarityOutcomes, attrInherit };
  }, [p1, p2]);

  return (
    <div>
      <div style={css.card}>
        <div style={{ fontSize: "1rem", fontWeight: 600, color: "#fbbf24", marginBottom: "0.75rem" }}>Select Parents</div>
        <div style={{ display: "flex", gap: "1rem", flexWrap: "wrap" }}>
          <div style={{ flex: 1, minWidth: 200 }}>
            <label style={css.label}>Parent 1</label>
            <select style={css.select} value={p1Id} onChange={e => setP1Id(e.target.value)}>
              <option value="">Select horse...</option>
              {horses.filter(h => h.id !== p2Id).map(h => (
                <option key={h.id} value={h.id}>{h.name || "Unnamed"} ({TEMPERAMENTS.find(t => t.id === h.temperament)?.label})</option>
              ))}
            </select>
          </div>
          <div style={{ flex: 1, minWidth: 200 }}>
            <label style={css.label}>Parent 2</label>
            <select style={css.select} value={p2Id} onChange={e => setP2Id(e.target.value)}>
              <option value="">Select horse...</option>
              {horses.filter(h => h.id !== p1Id).map(h => (
                <option key={h.id} value={h.id}>{h.name || "Unnamed"} ({TEMPERAMENTS.find(t => t.id === h.temperament)?.label})</option>
              ))}
            </select>
          </div>
        </div>
      </div>

      {analysis && (
        <div>
          <div style={{ ...css.grid, gridTemplateColumns: "repeat(auto-fill, minmax(250px, 1fr))" }}>
            <div style={css.card}>
              <div style={{ fontSize: "0.8rem", color: "#64748b" }}>Inheritance (Keep) Chance</div>
              <div style={{ fontSize: "1.5rem", fontWeight: 700, color: "#22c55e" }}>{Math.round(analysis.mode.keep * 100)}%</div>
              <div style={{ fontSize: "0.75rem", color: "#94a3b8" }}>Offspring keeps a parent's trait</div>
            </div>
            <div style={css.card}>
              <div style={{ fontSize: "0.8rem", color: "#64748b" }}>Mutation (Shift) Chance</div>
              <div style={{ fontSize: "1.5rem", fontWeight: 700, color: "#ef4444" }}>{Math.round(analysis.mode.shift * 100)}%</div>
              <div style={{ fontSize: "0.75rem", color: "#94a3b8" }}>Offspring gets a new trait</div>
            </div>
            <div style={css.card}>
              <div style={{ fontSize: "0.8rem", color: "#64748b" }}>Expected Attribute Sum</div>
              <div style={{ fontSize: "1.5rem", fontWeight: 700, color: "#fbbf24" }}>{analysis.attrInherit.expectedSum.toFixed(1)}</div>
              <div style={{ fontSize: "0.75rem", color: "#94a3b8" }}>
                Range: {analysis.attrInherit.range[0].toFixed(1)} — {analysis.attrInherit.range[1].toFixed(1)}
              </div>
            </div>
          </div>

          <div style={css.card}>
            <div style={{ fontSize: "0.9rem", fontWeight: 600, color: "#94a3b8", marginBottom: "0.75rem" }}>Offspring Temperament Probability</div>
            {analysis.tempProbs.map(t => (
              <div key={t.id} style={{ display: "flex", alignItems: "center", gap: "0.75rem", marginBottom: "0.4rem" }}>
                <div style={{ width: 100, fontSize: "0.85rem", color: t.color }}>{t.label}</div>
                <div style={{ flex: 1, height: 18, background: "#0f172a", borderRadius: 4, overflow: "hidden" }}>
                  <div style={{ width: `${t.chance * 100}%`, height: "100%", background: t.color, borderRadius: 4, transition: "width 0.3s" }} />
                </div>
                <div style={{ width: 50, fontSize: "0.85rem", fontWeight: 600, color: "#e2e8f0", textAlign: "right" }}>
                  {(t.chance * 100).toFixed(1)}%
                </div>
              </div>
            ))}
          </div>

          <div style={css.card}>
            <div style={{ fontSize: "0.9rem", fontWeight: 600, color: "#94a3b8", marginBottom: "0.75rem" }}>Offspring Rarity Probability</div>
            {analysis.rarityOutcomes.map((o, i) => {
              const r = RARITIES.find(x => x.id === o.rarity);
              return (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: "0.75rem", marginBottom: "0.4rem" }}>
                  <div style={{ width: 100, fontSize: "0.85rem", color: r?.color }}>{r?.label}</div>
                  <div style={{ flex: 1, height: 18, background: "#0f172a", borderRadius: 4, overflow: "hidden" }}>
                    <div style={{ width: `${o.chance * 100}%`, height: "100%", background: r?.color, borderRadius: 4 }} />
                  </div>
                  <div style={{ width: 50, fontSize: "0.85rem", fontWeight: 600, color: "#e2e8f0", textAlign: "right" }}>
                    {Math.round(o.chance * 100)}%
                  </div>
                </div>
              );
            })}
          </div>

          <div style={css.card}>
            <div style={{ fontSize: "0.9rem", fontWeight: 600, color: "#94a3b8", marginBottom: "0.75rem" }}>
              Top Trait Outcomes (assuming best temperament for each pool)
            </div>
            {analysis.allTraits.slice(0, 15).map((t, i) => {
              const cat = TRAIT_CATEGORIES.find(c => c.id === t.category);
              return (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: "0.75rem", marginBottom: "0.35rem" }}>
                  <div style={{ width: 140, fontSize: "0.8rem", color: cat?.color }}>{t.label}</div>
                  <div style={{ flex: 1, height: 16, background: "#0f172a", borderRadius: 4, overflow: "hidden" }}>
                    <div style={{ width: `${Math.min(t.prob * 100 * 3, 100)}%`, height: "100%", background: cat?.color, borderRadius: 4 }} />
                  </div>
                  <div style={{ width: 60, fontSize: "0.8rem", fontWeight: 600, color: "#e2e8f0", textAlign: "right" }}>
                    {(t.prob * 100).toFixed(2)}%
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {!analysis && (
        <div style={{ textAlign: "center", padding: "2rem", color: "#475569" }}>
          Select two parents to see breeding probability analysis.
        </div>
      )}
    </div>
  );
}

function loadMarches() {
  try { return JSON.parse(localStorage.getItem(MARCHES_KEY)) || []; }
  catch { return []; }
}
function saveMarches(marches) {
  localStorage.setItem(MARCHES_KEY, JSON.stringify(marches));
}

function getMarchAutoName(march) {
  if (!march.heroes || march.heroes.length === 0) return "Empty March";
  const commander = HEROES.find(h => h.name === march.heroes[0]);
  const cls = MILITARY_CLASSES.find(c => c.id === commander?.class);
  const unit = march.unitType || commander?.units?.[0] || "Mixed";
  const count = loadMarches().filter(m =>
    m.category === march.category && m.unitType === march.unitType &&
    m.heroes?.[0] === march.heroes?.[0] && m.id !== march.id
  ).length;
  return `${march.heroes[0]} ${cls?.label || ""} ${unit} ${count > 0 ? count + 1 : 1}`.trim();
}

function checkTroopBonus(march) {
  if (!march.heroes || march.heroes.length < 3) return { match: false, reason: "Need 3 heroes" };
  const heroData = march.heroes.map(h => HEROES.find(x => x.name === h)).filter(Boolean);
  if (heroData.length < 3) return { match: false, reason: "Unknown heroes" };
  const allUnitsMatch = march.unitType && heroData.every(h => h.units.includes(march.unitType));
  const classes = new Set(heroData.map(h => h.class));
  const allClassesUnique = classes.size === 3;
  if (allUnitsMatch && allClassesUnique) return { match: true, reason: "+180% Troop Bonus" };
  const issues = [];
  if (!allUnitsMatch) issues.push("Unit mismatch");
  if (!allClassesUnique) issues.push("Need W/M/T mix");
  return { match: false, reason: issues.join(", ") };
}

function MarchCard({ march, horses, onUpdate, onDelete, onAssignHorse, onUnassignHorse }) {
  const heroData = (march.heroes || []).map(h => HEROES.find(x => x.name === h)).filter(Boolean);
  const bonus = checkTroopBonus(march);
  const assignedHorses = horses.filter(h => h.assignedTo === march.id);
  const unassigned = horses.filter(h => !h.assignedTo);

  return (
    <div style={css.card}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "0.5rem" }}>
        <div>
          <div style={{ fontSize: "1rem", fontWeight: 600, color: "#e2e8f0" }}>{march.name || getMarchAutoName(march)}</div>
          <div style={{ display: "flex", gap: "0.4rem", marginTop: "0.25rem", flexWrap: "wrap" }}>
            {march.unitType && <span style={css.badge("#94a3b8")}>{march.unitType}</span>}
            <span style={css.badge(bonus.match ? "#22c55e" : "#64748b")}>{bonus.reason}</span>
          </div>
        </div>
        <button style={css.deleteBtn} onClick={() => onDelete(march.id)}>&times;</button>
      </div>

      <div style={{ marginBottom: "0.5rem" }}>
        <div style={{ display: "flex", gap: "0.5rem", alignItems: "center", marginBottom: "0.4rem" }}>
          <label style={{ fontSize: "0.75rem", color: "#64748b" }}>Unit Type:</label>
          <select style={{ ...css.select, width: "auto", fontSize: "0.8rem" }} value={march.unitType || ""}
            onChange={e => onUpdate({ ...march, unitType: e.target.value })}>
            <option value="">Select...</option>
            {UNIT_TYPES.map(u => <option key={u} value={u}>{u}</option>)}
          </select>
        </div>
      </div>

      <div style={{ marginBottom: "0.5rem" }}>
        <div style={{ fontSize: "0.75rem", color: "#64748b", marginBottom: "0.25rem" }}>Heroes (first = Commander)</div>
        {(march.heroes || []).map((heroName, i) => {
          const hero = HEROES.find(h => h.name === heroName);
          const cls = MILITARY_CLASSES.find(c => c.id === hero?.class);
          return (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: "0.5rem", marginBottom: "0.2rem", padding: "0.2rem 0.4rem", background: "#0f172a", borderRadius: 4 }}>
              {i === 0 && <span style={{ fontSize: "0.65rem", color: "#fbbf24" }}>CMD</span>}
              <span style={{ fontSize: "0.8rem", color: cls?.color || "#e2e8f0" }}>{heroName}</span>
              <span style={{ fontSize: "0.65rem", color: "#64748b" }}>{cls?.label} / {hero?.units?.join(", ")}</span>
              <button style={{ ...css.deleteBtn, fontSize: "0.9rem", marginLeft: "auto" }}
                onClick={() => { const updated = { ...march, heroes: march.heroes.filter((_, idx) => idx !== i) }; onUpdate(updated); }}>&times;</button>
            </div>
          );
        })}
        {(march.heroes || []).length < 3 && (
          <select style={{ ...css.select, marginTop: "0.25rem", fontSize: "0.8rem" }} value=""
            onChange={e => { if (e.target.value) { const updated = { ...march, heroes: [...(march.heroes || []), e.target.value] }; onUpdate(updated); } }}>
            <option value="">+ Add hero...</option>
            {HEROES.filter(h => !(march.heroes || []).includes(h.name)).sort((a, b) => a.name.localeCompare(b.name)).map(h => {
              const cls = MILITARY_CLASSES.find(c => c.id === h.class);
              return <option key={h.name} value={h.name}>{h.name} ({cls?.label} / {h.units.join(", ")})</option>;
            })}
          </select>
        )}
      </div>

      <div>
        <div style={{ fontSize: "0.75rem", color: "#64748b", marginBottom: "0.25rem" }}>Mounts ({assignedHorses.length}/3)</div>
        {assignedHorses.map(h => (
          <div key={h.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.2rem", padding: "0.2rem 0.4rem", background: "#0f172a", borderRadius: 4 }}>
            <span style={{ fontSize: "0.8rem", color: RARITIES.find(r => r.id === h.rarity)?.color }}>{h.name || "Unnamed"}</span>
            <button style={{ ...css.deleteBtn, fontSize: "0.9rem" }} onClick={() => onUnassignHorse(h.id)}>&times;</button>
          </div>
        ))}
        {assignedHorses.length < 3 && (
          <select style={{ ...css.select, marginTop: "0.25rem", fontSize: "0.8rem" }} value=""
            onChange={e => { if (e.target.value) onAssignHorse(e.target.value, march.id); }}>
            <option value="">+ Assign mount...</option>
            {unassigned.map(h => <option key={h.id} value={h.id}>{h.name || "Unnamed"} ({TEMPERAMENTS.find(t => t.id === h.temperament)?.label})</option>)}
          </select>
        )}
      </div>
    </div>
  );
}

function MarchPlannerTab({ horses, setHorses }) {
  const [marches, setMarches] = useState(loadMarches);

  const addMarch = (category) => {
    const newMarch = { id: Date.now().toString(), category, unitType: "", heroes: [], name: "" };
    const updated = [...marches, newMarch];
    setMarches(updated);
    saveMarches(updated);
  };

  const updateMarch = (march) => {
    const updated = marches.map(m => m.id === march.id ? march : m);
    setMarches(updated);
    saveMarches(updated);
  };

  const deleteMarch = (id) => {
    const updated = marches.filter(m => m.id !== id);
    setMarches(updated);
    saveMarches(updated);
    const horsesUpdated = horses.map(h => h.assignedTo === id ? { ...h, assignedTo: "" } : h);
    setHorses(horsesUpdated);
    saveStable(horsesUpdated);
  };

  const assignHorse = (horseId, marchId) => {
    const updated = horses.map(h => h.id === horseId ? { ...h, assignedTo: marchId } : h);
    setHorses(updated);
    saveStable(updated);
  };

  const unassignHorse = (horseId) => {
    const updated = horses.map(h => h.id === horseId ? { ...h, assignedTo: "" } : h);
    setHorses(updated);
    saveStable(updated);
  };

  const catConfig = [
    { id: "combat", label: "Combat", color: "#ef4444" },
    { id: "gathering", label: "Gathering", color: "#fbbf24" },
    { id: "siege", label: "Siege", color: "#a855f7" },
  ];

  const totalMounts = marches.length * 3;
  const assignedCount = horses.filter(h => h.assignedTo).length;

  return (
    <div>
      <div style={{ fontSize: "0.9rem", color: "#94a3b8", marginBottom: "1rem" }}>
        {marches.length} marches configured | {assignedCount}/{totalMounts} mount slots filled |
        Each march: 3 heroes + 3 mounts | +180% bonus requires all 3 unit types + all 3 military classes match
      </div>

      {catConfig.map(cat => {
        const catMarches = marches.filter(m => m.category === cat.id);
        return (
          <div key={cat.id} style={{ marginBottom: "1.5rem" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.75rem" }}>
              <h3 style={{ color: cat.color, fontSize: "1rem", margin: 0 }}>{cat.label} Marches ({catMarches.length})</h3>
              <button style={css.btn(cat.color)} onClick={() => addMarch(cat.id)}>+ Add March</button>
            </div>
            {catMarches.length === 0 && (
              <div style={{ fontSize: "0.85rem", color: "#475569", padding: "1rem", textAlign: "center" }}>
                No {cat.label.toLowerCase()} marches configured yet.
              </div>
            )}
            <div style={css.grid}>
              {catMarches.map(march => (
                <MarchCard key={march.id} march={march} horses={horses}
                  onUpdate={updateMarch} onDelete={deleteMarch}
                  onAssignHorse={assignHorse} onUnassignHorse={unassignHorse} />
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

          <li><strong>Fearless:</strong> 78.95% (Universal pool)</li>
          <li><strong>Protective:</strong> 80.17% (Healing pool)</li>
        </ul>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("stable");
  const [horses, setHorses] = useState(loadStable);

  const tabs = [
    { id: "stable", label: "Stable" },
    { id: "breeding", label: "Breeding Optimizer" },
    { id: "probability", label: "Probability Calc" },
    { id: "planner", label: "March Planner" },
    { id: "reference", label: "Reference" },
  ];

  return (
    <div style={css.container}>
      <div style={css.header}>
        <h1 style={css.title}>Horse Breeding Optimizer</h1>
        <div style={css.subtitle}>Age of Empires Mobile — Mount Management & Breeding Strategy</div>
      </div>

      <div style={css.tabs}>
        {tabs.map(t => (
          <div key={t.id} style={css.tab(tab === t.id)} onClick={() => setTab(t.id)}>{t.label}</div>
        ))}
      </div>

      {tab === "stable" && <StableTab horses={horses} setHorses={setHorses} />}
      {tab === "breeding" && <BreedingTab horses={horses} />}

      {tab === "planner" && <MarchPlannerTab horses={horses} setHorses={setHorses} />}
      {tab === "reference" && <ReferenceTab />}

      <div style={{ textAlign: "center", marginTop: "2rem", fontSize: "0.75rem", color: "#475569" }}>
        Data persists in browser localStorage. Export your stable regularly.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
