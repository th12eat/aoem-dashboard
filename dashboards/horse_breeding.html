/* ═══════════════════════════════════════════════════
   BREEDING LOGIC (Kermanni model + Glossary data)

   Two-phase trait determination:
   1. Mode: Inherit parent trait (keep) vs Mutate to new trait (shift)
      - Base: 50/50 split
      - Spirited: +5% to shift (mutation)
      - Docile: +5% to keep (inheritance)
      - Mischievous: neutral 50/50
   2. Pool: When mutating, which trait the offspring gets
      - Warbred/Alert/Fearless/Protective own trait pools
      - ~80% chance to draw from the offspring's temperament pool
      - ~20% distributed among other temperament pools

   Temperament inheritance:
   - Same temperament on both parents: 90% to keep, 10%/6 for others
   - Different temperaments: 30% each parent's, 40%/5 for others

   Trait inheritance:
   - Same trait on both parents: 80% to inherit that trait
   - Different traits: 50% each
   ═══════════════════════════════════════════════════ */

const TRAIT_POOL_SIZES = { warbred: 5, alert: 4, fearless: 14, protective: 3 };
const TOTAL_TRAITS = 30;

function getRarityTier(rarity) {
  const r = RARITIES.find(x => x.id === rarity);
  return r ? r.tier : 1;
}

function calcTemperamentChance(parent1Temp, parent2Temp, targetTemp) {
  if (parent1Temp === parent2Temp) {
    return targetTemp === parent1Temp ? 0.90 : (0.10 / 6);
  }
  if (targetTemp === parent1Temp || targetTemp === parent2Temp) return 0.30;
  return 0.40 / 5;
}

function calcTraitInheritanceChance(parent1, parent2, targetTraitId) {
  const p1Traits = (parent1.traits || []).map(t => t.traitId);
  const p2Traits = (parent2.traits || []).map(t => t.traitId);
  const p1Has = p1Traits.includes(targetTraitId);
  const p2Has = p2Traits.includes(targetTraitId);
  if (p1Has && p2Has) return 0.80;
  if (p1Has || p2Has) return 0.50;
  return 0;
}

function calcModeChances(parent1, parent2) {
  let shiftChance = 0.50;
  let keepChance = 0.50;
  const temps = [parent1.temperament, parent2.temperament];
  if (temps.includes("spirited")) { shiftChance += 0.05; keepChance -= 0.05; }
  if (temps.includes("docile")) { keepChance += 0.05; shiftChance -= 0.05; }
  return { shift: shiftChance, keep: keepChance };
}

function calcMutationTraitProb(offspringTemp, targetTraitId) {
  const tempDef = TEMPERAMENTS.find(t => t.id === offspringTemp);
  if (!tempDef || tempDef.group !== "pool") {
    return 1 / TOTAL_TRAITS;
  }
  const poolCategory = tempDef.traitPool;
  const poolSize = TRAIT_POOL_SIZES[offspringTemp] || 1;
  const respectRate = TEMPERAMENT_RESPECT_RATES[offspringTemp] || 0.80;
  const poolTraits = TRAITS[poolCategory] || [];
  const isInPool = poolTraits.some(t => t.id === targetTraitId);
  if (isInPool) {
    return respectRate / poolSize;
  } else {
    return (1 - respectRate) / (TOTAL_TRAITS - poolSize);
  }
}

function calcFullTraitProbability(parent1, parent2, offspringTemp, targetTraitId) {
  const mode = calcModeChances(parent1, parent2);
  const inheritChance = calcTraitInheritanceChance(parent1, parent2, targetTraitId);
  const keepProb = mode.keep * inheritChance;
  const mutationProb = mode.shift * calcMutationTraitProb(offspringTemp, targetTraitId);
  return keepProb + mutationProb;
}

function calcRarityOutcomes(parent1, parent2) {
  const r1 = parent1.rarity;
  const r2 = parent2.rarity;
  const key1 = `${r1}+${r2}`;
  const key2 = `${r2}+${r1}`;
  return RARITY_BREEDING_OUTCOMES[key1] || RARITY_BREEDING_OUTCOMES[key2] || [{ rarity: r1, chance: 1.0 }];
}

function calcAttributeInheritance(parent1, parent2) {
  const p1Sum = (parent1.attr1Val || 0) + (parent1.attr2Val || 0);
  const p2Sum = (parent2.attr1Val || 0) + (parent2.attr2Val || 0);
  const avgSum = (p1Sum + p2Sum) / 2;
  return { expectedSum: avgSum, range: [avgSum * 0.85, avgSum * 1.15] };
}

function scoreBreedingPair(parent1, parent2, target) {
  let score = 0;
  const bestTemp = target.traitCategory
    ? TEMPERAMENTS.find(t => t.traitPool === target.traitCategory)?.id || parent1.temperament
    : parent1.temperament;

  if (target.traitCategory && target.targetTrait) {
    const prob = calcFullTraitProbability(parent1, parent2, bestTemp, target.targetTrait);
    score += prob * 100 * 40;
  } else if (target.traitCategory) {
    const poolTraits = TRAITS[target.traitCategory] || [];
    let totalProb = 0;
    for (const t of poolTraits) {
      totalProb += calcFullTraitProbability(parent1, parent2, bestTemp, t.id);
    }
    score += totalProb * 40;
  }

  const mode = calcModeChances(parent1, parent2);
  if (target.preferInheritance) score += mode.keep * 20;
  if (target.preferMutation) score += mode.shift * 20;

  const rarityOutcomes = calcRarityOutcomes(parent1, parent2);
  const bestRarityChance = rarityOutcomes[0]?.chance || 0;
  const bestRarityTier = getRarityTier(rarityOutcomes[0]?.rarity);
  score += bestRarityTier * bestRarityChance * 5;

  if (target.attribute) {
    const p1Has = parent1.attr1 === target.attribute || parent1.attr2 === target.attribute;
    const p2Has = parent2.attr1 === target.attribute || parent2.attr2 === target.attribute;
    if (p1Has && p2Has) score += 15;
    else if (p1Has || p2Has) score += 8;
  }

  const attrResult = calcAttributeInheritance(parent1, parent2);
  score += attrResult.expectedSum * 0.5;

  return Math.round(score * 10) / 10;
}

function StableTab({ horses, setHorses }) {
  const [editing, setEditing] = useState(null);
  const [adding, setAdding] = useState(false);
  const [filter, setFilter] = useState({ rarity: "", temperament: "", attribute: "" });

  const filtered = useMemo(() => {
    return horses.filter(h => {
      if (filter.rarity && h.rarity !== filter.rarity) return false;
      if (filter.temperament && h.temperament !== filter.temperament) return false;
      if (filter.attribute && h.attr1 !== filter.attribute && h.attr2 !== filter.attribute) return false;
      return true;
    });
  }, [horses, filter]);

  const handleSave = (horse) => {
    let updated;
    if (editing) {
      updated = horses.map(h => h.id === horse.id ? horse : h);
    } else {
      updated = [...horses, { ...horse, id: Date.now().toString() }];
    }
    setHorses(updated);
    saveStable(updated);
    setEditing(null);
    setAdding(false);

function ProbabilityTab({ horses }) {
  const [p1Id, setP1Id] = useState("");
  const [p2Id, setP2Id] = useState("");

  const p1 = horses.find(h => h.id === p1Id);
  const p2 = horses.find(h => h.id === p2Id);

  const analysis = useMemo(() => {
    if (!p1 || !p2) return null;

    const mode = calcModeChances(p1, p2);

    const tempProbs = TEMPERAMENTS.map(t => ({
      ...t,
      chance: calcTemperamentChance(p1.temperament, p2.temperament, t.id),
    }));

    const allTraits = [];
    for (const [catId, traits] of Object.entries(TRAITS)) {
      for (const trait of traits) {
        const bestTemp = TEMPERAMENTS.find(t => t.traitPool === catId)?.id || "warbred";
        const prob = calcFullTraitProbability(p1, p2, bestTemp, trait.id);
        allTraits.push({ ...trait, category: catId, prob });
      }
    }
    allTraits.sort((a, b) => b.prob - a.prob);

    const rarityOutcomes = calcRarityOutcomes(p1, p2);
    const attrInherit = calcAttributeInheritance(p1, p2);

    return { mode, tempProbs, allTraits, rarityOutcomes, attrInherit };
  }, [p1, p2]);

  return (
    <div>
      <div style={css.card}>
        <div style={{ fontSize: "1rem", fontWeight: 600, color: "#fbbf24", marginBottom: "0.75rem" }}>Select Parents</div>

            <select style={css.select} value={p1Id} onChange={e => setP1Id(e.target.value)}>
              <option value="">Select horse...</option>
              {horses.filter(h => h.id !== p2Id).map(h => (
                <option key={h.id} value={h.id}>{h.name || "Unnamed"} ({TEMPERAMENTS.find(t => t.id === h.temperament)?.label})</option>

            </select>
          </div>
          <div style={{ flex: 1, minWidth: 200 }}>
            <label style={css.label}>Parent 2</label>
            <select style={css.select} value={p2Id} onChange={e => setP2Id(e.target.value)}>
              <option value="">Select horse...</option>
              {horses.filter(h => h.id !== p1Id).map(h => (
                <option key={h.id} value={h.id}>{h.name || "Unnamed"} ({TEMPERAMENTS.find(t => t.id === h.temperament)?.label})</option>
              ))}
            </select>
          </div>
        </div>

      {analysis && (
        <div>

            <div style={css.card}>
              <div style={{ fontSize: "0.8rem", color: "#64748b" }}>Inheritance (Keep) Chance</div>
              <div style={{ fontSize: "1.5rem", fontWeight: 700, color: "#22c55e" }}>{Math.round(analysis.mode.keep * 100)}%</div>
              <div style={{ fontSize: "0.75rem", color: "#94a3b8" }}>Offspring keeps a parent's trait</div>
            </div>
            <div style={css.card}>
              <div style={{ fontSize: "0.8rem", color: "#64748b" }}>Mutation (Shift) Chance</div>

              <div style={{ fontSize: "0.75rem", color: "#94a3b8" }}>Offspring gets a new trait</div>

function loadMarches() {
  try { return JSON.parse(localStorage.getItem(MARCHES_KEY)) || []; }
  catch { return []; }
}
function saveMarches(marches) {
  localStorage.setItem(MARCHES_KEY, JSON.stringify(marches));
}

function getMarchAutoName(march) {
  if (!march.heroes || march.heroes.length === 0) return "Empty March";
  const commander = HEROES.find(h => h.name === march.heroes[0]);
  const cls = MILITARY_CLASSES.find(c => c.id === commander?.class);
  const unit = march.unitType || commander?.units?.[0] || "Mixed";
  const count = loadMarches().filter(m =>
    m.category === march.category && m.unitType === march.unitType &&
    m.heroes?.[0] === march.heroes?.[0] && m.id !== march.id
  ).length;
  return `${march.heroes[0]} ${cls?.label || ""} ${unit} ${count > 0 ? count + 1 : 1}`.trim();
}

function checkTroopBonus(march) {
  if (!march.heroes || march.heroes.length < 3) return { match: false, reason: "Need 3 heroes" };
  const heroData = march.heroes.map(h => HEROES.find(x => x.name === h)).filter(Boolean);
  if (heroData.length < 3) return { match: false, reason: "Unknown heroes" };
  const allUnitsMatch = march.unitType && heroData.every(h => h.units.includes(march.unitType));
  const classes = new Set(heroData.map(h => h.class));
  const allClassesUnique = classes.size === 3;
  if (allUnitsMatch && allClassesUnique) return { match: true, reason: "+180% Troop Bonus" };
  const issues = [];
  if (!allUnitsMatch) issues.push("Unit mismatch");
  if (!allClassesUnique) issues.push("Need W/M/T mix");
  return { match: false, reason: issues.join(", ") };
}

const TRAIT_RELEVANT_ICONS = ["damage", "shield", "heal", "gather"];

function HeroTraitHint({ heroName, isCommander, heroSkillSelections }) {
  const skills = HERO_SKILLS[heroName];
  if (!skills) return null;
  const activeSkills = [];
  if (isCommander && skills.commander?.name) activeSkills.push(skills.commander.name);
  if (skills.signature?.name) activeSkills.push(skills.signature.name);
  (heroSkillSelections || []).forEach(sel => { if (sel) activeSkills.push(sel); });
  const statCounts = {};
  const iconCounts = {};
  activeSkills.forEach(name => {
    const meta = SKILL_META[name];
    if (!meta) return;
    if (meta.stat !== "neutral") statCounts[meta.stat] = (statCounts[meta.stat] || 0) + 1;
    meta.icons.filter(ic => TRAIT_RELEVANT_ICONS.includes(ic)).forEach(ic => { iconCounts[ic] = (iconCounts[ic] || 0) + 1; });
  });
  if (Object.keys(statCounts).length === 0) return null;
  const topStat = Object.entries(statCounts).sort((a, b) => b[1] - a[1])[0];
  const relevantIcons = Object.entries(iconCounts).sort((a, b) => b[1] - a[1]).slice(0, 3);
  return (
    <span style={{ fontSize: "0.6rem", color: "#818cf8", marginLeft: "auto" }}>
      Trait: <span style={{ color: STAT_COLORS[topStat[0]] }}>{topStat[0]}</span>{relevantIcons.length > 0 && " "}{relevantIcons.map(([ic]) => ICON_SYMBOLS[ic]).join("")}
    </span>
  );
}

                              const newSelections = [...heroSkillSelections];
                              newSelections[slotIdx] = "";
                              const updatedSkills = { ...(march.heroSkills || {}), [heroName]: newSelections };
                              onUpdate({ ...march, heroSkills: updatedSkills });
                            }}>&times;</button>
                          </React.Fragment>
                        ) : (
                          <select style={{ ...css.select, width: "auto", fontSize: "0.7rem", padding: "2px 4px" }} value=""
                            onChange={e => {
                              if (e.target.value) {
                                const newSelections = [...heroSkillSelections];
                                while (newSelections.length <= slotIdx) newSelections.push("");
                                newSelections[slotIdx] = e.target.value;
                                const updatedSkills = { ...(march.heroSkills || {}), [heroName]: newSelections };
                                onUpdate({ ...march, heroSkills: updatedSkills });
                              }
                            }}>
                            <option value="">+ Add skill...</option>
                            {available.map(s => {
                              const asd = skillDisplay(s.name);
                              return <option key={s.name} value={s.name}>{asd.icons} {s.name} ({s.type})</option>;
                            })}
                          </select>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
              {!skills && (
                <div style={{ paddingLeft: "0.5rem", fontSize: "0.7rem", color: "#475569", fontStyle: "italic" }}>
                  Skill data not yet available for this hero
                </div>
              )}
              {(() => {
                const assignKey = `${march.id}|${heroName}`;
                const assignedHorse = horses.find(h => h.assignedTo === assignKey);
                return (
                  <div style={{ paddingLeft: "0.5rem", marginTop: "0.3rem", paddingTop: "0.3rem", borderTop: "1px solid #1e293b" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: "0.4rem" }}>
                      <span style={{ fontSize: "0.65rem", color: "#64748b" }}>Mount:</span>
                      {assignedHorse ? (
                        <React.Fragment>
                          <span style={{ fontSize: "0.75rem", color: RARITIES.find(r => r.id === assignedHorse.rarity)?.color }}>{assignedHorse.name || "Unnamed"}</span>
                          <button style={{ ...css.deleteBtn, fontSize: "0.7rem" }} onClick={() => onUnassignHorse(assignedHorse.id)}>&times;</button>
                        </React.Fragment>
                      ) : (
                        <select style={{ ...css.select, width: "auto", fontSize: "0.7rem", padding: "2px 4px" }} value=""
                          onChange={e => { if (e.target.value) onAssignHorse(e.target.value, assignKey); }}>
                          <option value="">+ Assign...</option>
                          {unassigned.map(h => <option key={h.id} value={h.id}>{h.name || "Unnamed"} ({RARITIES.find(r => r.id === h.rarity)?.label})</option>)}
                        </select>
                      )}
                      <HeroTraitHint heroName={heroName} isCommander={i === 0} heroSkillSelections={heroSkillSelections} />
                    </div>
                  </div>
                );
              })()}
            </div>
          );
        })}
        {(march.heroes || []).length < 3 && (
          <select style={{ ...css.select, marginTop: "0.25rem", fontSize: "0.8rem" }} value=""
            onChange={e => { if (e.target.value) { const updated = { ...march, heroes: [...(march.heroes || []), e.target.value] }; onUpdate(updated); } }}>
            <option value="">+ Add hero...</option>
            {HEROES.filter(h => !(march.heroes || []).includes(h.name)).sort((a, b) => a.name.localeCompare(b.name)).map(h => {
              const cls = MILITARY_CLASSES.find(c => c.id === h.class);
              return <option key={h.name} value={h.name}>{h.name} ({cls?.label} / {h.units.join(", ")})</option>;
            })}
          </select>
        )}
      </div>

    </div>
  );
}

function MarchPlannerTab({ horses, setHorses }) {
  const [marches, setMarches] = useState(loadMarches);

  const addMarch = (category) => {
    const newMarch = { id: Date.now().toString(), category, unitType: "", heroes: [], heroSkills: {}, name: "" };
    const updated = [...marches, newMarch];
    setMarches(updated);
    saveMarches(updated);
  };

  const updateMarch = (march) => {
    const updated = marches.map(m => m.id === march.id ? march : m);
    setMarches(updated);
    saveMarches(updated);
  };

  const deleteMarch = (id) => {
    const updated = marches.filter(m => m.id !== id);
    setMarches(updated);
    saveMarches(updated);
    const horsesUpdated = horses.map(h => h.assignedTo?.startsWith(id + "|") ? { ...h, assignedTo: "" } : h);
    setHorses(horsesUpdated);
    saveStable(horsesUpdated);
  };

  const assignHorse = (horseId, assignKey) => {
    const updated = horses.map(h => h.id === horseId ? { ...h, assignedTo: assignKey } : h);
    setHorses(updated);
    saveStable(updated);
  };

  const unassignHorse = (horseId) => {
    const updated = horses.map(h => h.id === horseId ? { ...h, assignedTo: "" } : h);
    setHorses(updated);
    saveStable(updated);
  };

  const catConfig = [
    { id: "combat", label: "Combat", color: "#ef4444" },
    { id: "gathering", label: "Gathering", color: "#fbbf24" },
    { id: "siege", label: "Siege", color: "#a855f7" },
  ];

  const totalHeroSlots = marches.reduce((acc, m) => acc + (m.heroes?.length || 0), 0);
  const assignedCount = horses.filter(h => h.assignedTo).length;

  return (
    <div>
      <div style={{ fontSize: "0.9rem", color: "#94a3b8", marginBottom: "0.5rem" }}>
        {marches.length} marches configured | {assignedCount}/{totalHeroSlots} mounts assigned |
        Each hero gets 1 mount | +180% bonus requires all 3 unit types + all 3 military classes match
      </div>
      <div style={{ display: "flex", gap: "1rem", flexWrap: "wrap", marginBottom: "1rem", padding: "0.4rem 0.6rem", background: "#1e293b", borderRadius: 6, fontSize: "0.7rem" }}>
        <span style={{ color: "#64748b", fontWeight: 600 }}>Skill colors:</span>
        <span style={{ color: STAT_COLORS.might }}>Might</span>
        <span style={{ color: STAT_COLORS.strategy }}>Strategy</span>
        <span style={{ color: STAT_COLORS.armor }}>Armor</span>
        <span style={{ color: STAT_COLORS.siege }}>Siege</span>
        <span style={{ color: "#64748b" }}>|</span>
        <span style={{ color: "#64748b", fontWeight: 600 }}>Icons:</span>
        <span>{ICON_SYMBOLS.damage} Damage</span>
        <span>{ICON_SYMBOLS.shield} Reduction</span>
        <span>{ICON_SYMBOLS.heal} Recovery</span>
        <span>{ICON_SYMBOLS.gather} Gathering</span>
        <span>{ICON_SYMBOLS.buff} Buff</span>
        <span>{ICON_SYMBOLS.debuff} Debuff</span>
      </div>

      {catConfig.map(cat => {
        const catMarches = marches.filter(m => m.category === cat.id);
        return (
          <div key={cat.id} style={{ marginBottom: "1.5rem" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.75rem" }}>
              <h3 style={{ color: cat.color, fontSize: "1rem", margin: 0 }}>{cat.label} Marches ({catMarches.length})</h3>
              <button style={css.btn(cat.color)} onClick={() => addMarch(cat.id)}>+ Add March</button>
            </div>
            {catMarches.length === 0 && (
              <div style={{ fontSize: "0.85rem", color: "#475569", padding: "1rem", textAlign: "center" }}>
                No {cat.label.toLowerCase()} marches configured yet.
              </div>
            )}
            <div style={css.grid}>
              {catMarches.map(march => (
                <MarchCard key={march.id} march={march} horses={horses}
                  onUpdate={updateMarch} onDelete={deleteMarch}
                  onAssignHorse={assignHorse} onUnassignHorse={unassignHorse} />
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function ReferenceTab() {
  return (
    <div>
      <div style={css.card}>
        <h3 style={{ color: "#fbbf24", margin: "0 0 1rem", fontSize: "1.1rem" }}>Temperament Guide</h3>
        <div style={{ marginBottom: "1rem" }}>
          <div style={{ fontSize: "0.8rem", color: "#64748b", marginBottom: "0.5rem", fontWeight: 600 }}>TRAIT POOL OWNERS (determine mutation outcome)</div>
          <div style={{ display: "grid", gap: "0.5rem" }}>
            {TEMPERAMENTS.filter(t => t.group === "pool").map(t => (
              <div key={t.id} style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
                <span style={{ ...css.badge(t.color), minWidth: 90, textAlign: "center" }}>{t.label}</span>
                <span style={{ fontSize: "0.85rem", color: "#cbd5e1" }}>{t.effect}</span>
              </div>
            ))}
          </div>
        </div>
        <div>
          <div style={{ fontSize: "0.8rem", color: "#64748b", marginBottom: "0.5rem", fontWeight: 600 }}>MODE MODIFIERS (affect inherit vs mutate chance)</div>
          <div style={{ display: "grid", gap: "0.5rem" }}>
            {TEMPERAMENTS.filter(t => t.group === "mode").map(t => (
              <div key={t.id} style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
                <span style={{ ...css.badge(t.color), minWidth: 90, textAlign: "center" }}>{t.label}</span>
                <span style={{ fontSize: "0.85rem", color: "#cbd5e1" }}>{t.effect}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div style={css.card}>
        <h3 style={{ color: "#fbbf24", margin: "0 0 1rem", fontSize: "1.1rem" }}>Attribute Ranges by Rarity (Sum)</h3>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: "0.75rem" }}>
          {RARITIES.map(r => {
            const range = ATTRIBUTE_RANGES[r.id];
            return (
              <div key={r.id} style={{ padding: "0.75rem", background: "#0f172a", borderRadius: 8, border: `1px solid ${r.color}30` }}>
                <div style={{ fontWeight: 600, color: r.color, marginBottom: "0.25rem" }}>{r.label}</div>
                <div style={{ fontSize: "0.85rem", color: "#94a3b8" }}>
                  Attributes: {range.numAttrs} | Sum: {range.sumMin} — {range.sumMax}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={css.card}>
        <h3 style={{ color: "#fbbf24", margin: "0 0 1rem", fontSize: "1.1rem" }}>Rarity Breeding Outcomes</h3>
        <div style={{ fontSize: "0.85rem", color: "#cbd5e1", lineHeight: 1.8 }}>
          {Object.entries(RARITY_BREEDING_OUTCOMES).map(([key, outcomes]) => (
            <div key={key} style={{ marginBottom: "0.25rem" }}>
              <span style={{ color: "#94a3b8" }}>{key}:</span>{" "}
              {outcomes.map((o, i) => {
                const r = RARITIES.find(x => x.id === o.rarity);
                return <span key={i}>{i > 0 && " | "}<span style={{ color: r?.color }}>{r?.label} {Math.round(o.chance * 100)}%</span></span>;
              })}
            </div>
          ))}
        </div>
      </div>

      <div style={css.card}>
        <h3 style={{ color: "#fbbf24", margin: "0 0 1rem", fontSize: "1.1rem" }}>Trait Quality Tiers</h3>
        <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap" }}>
          {TRAIT_QUALITIES.map(q => (
            <span key={q.id} style={{ ...css.badge(q.color), fontSize: "0.85rem", padding: "0.35rem 0.75rem" }}>{q.label}</span>
          ))}
        </div>
        <div style={{ fontSize: "0.8rem", color: "#64748b", marginTop: "0.5rem" }}>
          Grey &rarr; Green &rarr; Blue &rarr; Purple &rarr; Gold &rarr; Orange (highest)
        </div>
      </div>

      <div style={css.card}>
        <h3 style={{ color: "#fbbf24", margin: "0 0 1rem", fontSize: "1.1rem" }}>Breeding Mechanics</h3>
        <ul style={{ margin: 0, padding: "0 0 0 1.25rem", color: "#cbd5e1", fontSize: "0.85rem", lineHeight: 1.8 }}>
          <li>Both parents are <strong style={{ color: "#ef4444" }}>consumed</strong> in breeding (lost permanently)</li>
          <li><strong>Temperament inheritance:</strong> Same on both parents = 90% keep, 10%/6 for others. Different = 30% each parent's, 40%/5 for others</li>
          <li><strong>Trait mode:</strong> 50/50 base split between Inherit (keep parent trait) and Mutate (new trait)</li>
          <li><strong>Spirited:</strong> shifts +5% toward mutation | <strong>Docile:</strong> shifts +5% toward inheritance</li>
          <li><strong>Same trait on both parents:</strong> 80% to inherit that exact trait</li>
          <li><strong>Different traits:</strong> 50% chance for each parent's trait</li>
          <li><strong>On mutation:</strong> ~80% chance to draw from offspring's temperament pool (if pool owner), ~20% from others</li>
          <li>Celestial Chargers have 3 attributes; all others have 2</li>
          <li>Mass breeding: multiple pairs simultaneously, same rules per pair</li>
        </ul>
      </div>

      <div style={css.card}>
        <h3 style={{ color: "#fbbf24", margin: "0 0 1rem", fontSize: "1.1rem" }}>Temperament Inheritance Rates</h3>
        <ul style={{ margin: 0, padding: "0 0 0 1.25rem", color: "#cbd5e1", fontSize: "0.85rem", lineHeight: 1.8 }}>
          <li><strong>Warbred:</strong> 80.19% chance to "respect" (draw from Might pool)</li>
          <li><strong>Alert:</strong> 80.19% (Strategy pool)</li>
          <li><strong>Fearless:</strong> 78.95% (Universal pool)</li>
          <li><strong>Protective:</strong> 80.17% (Healing pool)</li>
        </ul>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("stable");
  const [horses, setHorses] = useState(loadStable);

  const tabs = [
    { id: "stable", label: "Stable" },
    { id: "breeding", label: "Breeding Optimizer" },
    { id: "probability", label: "Probability Calc" },
    { id: "planner", label: "March Planner" },
    { id: "reference", label: "Reference" },
  ];

  return (
    <div style={css.container}>
      <div style={css.header}>
        <h1 style={css.title}>Horse Breeding Optimizer</h1>
        <div style={css.subtitle}>Age of Empires Mobile — Mount Management & Breeding Strategy</div>
      </div>

      <div style={css.tabs}>
        {tabs.map(t => (
          <div key={t.id} style={css.tab(tab === t.id)} onClick={() => setTab(t.id)}>{t.label}</div>
        ))}
      </div>

      {tab === "stable" && <StableTab horses={horses} setHorses={setHorses} />}
      {tab === "breeding" && <BreedingTab horses={horses} />}
      {tab === "probability" && <ProbabilityTab horses={horses} />}
      {tab === "planner" && <MarchPlannerTab horses={horses} setHorses={setHorses} />}
      {tab === "reference" && <ReferenceTab />}

      <div style={{ textAlign: "center", marginTop: "2rem", fontSize: "0.75rem", color: "#475569" }}>
        Data persists in browser localStorage. Export your stable regularly.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
