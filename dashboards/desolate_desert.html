    <link rel="stylesheet" href="../assets/kvk-theme.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { max-width: 100%; overflow-x: hidden; }
        body { margin: 0; background: #0a0c14; font-family: 'Barlow', system-ui, sans-serif; color: #e8eaf0; }
        /* pin the tab bar to the top while scrolling within a tab */
        .tabs {
            position: sticky; top: 0; z-index: 50;
            background: #0a0c14;
            box-shadow: 0 6px 14px -8px rgba(0,0,0,0.9);
        }
        /* Tower of Rotation awakening slots (Trial-of-Scion style states) */
        .tor-slot { transition: opacity .3s, border-color .3s, background .3s; }
        .tor-slot.is-passed { opacity: 0.4; }
        .tor-slot.is-next { box-shadow: 0 0 0 1px #7c3aed88; }
        .tor-slot.is-live {
            border-color: #facc15 !important;
            background: rgba(250,204,21,0.14) !important;
            animation: torPulse 1.4s ease-in-out infinite;
        }
        @keyframes torPulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(250,204,21,0.55); }
            50%     { box-shadow: 0 0 0 5px rgba(250,204,21,0); }
        }
        @media (prefers-reduced-motion: reduce) { .tor-slot.is-live { animation: none; box-shadow: 0 0 0 2px #facc15; } }
        /* map: a "building" route grows/flows like a progress bar */
        .route-building { stroke-dasharray: 3 3; animation: routeFlow 1.1s linear infinite; }
        @keyframes routeFlow { to { stroke-dashoffset: -6; } }
        /* map: a node under siege pulses red */
        .node-siege { animation: siegePulse 1s ease-in-out infinite; }
        @keyframes siegePulse { 0%,100% { stroke: #ef4444; stroke-width: 0.5; } 50% { stroke: #ef4444; stroke-width: 1.4; } }
        @media (prefers-reduced-motion: reduce) { .route-building, .node-siege { animation: none; } }
        /* small blinking dot used in the Tower schedule "LIVE" label */
        .tor-live-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#facc15;
            box-shadow:0 0 6px #facc15; animation: torDotBlink 1.2s ease-in-out infinite; }
        @keyframes torDotBlink { 0%,100%{opacity:1;} 50%{opacity:0.25;} }
        /* header Tower badge — pulses, shows the live level, jumps to the schedule */
        .tor-badge {
            position: absolute; right: 16px; bottom: 14px; z-index: 12;
            display: inline-flex; align-items: center; gap: 7px;
            padding: 6px 12px 6px 10px; border-radius: 999px; cursor: pointer;
            background: rgba(250,204,21,0.12); border: 1px solid #facc15; color: #facc15;
            font-family: 'Barlow Condensed', sans-serif; font-weight: 700; letter-spacing: 0.5px;
            text-decoration: none; animation: torBadgePulse 1.6s ease-in-out infinite;
        }
        .tor-badge:hover { background: rgba(250,204,21,0.22); }
        /* idle (event not live): greyed, no pulse, still clickable */
        .tor-badge.is-idle {
            background: rgba(148,163,184,0.10); border-color: #475569; color: #94a3b8;
            animation: none;
        }
        .tor-badge.is-idle:hover { background: rgba(148,163,184,0.20); }
        .tor-badge.is-idle .tb-ico { filter: grayscale(1); opacity: 0.7; }
        .tor-badge .tb-ico { font-size: 17px; line-height: 1; }
        .tor-badge .tb-lvl { font-size: 13px; }
        @keyframes torBadgePulse { 0%,100%{ box-shadow:0 0 0 0 rgba(250,204,21,0.5);} 50%{ box-shadow:0 0 0 6px rgba(250,204,21,0);} }
        @media (prefers-reduced-motion: reduce){ .tor-badge{ animation:none; } .tor-live-dot{ animation:none; } }
        /* header pill cluster (Tower badge + icon buttons), bottom-right of header */
        .hdr-pills { position: absolute; right: 16px; bottom: 14px; z-index: 12; display: inline-flex; align-items: center; gap: 6px; }
        .hdr-pills .tor-badge { position: static; }
        .hdr-pills-top { position: absolute; right: 16px; top: 14px; z-index: 12; display: inline-flex; align-items: center; gap: 6px; }
        @media (max-width: 520px){
            .hdr-pills-top{ right: 10px; top: 10px; }
            /* keep the Tower badge pinned bottom-right; reserve space below the
               header content so it can't overlap the calendar/Aaru row. */
            .hdr-pills{ right: 10px; bottom: 10px; }
            .dd-header{ padding-bottom: 58px !important; }
            .tor-badge .tb-lvl{ font-size:12px; }
        }
        .hdr-icobtn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 32px; height: 32px; border-radius: 999px; cursor: pointer;
            background: rgba(148,163,184,0.10); border: 1px solid #475569; color: #cbd5e1;
            font-size: 15px; line-height: 1; text-decoration: none; transition: background .15s, border-color .15s;
        }
        .hdr-icobtn:hover { background: rgba(148,163,184,0.22); border-color: #7b8496; }
        /* Tower-live popup modal (Trial-of-Scion style) */
        .tor-modal { position: fixed; inset: 0; z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; background: rgba(0,0,0,0.82); }
        .tor-modal-card { position: relative; max-width: 380px; width: 100%; background: #11141f; border: 1px solid #facc15; border-radius: 14px; padding: 26px 22px 22px; text-align: center; box-shadow: 0 0 40px rgba(250,204,21,0.2); }
        .tor-modal-ico { font-size: 40px; line-height: 1; }
        .tor-modal-card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 1.5px; color: #facc15; margin: 8px 0 14px; }
        .tor-modal-close { position: absolute; top: 8px; right: 14px; font-size: 24px; line-height: 1; color: #64748b; cursor: pointer; font-family: sans-serif; }
        .tor-modal-close:hover { color: #e8eaf0; }
        .tor-modal-lvl { font-family: 'Bebas Neue', sans-serif; font-size: 30px; color: #e8eaf0; line-height: 1; }
        .tor-modal-cd { font-variant-numeric: tabular-nums; font-size: 22px; font-weight: 700; color: #facc15; }
    </style>
</head>

// Which condensed stage are we in right now (last one whose startISO <= now)?
function currentStageIndex() {
  const now = Date.now();
  let idx = -1;
  STAGES.forEach((s, i) => { if (now >= Date.parse(s.startISO)) idx = i; });
  return idx; // -1 if before Day 1
}

// Reusable Kingdom Desert-Star proportional bar (Orange>Blue>Purple>Green).
function KingdomBar({ compact }) {
  const ORDER = ["Era #019", "Era #023", "Era 8", "Era #014"];
  const GRAD = {
    "Era #019": { grad: "linear-gradient(90deg, #b4500f, #f5731f)", top: "#f5731f" },
    "Era #023": { grad: "linear-gradient(90deg, #2456a0, #3d7cc4)", top: "#5b9bd8" },
    "Era 8":    { grad: "linear-gradient(90deg, #6d28d9, #9b6dff)", top: "#b18cff" },
    "Era #014": { grad: "linear-gradient(90deg, #1f7a4d, #3daa6d)", top: "#4fc386" },
  };
  const ptsFor = (srv) => { const row = (KINGDOM_SCOREBOARD || []).find(k => k.server === srv); return row ? Number(String(row.points).replace(/,/g, "")) : 0; };
  const segs = ORDER.map(srv => ({ srv, g: GRAD[srv], pts: ptsFor(srv), us: srv === "Era 8" }));
  const total = segs.reduce((s, x) => s + x.pts, 0);
  if (!total) return <div style={{ fontSize: "12px", color: "#64748b" }}>Awaiting scoreboard data.</div>;
  const fmt = (n) => n >= 1e9 ? (n/1e9).toFixed(2) + "B" : n >= 1e6 ? (n/1e6).toFixed(0) + "M" : n.toLocaleString();
  return (
    <div>
      <div style={{ display: "flex", width: "100%", marginBottom: "6px" }}>
        {segs.map(s => { const pct = (s.pts / total) * 100; return (
          <div key={s.srv} style={{ width: pct + "%", textAlign: "center", padding: "0 2px", overflow: "hidden" }}>
            {pct >= 8 ? <div style={{ fontSize: "12px", fontWeight: 700, color: s.g.top, lineHeight: 1.2, whiteSpace: "nowrap" }}>{s.srv}{s.us ? " (Us)" : ""}</div> : null}
            {pct >= 8 ? <div style={{ fontSize: "12px", fontWeight: 600, color: "#cbd5e1", lineHeight: 1.2, fontVariantNumeric: "tabular-nums", whiteSpace: "nowrap" }}>{fmt(s.pts)}</div> : null}
          </div>
        ); })}
      </div>
      <div style={{ display: "flex", width: "100%", height: "22px", borderRadius: "6px", overflow: "hidden", border: "1px solid #334155" }}>
        {segs.map(s => { const pct = (s.pts / total) * 100; return (
          <div key={s.srv} title={s.srv + ": " + s.pts.toLocaleString() + " (" + pct.toFixed(1) + "%)"} style={{ width: pct + "%", background: s.g.grad, borderRight: "1px solid rgba(0,0,0,0.3)" }} />
        ); })}
      </div>
    </div>
  );
}

// Horizontal condensed schedule line with a pulsing dot on the current stage.
function StageLine() {
  const cur = currentStageIndex();
  // A stage is "reached" (bright) once we're at it or past it; future = dark.
  const reached = (i) => cur >= 0 && i <= cur;
  const zoneOf = (s) => STAGE_ZONE[s.zone] || { bright: "#475569", dark: "#334155", label: "" };
  // Contiguous zone runs. Each label is centered on the MIDPOINT of that zone's
  // colored line span (from its first dot to the dot where the next zone begins),
  // so ZONE 2 lands over the Day 3-5 dot rather than between Day 2 and Day 3-5.
  const N = STAGES.length;
  const dotPct = (i) => ((i + 0.5) / N) * 100;
  const runs = [];
  STAGES.forEach((s, i) => {
    const last = runs[runs.length - 1];
    if (last && last.zone === s.zone) last.lastIdx = i;
    else runs.push({ zone: s.zone, firstIdx: i, lastIdx: i });
  });
  return (
    <div>
      {/* zone labels — absolutely positioned at each zone's line-span midpoint */}
      <div style={{ position: "relative", height: "18px", marginBottom: "6px" }}>
        {runs.map(r => {
          const z = STAGE_ZONE[r.zone] || {};
          const anyReached = cur >= r.firstIdx;
          const centerPct = (dotPct(r.firstIdx) + dotPct(Math.min(r.lastIdx + 1, N - 1))) / 2;
          return (
            <span key={r.zone + r.firstIdx} style={{ position: "absolute", left: centerPct + "%", transform: "translateX(-50%)", fontFamily: "'Barlow Condensed', sans-serif", fontSize: "12px", fontWeight: 700, letterSpacing: "1px", textTransform: "uppercase", whiteSpace: "nowrap", color: anyReached ? z.bright : z.dark }}>{z.label}</span>
          );
        })}
      </div>
      {/* dots + connecting lines */}
      <div style={{ display: "flex", alignItems: "flex-start", gap: "0" }}>
        {STAGES.map((s, i) => {
          const now = i === cur;
          const z = zoneOf(s);
          const dotOn = reached(i);
          const dotColor = now ? "#f5731f" : (dotOn ? z.bright : z.dark);
          const dotBorder = dotColor;
          // line to the NEXT dot represents this span; bright once we've reached this stage.
          const lineOn = cur >= i;
          const lineColor = lineOn ? z.bright : z.dark;
          const dayLbl = s.days.length > 1 ? `Day ${s.days[0]}–${s.days[s.days.length-1]}` : `Day ${s.days[0]}`;
          const labelCol = now ? "#f5731f" : (dotOn ? z.bright : z.dark);
          return (
            <div key={s.key} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", textAlign: "center", position: "relative" }}>
              {i < STAGES.length - 1 ? <div style={{ position: "absolute", top: "7px", left: "50%", width: "100%", height: "3px", background: lineColor }} /> : null}
              <div className={now ? "live-pulse" : ""} style={{ width: "16px", height: "16px", borderRadius: "50%", background: dotColor, border: `2px solid ${dotBorder}`, position: "relative", zIndex: 2 }} />
              <div style={{ fontSize: "10px", fontWeight: 700, color: labelCol, marginTop: "6px", textTransform: "uppercase", letterSpacing: "0.5px" }}>{dayLbl}</div>
              <div style={{ fontSize: "11px", color: now ? "#e8eaf0" : (dotOn ? "#94a3b8" : "#64748b"), marginTop: "2px", lineHeight: 1.25, padding: "0 4px" }}>{s.label}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// Rules-of-Engagement stoplight grid: one row per opposing server, a bright
// circle per escalating column, plus an overall stance chip.
function DiplomacyStatus() {
  // bright, high-visibility palette
  const GREEN = "#22c55e", RED = "#ef4444", GREY = "#9ca3af", ORANGE = "#f97316", YELLOW = "#facc15";
  const stance = (row) => {
    if (row.ally) return { color: GREEN, label: "Ally", desc: "Side with them everywhere" };
    const n = ROE_COLUMNS.filter(c => row.fight[c.key]).length;
    const total = ROE_COLUMNS.length;
    if (n === 0) return { color: GREY, label: "Retaliate only", desc: "Don't initiate — hit back only" };
    if (n === total) return { color: RED, label: "Hostile", desc: "Fight on all fronts" };
    if (n >= total / 2) return { color: ORANGE, label: "Aggressive", desc: `Fight ${n}/${total} fronts` };
    return { color: YELLOW, label: "Cautious", desc: `Fight ${n}/${total} fronts` };
  };
  return (
    <div style={S.card}>
      <div style={S.cardTitle}>Rules of Engagement — Opposing Servers</div>
      <div style={{ overflowX: "auto" }}>
        <table style={{ ...S.table, minWidth: "620px" }}>
          <thead>
            <tr>
              <th style={S.th}>Server</th>
              <th style={{ ...S.th, textAlign: "center" }}>Stance</th>
              {ROE_COLUMNS.map(c => <th key={c.key} style={{ ...S.th, textAlign: "center" }}>{c.label}</th>)}
            </tr>
          </thead>
          <tbody>
            {DIPLOMACY_ROE.map(row => {
              const st = stance(row);
              const c = serverColor(row.server);
              return (
                <tr key={row.server}>
                  <td style={{ ...S.td, fontWeight: 700, color: c.hex, whiteSpace: "nowrap" }}>{row.server}</td>
                  <td style={{ ...S.td, textAlign: "center", whiteSpace: "nowrap" }}>
                    <span style={{ display: "inline-block", padding: "2px 10px", borderRadius: "999px", fontSize: "11px", fontWeight: 800, letterSpacing: "0.5px", textTransform: "uppercase", background: st.color + "26", color: st.color, border: `1px solid ${st.color}` }} title={st.desc}>{st.label}</span>
                  </td>
                  {ROE_COLUMNS.map(col => {
                    const fight = row.ally ? false : !!row.fight[col.key];
                    const dot = row.ally ? GREEN : (fight ? RED : GREY);
                    const glyph = row.ally ? "🤝" : (fight ? "⚔️" : "✋");
                    return (
                      <td key={col.key} style={{ ...S.td, textAlign: "center" }}>
                        <span title={fight ? "Fight" : (row.ally ? "Ally" : "Leave alone / retaliate only")}
                          style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: "22px", height: "22px", borderRadius: "50%", background: dot, boxShadow: `0 0 8px ${dot}99`, fontSize: "11px" }}>{glyph}</span>
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// Which server each alliance belongs to (for map/table coloring).
const ALLIANCE_SERVER = {
  WC1: "Era 8", REU: "Era 8", AGC: "Era 8", MyT: "Era 8",
  LOD: "Era #023", boi: "Era #023", R65: "Era #023", ILF: "Era #023",
  X14: "Era #014", "Ȼ14": "Era #014", GnG: "Era #014", L14: "Era #014",
  XIX: "Era #019", KNY: "Era #019", PBJ: "Era #019", DXR: "Era #019",
};
const OUR_ALLIANCES = ["WC1", "REU", "AGC", "MyT"];
// Owner → line/dot color. Our 4 alliances get distinct colors (per mode); every
// opponent alliance normally uses its muted server-corner color. When `focus`
// (a server name) is set and this owner belongs to it, break out into the
// per-alliance shade family so that server's alliances become distinguishable.
function ownerColor(owner, mode, focus) {
  const srv = ALLIANCE_SERVER[owner] || owner;
  if (focus && srv === focus) {
    const shade = (SERVER_ALLIANCE_SHADES[srv] || {})[owner];
    if (shade) return shade;
  }
  if (srv === "Era 8") return allianceColor(owner, mode);
  return serverColor(srv).hex;
}
// Placer-gold /h a node yields to whoever holds it (0 for towers/Aaru).
function nodePerHour(n) {
  if (!n) return 0;
  if (n.type === "city") return 8000;
  if (n.type === "gate") return n.info && n.info.includes("Z2→Z3") ? 8000 : (n.info && n.info.includes("Z2↔Z2") ? 4000 : 3000);
  return 0; // tower, aaru
}
// The unique buff key a node grants (cities + towers only), matching BUFF_COLUMNS keys.
function nodeBuffKey(n) {
  if (!n || !n.info) return null;
  const i = n.info;
  if (n.type === "city") return i.includes("Health") ? "health" : i.includes("Attack") ? "attack" : i.includes("Defense") ? "defense" : null;
  if (n.type === "tower") return i.includes("Reduction") ? "dmgReduction" : i.includes("Damage") ? "damage" : null;
  return null;
}
// darken a #rrggbb toward black by factor f (0..1) — for the "dimmed" display states.
function dimHex(hex, f) {
  const m = /^#?([0-9a-f]{6})$/i.exec(hex || ""); if (!m) return hex;
  const n = parseInt(m[1], 16);
  const r = Math.round(((n>>16)&255) * f), g = Math.round(((n>>8)&255) * f), bl = Math.round((n&255) * f);
  return "#" + [r,g,bl].map(v => v.toString(16).padStart(2,"0")).join("");
}
// Default "active" (capturable) state by node, derived from the event day:
//   towers active Day 3+ (2026-07-08); inner Z3 gates active Day 6+ (2026-07-11);
//   Aaru Day 7+ (2026-07-12); everything else active from Day 1. Overridable via
//   MAP_STATE[id].active.
function nodeActiveDefault(n, now) {
  const today = new Date(now).toISOString().slice(0,10);
  if (!n) return true;
  if (n.type === "tower") return today >= "2026-07-08";
  if (n.type === "aaru") return today >= "2026-07-12";
  if (n.type === "gate" && n.info && n.info.includes("Z2→Z3")) return today >= "2026-07-11";
  return true;
}

//   siege     — under attack? renders a pulsing red ring.

  // node_id: { active: true, occupant: "WC1", connected: true },

// Planned node ownership, derived from the planned routes: each node a route
// touches is "owned" by that route's alliance on the plan map. Overrides pin
// down the intended split where routes overlap or a claim should be narrowed:
//   AGC owns nothing; REU owns Vengeance Fort + Tower 1 (but not city_crocodile).
const PLAN_OWNER_OVERRIDE = {
  ruler_fort: "WC1", city_bull: "WC1", tower_2: "WC1",   // WC1+AGC overlap → WC1
  city_crocodile: "WC1",                                  // WC1+REU overlap → WC1
  vengeance_fort: "REU", tower_1: "REU",                  // REU: Vengeance Fort + Tower 1
};
function planOwners() {
  const owners = {};
  for (const r of (MAP_ROUTES.planned || [])) {
    for (const id of r.path) if (!(id in owners)) owners[id] = r.owner;
  }
  for (const [id, tag] of Object.entries(PLAN_OWNER_OVERRIDE)) {
    if (tag === null) delete owners[id]; else owners[id] = tag;
  }
  // AGC owns nothing on the plan map.
  for (const id of Object.keys(owners)) if (owners[id] === "AGC") delete owners[id];
  return owners;
}

// Derive per-alliance holdings from MAP_STATE: placer/h (all occupied nodes) and
// the set of active buffs (connected occupied cities/towers only).
function allianceFromMap(tag) {
  let perHour = 0; const buffs = new Set(); let pillars = 0, gates = 0, towers = 0;
  for (const [id, st] of Object.entries(MAP_STATE)) {
    if (st.occupant !== tag) continue;
    const n = MAP_NODES[id]; if (!n) continue;
    perHour += nodePerHour(n);
    if (n.type === "city") pillars++; else if (n.type === "gate") gates++; else if (n.type === "tower") towers++;
    if (st.connected) { const bk = nodeBuffKey(n); if (bk) buffs.add(bk); }
  }
  return { perHour, buffs, pillars, gates, towers };
}

// Minimap + SVG overlay. mode: "live" (actual state) or "plan" (original plan).
// hl/setHl: highlighted alliance tag (shared with the Node Control table).
function MapOverlay({ mode = "live", hl, setHl, pinned, focus, setFocus }) {
  const [now, setNow] = React.useState(() => Date.now());
  const [cursor, setCursor] = React.useState(null); // {x,y} px within wrapper, for the tag tooltip
  const [hoverNode, setHoverNode] = React.useState(null); // node id under the cursor (enlarge + white ring)
  const wrapRef = React.useRef(null);
  const planOwn = React.useMemo(() => (mode === "plan" ? planOwners() : {}), [mode]);
  React.useEffect(() => { const id = setInterval(() => setNow(Date.now()), 30000); return () => clearInterval(id); }, []);
  const hoverOn = (tag, e) => { if (!pinned) setHl(tag); if (e && wrapRef.current) { const r = wrapRef.current.getBoundingClientRect(); setCursor({ x: e.clientX - r.left, y: e.clientY - r.top, tag }); } };
  const hoverOff = () => { if (!pinned) setHl(null); setCursor(null); };
  // Server focus (live only): only the focused server's owners stay lit.
  const srvOf = (owner) => ALLIANCE_SERVER[owner] || owner;
  const outOfFocus = (owner) => focus && srvOf(owner) !== focus;
  // when a highlight is active, everything else fades; a focused server also
  // fades all non-member owners.
  const dimmed = (owner) => (hl && owner !== hl) || outOfFocus(owner);
  const col = (owner) => ownerColor(owner, mode, focus);   // focus-aware color
  const pt = (id) => { const n = MAP_NODES[id]; return n ? { x: n.x, y: n.y } : null; };
  const NEUTRAL = "#d9dde6";
  const routes = (mode === "plan" ? MAP_ROUTES.planned : MAP_ROUTES.actual) || [];

  // Parallel-offset: routes sharing an undirected edge fan out so they don't overlap.
  // Assign each route a slot per edge; offset the whole route by its max slot.
  const edgeKey = (a, b) => a < b ? a + "|" + b : b + "|" + a;
  const edgeSlots = {};           // edgeKey -> [routeIdx,...]
  routes.forEach((r, ri) => {
    for (let k = 0; k < r.path.length - 1; k++) {
      const ek = edgeKey(r.path[k], r.path[k+1]);
      (edgeSlots[ek] = edgeSlots[ek] || []).push(ri);
    }
  });
  // per-route offset index = its position among routes sharing its busiest edge
  const routeOffset = routes.map((r, ri) => {
    let slot = 0, total = 1;
    for (let k = 0; k < r.path.length - 1; k++) {
      const arr = edgeSlots[edgeKey(r.path[k], r.path[k+1])];
      if (arr && arr.length > total) { total = arr.length; slot = arr.indexOf(ri); }
    }
    return (slot - (total - 1) / 2) * 0.9;   // centered spread, ~0.9% units apart
  });
  // build an offset polyline: shift each segment perpendicular by `off`
  const offsetLine = (path, off) => {
    const p = path.map(pt).filter(Boolean);
    if (p.length < 2 || !off) return p.map(q => q.x + "," + q.y).join(" ");
    return p.map((q, i) => {
      const a = p[Math.max(0, i-1)], b = p[Math.min(p.length-1, i+1)];
      let dx = b.x - a.x, dy = b.y - a.y; const len = Math.hypot(dx, dy) || 1;
      const nx = -dy/len, ny = dx/len;    // unit normal
      return (q.x + nx*off) + "," + (q.y + ny*off);
    }).join(" ");
  };
  const sshPoint = (r, off) => {
    const p = r.path.map(pt).filter(Boolean); if (!p.length) return null;
    let a, b;
    if (typeof r.sshAt === "number" && p[r.sshAt]) { a = p[r.sshAt]; b = p[Math.min(r.sshAt+1, p.length-1)]; }
    else { const m = Math.floor((p.length-1)/2); a = p[m]; b = p[Math.min(m+1, p.length-1)]; }
    // sshOutward: place the marker just *beyond* node `a`, away from `b`. An SSH
    // can't sit in Zone 3, so when a route enters Z3 through a gate the SSH lives
    // on the Z2 side of that gate (a = the gate, b = the first in-Z3 anchor).
    if (r.sshOutward && a && b) {
      let dx = a.x-b.x, dy = a.y-b.y; const l = Math.hypot(dx,dy)||1;
      let cx = a.x + (dx/l)*2.4, cy = a.y + (dy/l)*2.4;
      if (off) { cx += (-dy/l)*off; cy += (dx/l)*off; }
      return { x: cx, y: cy };
    }
    let cx = (a.x+b.x)/2, cy = (a.y+b.y)/2;
    if (off) { let dx=b.x-a.x, dy=b.y-a.y; const l=Math.hypot(dx,dy)||1; cx += (-dy/l)*off; cy += (dx/l)*off; }
    return { x: cx, y: cy };
  };

  return (
    <div ref={wrapRef} style={{ position: "relative", width: "100%", maxWidth: "520px", margin: "0 auto", lineHeight: 0 }}>
      <img src="../assets/kvk-bg/dd_minimap.jpg" alt="Desolate Desert map — four kingdom corners around a central Aaru Palace"
        style={{ width: "100%", display: "block", borderRadius: "10px", border: "1px solid #334155" }} />
      <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ position: "absolute", inset: 0, width: "100%", height: "100%" }}>
        {/* routes: solid=connected · dimmed=disconnected · dashed=partial (building) · plan=solid */}
        {routes.map((r, i) => {
          if (outOfFocus(r.owner)) return null;             // focus: show only the focused server's lines
          const off = routeOffset[i];
          const base = col(r.owner);
          let stroke = base, opacity = 0.95, dash = null, w = 0.8, building = false;
          if (mode !== "plan") {
            if (r.building) { building = true; opacity = 0.95; }               // growing toward connection (animated)
            else if (r.partial) { dash = "1.4 1.2"; opacity = 0.9; }           // planned-partial (static dashed)
            else if (r.connected === false) { stroke = dimHex(base, 0.45); opacity = 0.6; } // disconnected — dimmed
          }
          if (hl && r.owner !== hl) opacity *= 0.15;         // fade non-highlighted alliance
          const hot = hl && r.owner === hl;
          return <polyline key={i} className={building ? "route-building" : undefined} points={offsetLine(r.path, off)} fill="none" stroke={stroke} strokeWidth={hot ? w + 0.5 : w} strokeLinecap="round" strokeLinejoin="round" strokeDasharray={dash || undefined} opacity={opacity} style={{ cursor: "pointer" }}
            onMouseEnter={(e) => hoverOn(r.owner, e)} onMouseMove={(e) => hoverOn(r.owner, e)} onMouseLeave={hoverOff} />;
        })}
        {/* SSH markers (diamond; pulsing red ring when under siege) */}
        {routes.map((r, i) => { if (!r.ssh || outOfFocus(r.owner)) return null; const s = sshPoint(r, routeOffset[i]); if (!s) return null;
          const fade = hl && r.owner !== hl;
          return <rect key={"s"+i} className={r.sshSiege && !fade ? "node-siege" : undefined} x={s.x-0.9} y={s.y-0.9} width="1.8" height="1.8" fill={col(r.owner)} stroke={r.sshSiege ? "#ef4444" : "#0a0c14"} strokeWidth="0.3" transform={`rotate(45 ${s.x} ${s.y})`} opacity={fade ? 0.15 : 1} style={{ pointerEvents: "none" }}><title>Sub-Stronghold ({r.owner}){r.sshSiege ? " · UNDER SIEGE" : ""}</title></rect>;
        })}
        {/* nodes */}
        {mode === "live" ? Object.entries(MAP_NODES).map(([id, n]) => {
          if (n.type === "aaru_corner") return null;   // invisible path anchors
          const st = MAP_STATE[id] || {};
          const active = st.active != null ? st.active : nodeActiveDefault(n, now);
          // In focus mode a node held by a non-focused server renders like the
          // plan map: neutral white, no alliance-highlight action (but keep the
          // passive name+buff tooltip). Only the focused server's nodes stay lit.
          const occ = (st.occupant && !outOfFocus(st.occupant)) ? st.occupant : null;
          const connected = st.connected != null ? st.connected : true;
          let fill;
          if (occ) fill = connected ? col(occ) : dimHex(col(occ), 0.42);
          else fill = active ? NEUTRAL : dimHex(NEUTRAL, 0.42);
          const status = st.occupant ? (st.occupant + (connected ? " · connected" : " · disconnected (no buff)")) : (active ? "unoccupied" : "inactive (not yet capturable)");
          const fade = occ ? (hl && occ !== hl) : (!!hl && !focus);   // dim only for alliance-highlight, not for focus
          const over = hoverNode === id;                              // cursor directly over this node
          const hot = (hl && occ === hl) || over;                    // enlarge + white ring on hover OR alliance-highlight
          const siege = !!st.siege && !!occ;
          const tip = n.label + (n.info ? " — " + n.info : "") + " · " + status + (siege ? " · UNDER SIEGE" : "");
          // occupied nodes also drive the alliance-highlight pill; every node gets
          // the local hover indicator (enlarge + white ring).
          const enter = (e) => { setHoverNode(id); if (occ) hoverOn(occ, e); };
          const move  = (e) => { if (occ) hoverOn(occ, e); };
          const leave = () => { setHoverNode(null); if (occ) hoverOff(); };
          return (
            <circle key={id} className={siege && !fade ? "node-siege" : undefined} cx={n.x} cy={n.y} r={(n.type === "aaru" ? 1.6 : 1.0) * (hot ? 1.5 : 1)} fill={fill} stroke={hot ? "#fff" : (siege ? "#ef4444" : "#0a0c14")} strokeWidth={hot ? 0.5 : 0.3} opacity={fade ? 0.18 : 1}
              style={{ cursor: occ ? "pointer" : "default" }}
              onMouseEnter={enter} onMouseMove={move} onMouseLeave={leave}>
              <title>{tip}</title>
            </circle>
          );
        }) : Object.entries(MAP_NODES).map(([id, n]) => {
          if (n.type === "aaru_corner") return null;
          const over = hoverNode === id;
          const owner = planOwn[id];                        // planned owner (from routes + overrides)
          const fill = owner ? allianceColor(owner, "plan") : NEUTRAL;
          const opacity = owner ? 1 : 0.55;
          const tip = n.label + (n.info ? " — " + n.info : "") + (owner ? " · " + owner + " (planned)" : "");
          return (
          <circle key={id} cx={n.x} cy={n.y} r={(n.type === "aaru" ? 1.6 : 1.0) * (over ? 1.5 : 1)} fill={fill} stroke={over ? "#fff" : "#0a0c14"} strokeWidth={over ? 0.5 : 0.3} opacity={opacity} style={{ cursor: "default" }}
            onMouseEnter={() => setHoverNode(id)} onMouseLeave={() => setHoverNode(null)}><title>{tip}</title></circle>
          );
        })}
        {/* server-crest hit-areas (live only): click a corner badge to break out
            that server's alliances into distinct shades; click again to toggle off */}
        {mode === "live" ? SERVER_BADGES.map(b => {
          const on = focus === b.srv;
          return (
            <circle key={b.srv} cx={b.x} cy={b.y} r="6.5"
              fill="transparent" stroke="none"
              style={{ cursor: "pointer" }}
              onClick={() => setFocus(on ? null : b.srv)}>
              <title>{b.srv}{on ? " — focused (click to reset)" : " — click to highlight this server's alliances"}</title>
            </circle>
          );
        }) : null}
      </svg>
      {/* floating alliance tag near cursor / pinned */}
      {hl ? (
        <div style={{ position: "absolute", left: (cursor ? cursor.x + 12 : 8), top: (cursor ? cursor.y + 12 : 8), pointerEvents: "none", background: col(hl), color: "#fff", fontWeight: 800, fontSize: "12px", letterSpacing: "0.5px", padding: "3px 10px", borderRadius: "999px", border: "1px solid rgba(255,255,255,0.65)", textShadow: "0 1px 2px rgba(0,0,0,0.7)", boxShadow: "0 1px 5px rgba(0,0,0,0.6)", whiteSpace: "nowrap", zIndex: 5 }}>{hl}</div>
      ) : null}
    </div>
  );
}

// All-16-alliance buff + placer/h table, derived live from MAP_STATE. Rows tinted
// by server (Scouting-table style); buff cells light up when the alliance holds
// a connected node granting that buff. Behemoth-blessings highlighting.
function NodeControlTable({ hl, setHl, pinned, setPinned }) {
  const BUFF_DEFS = [
    { key: "health", short: "Health", grp: "pillar" },
    { key: "attack", short: "Attack", grp: "pillar" },
    { key: "defense", short: "Defense", grp: "pillar" },
    { key: "dmgReduction", short: "Dmg Red.", grp: "tower" },
    { key: "damage", short: "Damage", grp: "tower" },
  ];
  const buffVal = { health: "+5%", attack: "+10%", defense: "+10%", dmgReduction: "+5%", damage: "+6%" };
  const order = ["Era 8", "Era #019", "Era #014", "Era #023"];
  const tags = Object.keys(ALLIANCE_SERVER).sort((a,b) => order.indexOf(ALLIANCE_SERVER[a]) - order.indexOf(ALLIANCE_SERVER[b]));
  const fmt = (n) => n >= 1e6 ? (n/1e6) + "M" : n >= 1e3 ? (n/1e3) + "k" : String(n);
  return (
    <div style={{ overflowX: "auto" }}>
      <table style={{ ...S.table, minWidth: "560px" }}>
        <thead>
          <tr>
            <th style={{ ...S.th, borderBottom: "none" }}></th>
            <th colSpan={3} style={{ ...S.th, textAlign: "center", color: "#f5731f", borderBottom: "2px solid #f5731f" }}>Pillar City</th>
            <th colSpan={2} style={{ ...S.th, textAlign: "center", color: "#7c3aed", borderBottom: "2px solid #7c3aed" }}>Tower</th>
            <th style={{ ...S.th, borderBottom: "none" }}></th>
          </tr>
          <tr>
            <th style={S.th}>Alliance</th>
            {BUFF_DEFS.map(bd => <th key={bd.key} style={{ ...S.th, textAlign: "center" }}>{bd.short}</th>)}
            <th style={{ ...S.th, textAlign: "right" }}>Placer /h</th>
          </tr>
        </thead>
        <tbody>
          {tags.map(tag => {
            const info = allianceFromMap(tag);
            const srv = ALLIANCE_SERVER[tag]; const c = serverColor(srv);
            const grpColor = { pillar: "#f5731f", tower: "#7c3aed" };
            const grpRgb = { pillar: "245,115,31", tower: "124,58,237" };
            const rowHot = hl === tag;
            const rowFade = hl && hl !== tag;
            const toggle = () => {
              if (pinned && hl === tag) { setPinned(false); setHl(null); }   // click active pin → off
              else { setPinned(true); setHl(tag); }                          // pin this alliance
            };
            return (
              <tr key={tag} onClick={toggle} title="Click to pin/unpin this alliance's map highlight"
                onMouseEnter={() => { if (!pinned) setHl(tag); }} onMouseLeave={() => { if (!pinned) setHl(null); }}
                style={{ background: rowHot ? "rgba(" + c.rgb + ",0.28)" : "rgba(" + c.rgb + ",0.10)", cursor: "pointer", opacity: rowFade ? 0.5 : 1, boxShadow: rowHot ? "inset 0 0 0 1px " + c.hex : undefined }}>
                <td style={{ ...S.td, fontWeight: 700, color: c.hex, whiteSpace: "nowrap" }}>{tag} <span style={{ fontSize: "10px", color: "#64748b" }}>{srv === "Era 8" ? "#008" : srv.replace("Era ","")}</span></td>
                {BUFF_DEFS.map(bd => {
                  const on = info.buffs.has(bd.key);
                  return (
                    <td key={bd.key} style={{ ...S.td, textAlign: "center", fontVariantNumeric: "tabular-nums", fontWeight: on ? 700 : 400,
                      color: on ? "#e8eaf0" : "#475569",
                      background: on ? "rgba(" + grpRgb[bd.grp] + ",0.18)" : undefined,
                      boxShadow: on ? "inset 0 0 0 1px " + grpColor[bd.grp] : undefined,
                      opacity: on ? 1 : 0.5 }}>{buffVal[bd.key]}</td>
                  );
                })}
                <td style={{ ...S.td, textAlign: "right", fontVariantNumeric: "tabular-nums", color: info.perHour > 0 ? "#3daa6d" : "#64748b" }}>{info.perHour > 0 ? "+" + fmt(info.perHour) : "0"}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
      <div style={{ fontSize: "11px", color: "#64748b", marginTop: "8px" }}>Derived from map node control. A buff lights only if the alliance holds a <em>connected</em> node granting it (same buff doesn't stack). Placer /h counts all occupied gates/docks &amp; Pillar Cities.</div>
    </div>
  );
}

function MapTab({ state, setState }) {
  const nodeAssignments = state.nodeAssignments || {};

  const assignNode = (nodeId, alliance) => {
    const next = { ...nodeAssignments, [nodeId]: alliance };
    setState(prev => ({ ...prev, nodeAssignments: next }));
  };

  const zoneNodes = (zoneId) => KEY_NODES.filter(n => n.zone === zoneId);

  const nodeTypeIcon = (type) => {
    switch(type) {
      case "building": return "🏰";
      case "fort": return "⛰️";
      case "city": return "🏛️";
      case "tower": return "🗼";
      case "palace": return "👑";
      default: return "📍";
    }
  };

  const [mapZoom, setMapZoom] = React.useState(1);
  const [mapPos, setMapPos] = React.useState({ x: 0, y: 0 });
  const [dragging, setDragging] = React.useState(false);
  const [dragStart, setDragStart] = React.useState({ x: 0, y: 0 });
  const mapRef = React.useRef(null);

  const handleWheel = (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    setMapZoom(prev => Math.max(0.5, Math.min(5, prev * delta)));
  };

  const handleMouseDown = (e) => {
    setDragging(true);
    setDragStart({ x: e.clientX - mapPos.x, y: e.clientY - mapPos.y });
  };

  const handleMouseMove = (e) => {
    if (!dragging) return;
    setMapPos({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y });
  };

  const handleMouseUp = () => setDragging(false);

  const handleTouchStart = (e) => {
    if (e.touches.length === 1) {
      setDragging(true);
      setDragStart({ x: e.touches[0].clientX - mapPos.x, y: e.touches[0].clientY - mapPos.y });
    }
  };

  const handleTouchMove = (e) => {
    if (!dragging || e.touches.length !== 1) return;
    e.preventDefault();
    setMapPos({ x: e.touches[0].clientX - dragStart.x, y: e.touches[0].clientY - dragStart.y });
  };

  const handleTouchEnd = () => setDragging(false);

  return (
    <div>
      {/* Zoomable Stitched Map */}
      <div style={S.card}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px" }}>
          <div style={S.cardTitle}>Desolate Desert Map</div>
          <div style={{ display: "flex", gap: "8px", alignItems: "center" }}>
            <button onClick={() => setMapZoom(z => Math.max(0.5, z * 0.8))} style={{ ...S.select, cursor: "pointer", padding: "4px 10px" }}>-</button>
            <span style={{ fontSize: "12px", color: "#94a3b8", minWidth: "45px", textAlign: "center" }}>{Math.round(mapZoom * 100)}%</span>
            <button onClick={() => setMapZoom(z => Math.min(5, z * 1.25))} style={{ ...S.select, cursor: "pointer", padding: "4px 10px" }}>+</button>
            <button onClick={() => { setMapZoom(1); setMapPos({ x: 0, y: 0 }); }} style={{ ...S.select, cursor: "pointer", padding: "4px 10px", fontSize: "11px" }}>Reset</button>
          </div>
        </div>
        <div
          ref={mapRef}
          onWheel={handleWheel}
          onMouseDown={handleMouseDown}
          onMouseMove={handleMouseMove}
          onMouseUp={handleMouseUp}
          onMouseLeave={handleMouseUp}
          onTouchStart={handleTouchStart}
          onTouchMove={handleTouchMove}
          onTouchEnd={handleTouchEnd}
          style={{
            width: "100%", height: "500px", overflow: "hidden",
            borderRadius: "8px", background: "#000", cursor: dragging ? "grabbing" : "grab",
            position: "relative", userSelect: "none", touchAction: "none"
          }}
        >
          <img
            src="dd_map_stitched_v2.jpg"
            alt="Desolate Desert Map"
            draggable={false}
            style={{
              position: "absolute",
              left: `calc(50% + ${mapPos.x}px)`,
              top: `calc(50% + ${mapPos.y}px)`,
              transform: `translate(-50%, -50%) scale(${mapZoom})`,
              transformOrigin: "center center",
              maxWidth: "none",
              transition: dragging ? "none" : "transform 0.1s ease-out"
            }}
          />
        </div>
        <div style={{ fontSize: "11px", color: "#94a3b8", textAlign: "center", marginTop: "8px" }}>
          Scroll to zoom, drag to pan. Server positions: Era #008 (Purple) | Era #023 (Green) | Era #014 (Orange) | Era #019 (Blue)
        </div>
      </div>

      {ZONES.map(zone => (
        <div key={zone.id} style={{ ...S.card, borderColor: zone.color + "66" }}>
          <div style={{ ...S.cardTitle, color: zone.color }}>{zone.name} — Key Nodes</div>
          <div style={{ display: "grid", gap: "8px" }}>
            {zoneNodes(zone.id).map(node => (
              <div key={node.id} style={{ display: "flex", alignItems: "center", gap: "12px", padding: "10px", background: "#0f172a", borderRadius: "8px" }}>
                <span style={{ fontSize: "20px" }}>{nodeTypeIcon(node.type)}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 600, fontSize: "13px" }}>{node.name}</div>
                  <div style={{ fontSize: "11px", color: "#94a3b8" }}>{node.desc}</div>
                </div>
                {node.points > 0 && (
                  <span style={S.badge("#22c55e")}>{node.points} pts/min</span>
                )}
                <select
                  style={{ ...S.select, width: "80px" }}
                  value={nodeAssignments[node.id] || ""}
                  onChange={e => assignNode(node.id, e.target.value)}
                >
                  <option value="">—</option>
                  {EVENT_CONFIG.ourAlliances.map(a => (
                    <option key={a} value={a}>{a}</option>
                  ))}
                </select>
              </div>
            ))}
          </div>
        </div>
      ))}

      {/* Legend */}
      <div style={S.card}>
        <div style={S.cardTitle}>Assignment Legend</div>
        <div style={{ display: "flex", gap: "16px", flexWrap: "wrap" }}>
          {EVENT_CONFIG.ourAlliances.map((a, i) => {
            const colors = ["#ef4444", "#3b82f6", "#22c55e", "#f59e0b"];
            return (
              <div key={a} style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                <div style={{ width: "12px", height: "12px", borderRadius: "3px", background: colors[i] }} />
                <span style={{ fontSize: "13px", fontWeight: 600 }}>{a}</span>
                <span style={{ fontSize: "11px", color: "#94a3b8" }}>
                  ({Object.values(nodeAssignments).filter(v => v === a).length} nodes)
                </span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// Placer Gold cost of the n-th flag in a given zone (1-based flag number).
// Z1: 1-9=5k, else tier×10k. Z2: 50k×(tier+1). Z3: 100k×max(1,tier). tier=floor(n/10).
function flagCost(zone, n) {
  const t = Math.floor(n / 10);
  if (zone === 1) return t === 0 ? 5000 : t * 10000;
  if (zone === 2) return 50000 * (1 + t);
  if (zone === 3) return 100000 * Math.max(1, t);
  return 0;
}

];

              const abbr = (n) => { n = Number(n); if (n >= 1e9) return (n/1e9).toFixed(2).replace(/\.?0+$/,"")+"B"; if (n >= 1e6) return (n/1e6).toFixed(0)+"M"; if (n >= 1e3) return (n/1e3).toFixed(0)+"K"; return String(n); };
              const cell = (tag) => {
                const cur = a.cur ? a.cur[tag] : null;
                if (cur == null) return <span style={{ color: "#475569" }}>—</span>;
                const met = cur >= a.target;
                const label = a.target >= 1e6 ? (abbr(cur) + "/" + abbr(a.target)) : (cur + "/" + a.target);
                return <span style={{ color: met ? "#3daa6d" : "#94a3b8", fontWeight: met ? 700 : 400, fontVariantNumeric: "tabular-nums", whiteSpace: "nowrap" }}>{met ? "✓ " : ""}{label}</span>;
              };
              return (
              <tr key={a.name}>
                <td style={S.td}><span style={{ fontWeight: 600 }}>{a.name}</span></td>
                <td style={{ ...S.td, fontSize: "12px", color: "#94a3b8" }}>{a.req}{a.target >= 1e6 ? " (" + abbr(a.target) + ")" : (a.target > 1 ? " (" + a.target + ")" : "")}</td>
                {["WC1","REU","MyT","AGC"].map(tag => <td key={tag} style={{ ...S.td, textAlign: "center", fontSize: "12px" }}>{cell(tag)}</td>)}
                <td style={{ ...S.td, fontSize: "11px", color: "#64748b" }}>{a.personal}</td>
              </tr>
            ); })}
          </tbody>
        </table>
        </div>
      </div>

    </div>
  );
}

// Tower of Rotation / Peaceful Riverland awakening windows (UTC minutes-into-day).
// Active only Days 3-5 (2026-07-08 .. 2026-07-10). Auto-greys passed windows,
// highlights the live one, marks the next; all-grey before Day 3 and after Day 5.
const TOR_WINDOWS = [
  { label: "05:00 – 07:00", start: 300, end: 420 },
  { label: "13:00 – 15:00", start: 780, end: 900 },
  { label: "21:00 – 23:00", start: 1260, end: 1380 },
];
const TOR_FIRST_DATE = "2026-07-08"; // Day 3
const TOR_LAST_DATE = "2026-07-10";  // Day 5
const TOR_LEVELS = 40;               // each 2-hr window = 40 level-slots (3 min each)

// Simple treasure-chest icon (inline SVG so it renders identically everywhere).
function ChestIcon({ size = 18, color = "#facc15" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0, display: "block" }}>

      {/* body */}
      <rect x="3" y="10" width="18" height="9" rx="1.5" fill={color} />
      {/* band + lock */}
      <rect x="3" y="12.5" width="18" height="2" fill="#0a0c14" opacity="0.55" />
      <rect x="10.5" y="11" width="3" height="6" rx="0.6" fill="#0a0c14" opacity="0.7" />
      <circle cx="12" cy="13.5" r="1.1" fill={color} />
    </svg>
  );
}

// Shared live status of the Tower of Rotation / Peaceful Riverland event, computed
// from the current UTC time. Returns {active, live, windowIdx, level, states[]}.
function torStatus(now) {
  const d = new Date(now);
  const todayStr = d.getUTCFullYear() + "-" + String(d.getUTCMonth()+1).padStart(2,"0") + "-" + String(d.getUTCDate()).padStart(2,"0");
  const active = todayStr >= TOR_FIRST_DATE && todayStr <= TOR_LAST_DATE;
  const nowMin = d.getUTCHours()*60 + d.getUTCMinutes() + d.getUTCSeconds()/60;
  let liveIdx = -1, nextIdx = -1;
  for (let i=0;i<TOR_WINDOWS.length;i++){
    const w = TOR_WINDOWS[i];
    if (nowMin >= w.start && nowMin < w.end) liveIdx = i;
    if (nextIdx === -1 && nowMin < w.start) nextIdx = i;
  }
  const live = active && liveIdx !== -1;
  let level = 0;
  if (live) {
    const w = TOR_WINDOWS[liveIdx];
    const per = (w.end - w.start) / TOR_LEVELS; // minutes per level slot
    level = Math.min(TOR_LEVELS, Math.floor((nowMin - w.start) / per) + 1);
  }
  const states = TOR_WINDOWS.map((w, i) => {
    if (!active) return "upcoming";
    if (i === liveIdx) return "live";
    if (i === nextIdx) return "next";
    if (nowMin >= w.end) return "passed";
    return "upcoming";
  });
  // ms remaining until the live window ends (for a countdown)
  let msToEnd = 0;
  if (live) msToEnd = Math.max(0, (TOR_WINDOWS[liveIdx].end - nowMin) * 60000);
  return { active, live, windowIdx: liveIdx, level, states, msToEnd };
}

// Popup that fires once each time a Tower window goes live (edge-detected).
function TowerLiveModal() {
  const [now, setNow] = React.useState(() => Date.now());
  const [open, setOpen] = React.useState(false);
  const wasLive = React.useRef(false);
  React.useEffect(() => {
    const id = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(id);
  }, []);
  const st = torStatus(now);
  React.useEffect(() => {
    if (st.live && !wasLive.current) setOpen(true);   // just went live → pop
    if (!st.live) setOpen(false);                     // window ended → dismiss
    wasLive.current = st.live;
  }, [st.live]);
  if (!open || !st.live) return null;
  const s = Math.floor(st.msToEnd / 1000);
  const cd = String(Math.floor(s/3600)).padStart(2,"0") + ":" + String(Math.floor((s%3600)/60)).padStart(2,"0") + ":" + String(s%60).padStart(2,"0");
  return (
    <div className="tor-modal" onClick={() => setOpen(false)}>
      <div className="tor-modal-card" onClick={e => e.stopPropagation()}>
        <span className="tor-modal-close" onClick={() => setOpen(false)}>×</span>
        <div className="tor-modal-ico">🗼</div>
        <h3>Tower of Rotation is Live!</h3>
        <div className="tor-modal-lvl">Level {st.level} / {TOR_LEVELS}</div>
        <div style={{ fontSize: "11px", color: "#64748b", margin: "10px 0 2px", letterSpacing: "0.5px", textTransform: "uppercase" }}>Ends in</div>
        <div className="tor-modal-cd">{cd}</div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   RESEARCH / SCOUTING
   ═══════════════════════════════════════════════════ */
let RESEARCH = {
  ours: { server: "Era 8", sdRank: null, alliances: [], players: [] },
  opponents: []
};

// M:P % + activity tier (players run a wide scale; alliances a low one)
const rmp = (m, p) => { const mm=parseInt(String(m).replace(/,/g,""),10)||0; const pp=parseInt(String(p).replace(/,/g,""),10)||1; return ((mm/pp)*100); };
const rfmt = (v) => { const n=parseInt(String(v).replace(/,/g,""),10); if(isNaN(n))return v; if(n>=1e9)return (n/1e9).toFixed(2)+"B"; if(n>=1e6)return (n/1e6).toFixed(1)+"M"; return String(v); };
const allianceMpCls = (pct) => pct>=8?"hi":pct>=4?"mid":"lo";
const playerMpCls = (pct) => pct>=65?"hi":pct>=35?"mid":"lo";

// Per-server map-position colors (muted): us purple, and the three opponents
// matched to their map positions. rgb triplets so we can tint bar/border.
const SERVER_COLORS = {
  "Era 8":    { rgb: "154,109,212", hex: "#9a6dd4" },  // purple
  "Era #023": { rgb: "90,168,122",  hex: "#5aa87a" },  // green
  "Era #014": { rgb: "212,147,74",  hex: "#d4934a" },  // orange
  "Era #019": { rgb: "91,139,196",  hex: "#5b8bc4" }   // blue
};
const serverColor = (srv) => SERVER_COLORS[srv] || { rgb: "138,144,165", hex: "#8a90a5" };

// One server's table (alliances OR players) as a cmp-card, tinted by map color.
function ServerTable({ server, sdRank, priority, rows, kind }) {
  const c = serverColor(server);
  const priBadge = { critical: "#ef4444", high: "#f5731f", medium: "#f59e0b", low: "#94a3b8" };
  const cls = kind === "players" ? playerMpCls : allianceMpCls;
  return (
    <div className="cmp-card" style={{ borderColor: "rgba(" + c.rgb + ",0.4)" }}>
      <div className="cmp-head" style={{ background: "rgba(" + c.rgb + ",0.12)", borderBottomColor: "rgba(" + c.rgb + ",0.4)", color: c.hex, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
        <span>{server}{server === "Era 8" ? " · Us" : ""}</span>
        {sdRank != null && <span style={{ fontSize: 10, fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 700, letterSpacing: 0.5, color: "#cbd5e1", background: "rgba(255,255,255,0.06)", padding: "1px 6px", borderRadius: 4 }}>SD #{sdRank}</span>}
        {priority && <span style={{ fontSize: 9.5, fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 700, letterSpacing: 0.5, textTransform: "uppercase", color: priBadge[priority] || "#94a3b8" }}>{priority}</span>}
      </div>
      {rows && rows.length ? (
        <table className="cmp-tbl cmp-tbl-wrap">
          <thead><tr><th className="c-rk">#</th><th className="c-nm"></th><th className="c-p">Power</th><th className="c-mp">M:P</th></tr></thead>
          <tbody>
          {rows.map((r, i) => { const has = r.merits !== "" && r.merits != null; const pct = rmp(r.merits, r.power);
            const nm = kind === "players"
              ? (<span>{r.name} <span className="tg">[{r.alliance}]</span></span>)
              : (<span>{r.name ? r.name + " " : ""}<span className="tg">[{r.tag}]</span></span>);
            return (
            <tr key={i}>
              <td className="c-rk">{r.rank || i + 1}</td>
              <td className="c-nm">{nm}</td>
              <td className="c-p" style={{ color: c.hex }}>{rfmt(r.power)}</td>
              <td className={"c-mp " + (has ? cls(pct) : "")} style={has ? undefined : { color: "#64748b" }}>{has ? pct.toFixed(1) + "%" : "—"}</td>
            </tr>
          ); })}
          </tbody>
        </table>
      ) : <div style={{ padding: "14px 12px", fontSize: 12, color: "#64748b", fontStyle: "italic" }}>Awaiting scouting data.</div>}
    </div>
  );
}

function ResearchTab() {
  const r = RESEARCH || { ours: {}, opponents: [] };
  // ordered server list: us first, then opponents as given
  const servers = [
    { server: r.ours?.server || "Era 8", sdRank: r.ours?.sdRank, priority: null, alliances: r.ours?.alliances || [], players: r.ours?.players || [] },
    ...(r.opponents || []).map(o => ({ server: o.server, sdRank: o.sdRank, priority: o.priority, alliances: o.alliances || [], players: o.players || [] }))
  ];
  return (
    <div>
      {/* ALLIANCES */}
      <div style={S.card}>
        <div style={S.cardTitle}>Top Alliances</div>
        <div className="cmp-grid">
          {servers.map((s, i) => <ServerTable key={i} server={s.server} sdRank={s.sdRank} priority={s.priority} rows={s.alliances} kind="alliances" />)}
        </div>
      </div>

      {/* PLAYERS */}
      <div style={S.card}>
        <div style={S.cardTitle}>Top Players</div>
        <div className="cmp-grid">
          {servers.map((s, i) => <ServerTable key={i} server={s.server} sdRank={s.sdRank} priority={s.priority} rows={s.players} kind="players" />)}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════════ */
function App() {
  const [state, setStateRaw] = useState(() => loadState());
  const [tab, setTab] = useState("overview");

  const setState = useCallback((updater) => {
    setStateRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      saveState(next);
      return next;
    });
  }, []);

  // ticking clock so the header Tower badge tracks the live level
  const [nowTs, setNowTs] = useState(() => Date.now());
  const [helpOpen, setHelpOpen] = useState(false);
  useEffect(() => { const id = setInterval(() => setNowTs(Date.now()), 15000); return () => clearInterval(id); }, []);
  const tor = torStatus(nowTs);

  // Standard event-meta block (Start|End|TZ + countdown + stage + ical stub).
  useEffect(() => {
    let tries = 0;
    // only treat a value as a real date if it parses as YYYY-MM-DD; otherwise
    // pass it through as a label (e.g. "TBD") and skip the countdown ISO.
    const isDate = (d) => typeof d === "string" && /^\d{4}-\d{2}-\d{2}$/.test(d) && !isNaN(Date.parse(d + "T00:00:00Z"));
    const fmt = (d) => isDate(d) ? new Date(d + "T00:00:00Z").toLocaleDateString("en-US",{month:"short",day:"numeric",timeZone:"UTC"}) : (d || "TBD");
    const mount = () => {
      if (window.EventHeader && document.getElementById("evtMeta")) {
        const ec = EVENT_CONFIG;
        window.EventHeader.mount("#evtMeta", {
          startLabel: fmt(ec.eventStart),
          endLabel: fmt(ec.eventEnd),
          timezone: "UTC+0",
          startISO: isDate(ec.eventStart) ? ec.eventStart + "T00:00:00Z" : null,
          endISO: isDate(ec.eventEnd) ? ec.eventEnd + "T00:00:00Z" : null,
          liveLabel: "Contest Live",
          liveDot: true,
          stages: STAGES.map(s => ({
            fromISO: s.startISO,
            // "Main | Sub" → Sub renders white; shorthand day range next to CONTEST LIVE
            label: "Contest Live | " + (s.days.length > 1 ? "Day " + s.days[0] + "–" + s.days[s.days.length-1] : "Day " + s.days[0])
          }))
        });
      } else if (tries++ < 50) { setTimeout(mount, 50); }
    };
    mount();
  }, []);

  const TABS = [
    { id: "overview", label: "Overview" },
    { id: "research", label: "Scouting" },
    { id: "points", label: "Points" },
    { id: "pve", label: "PvE Guide" },
  ];

  return (
    <div style={S.app}>
      <TowerLiveModal />
      {helpOpen ? (
        <div className="tor-modal" onClick={() => setHelpOpen(false)}>
          <div className="tor-modal-card" style={{ maxWidth: "560px", textAlign: "left", borderColor: "#f5731f" }} onClick={e => e.stopPropagation()}>
            <span className="tor-modal-close" onClick={() => setHelpOpen(false)}>×</span>
            <h3 style={{ color: "#f5731f", textAlign: "center" }}>What is Desolate Desert?</h3>
            <img src="../assets/kvk-bg/dd_minimap.jpg" alt="Desolate Desert map — four kingdom corners around a central Aaru Palace"
              style={{ width: "100%", maxWidth: "460px", display: "block", margin: "0 auto 14px", borderRadius: "10px", border: "1px solid #334155" }} />
            <div style={{ fontSize: "13px", color: "#e2e8f0", lineHeight: 1.6 }}>
              <strong style={{ color: "#f5731f" }}>Desolate Desert</strong> is a 7-day, four-kingdom land grab on a shared desert map. Alliances build a Stronghold and expand outward with connected flags, capturing <strong>gates/docks</strong> and <strong>Pillar Cities</strong> for Placer Gold and Desert Points. The map opens zone by zone (Waste Land → Forbidden Zone → Eternal Realm), climaxing in the <strong>Aaru Palace</strong> fight on Day 7. Most points wins — and PvE contribution (gathering, tribes, explorations, Tower damage) matters as much as PvP. This is the <strong>final event of the season</strong>.
            </div>
          </div>
        </div>
      ) : null}
      <div className="dd-header" style={S.header}>
        {/* top-right: quest + help icon buttons */}
        <div className="hdr-pills-top">
          <a href="#daily-objectives" className="hdr-icobtn" title="Jump to Daily Objectives"
            onClick={() => { setTab("overview"); setTimeout(() => { const el = document.getElementById("daily-objectives"); if (el) el.scrollIntoView({ behavior: "smooth", block: "center" }); }, 60); }}>📜</a>
          <button type="button" className="hdr-icobtn" title="What is Desolate Desert?" onClick={() => setHelpOpen(true)}>❓</button>
        </div>
        {/* bottom-right: Tower badge */}
        <div className="hdr-pills">
          <a href="#tower-schedule" className={"tor-badge" + (tor.live ? "" : " is-idle")}
            title={tor.live ? "Tower of Rotation is live — jump to schedule" : "Tower of Rotation — jump to schedule"}
            onClick={() => { setTab("overview"); setTimeout(() => { const el = document.getElementById("tower-schedule"); if (el) el.scrollIntoView({ behavior: "smooth", block: "center" }); }, 60); }}>
            <span className="tb-ico">🗼</span><span className="tb-lvl">Tower · {tor.live ? tor.level : 1}/{TOR_LEVELS}</span>
          </a>
        </div>
        <div style={S.headerSub}>Season Finale · Four-Kingdom Land War</div>
        <h1 style={S.headerTitle}>DESOLATE DESERT</h1>
        <div style={{ display: "flex", flexWrap: "wrap", gap: "8px", alignItems: "center", justifyContent: "center", marginTop: "8px" }}>
          {EVENT_CONFIG.servers.map((srv, i) => {
            const disp = srv === "Era 8" ? "Era #008" : srv;
            const c = serverColor(srv);
            const us = srv === "Era 8";
            return (
              <React.Fragment key={srv}>
                {/* single VS divider — after our server, separating us from the opponents */}
                {i === 1 ? <span style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: "18px", letterSpacing: "1px", color: "#94a3b8" }}>VS</span> : null}
                <span style={{ display: "inline-block", padding: "3px 10px", borderRadius: "999px", fontSize: "13px", fontWeight: 700, color: "#fff", background: "rgba(" + c.rgb + ",0.22)", border: "1px solid " + c.hex, boxShadow: us ? "0 0 8px rgba(" + c.rgb + ",0.5)" : "none" }}>{disp}</span>
              </React.Fragment>
            );
          })}
        </div>
        <div id="evtMeta"></div>
        <div style={{ marginTop: "14px", display: "flex", flexWrap: "wrap", gap: "10px 18px", alignItems: "center", justifyContent: "center" }}>
          <div style={{ fontSize: "13px", color: "#cbd5e1" }}>
            <span style={{ color: "#94a3b8" }}>Aaru Palace Fight:</span>{" "}
            <strong style={{ color: "#f472b6" }}>{state.aaruTimeSlot || "Day 7 — time TBD (winner picks)"}</strong>
          </div>
          <button type="button" title="Calendar export coming soon" disabled style={{ display: "inline-flex", alignItems: "center", gap: "8px", padding: "8px 16px", background: "#11141f", border: "1px solid #a1573f", borderRadius: "999px", cursor: "default", opacity: 0.75 }}>
            <span style={{ fontSize: "16px", lineHeight: 1 }}>📅</span>
            <span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: "13px", fontWeight: 700, letterSpacing: "0.5px", color: "#f5731f" }}>Add to Calendar</span>
          </button>
        </div>
      </div>

      {/* Persistent Kingdom Standings bar — stays above the tabs on every tab */}
      <div style={{ maxWidth: "960px", margin: "0 auto", padding: "14px 16px 0" }}>
        <KingdomBar />
        <div style={{ marginTop: "8px", fontSize: "11px", color: "#64748b", textAlign: "center" }}>
          Last updated: {KINGDOM_POINTS.lastUpdated}
        </div>
      </div>

      <div className="tabs">
        {TABS.map(t => (
          <button key={t.id} className={"tab"+(tab === t.id?" active":"")} onClick={() => setTab(t.id)}>
            {t.label}
          </button>
        ))}
      </div>

      <div style={S.content}>
        {tab === "overview" && <OverviewTab state={state} setState={setState} />}
        {tab === "research" && <ResearchTab />}
        {tab === "pve" && <PveTab />}
        {tab === "points" && <PointsTab />}
      </div>
    </div>
  );
}

// Overlay published live config (../data/live/desolate.json) onto the in-code defaults,
// then mount. On any failure the in-code defaults render unchanged. localStorage (diplomacy
// edits, routes, node assignments) still overlays on top via loadState() in App's state.
(async () => {
  try {
    const res = await fetch("../data/live/desolate.json");
    if (res.ok) {
      const j = await res.json();
      if (j) {
        if (j.eventConfig)    EVENT_CONFIG    = j.eventConfig;
        if (j.kingdomPoints)  KINGDOM_POINTS  = j.kingdomPoints;
        if (j.alliancePoints) ALLIANCE_POINTS = j.alliancePoints;
        if (j.diplomacy)      DEFAULT_DIPLOMACY = j.diplomacy;
        if (j.contacts)       CONTACTS        = j.contacts;
        if (j.research)       RESEARCH        = j.research;
        if (j.kingdomScoreboard)  KINGDOM_SCOREBOARD  = j.kingdomScoreboard;
        if (j.allianceScoreboard) ALLIANCE_SCOREBOARD = j.allianceScoreboard;
        if (j.placerGold)         PLACER_GOLD         = j.placerGold;
        if (j.allianceBuffs)      ALLIANCE_BUFFS      = j.allianceBuffs;
        if (j.mapState)           MAP_STATE           = j.mapState;
        if (j.mapRoutes)          MAP_ROUTES          = j.mapRoutes;
      }
    }
  } catch (e) {
    console.error("Desolate live config load failed; using in-code defaults", e);
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
})();
    </script>
