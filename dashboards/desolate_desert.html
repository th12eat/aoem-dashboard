function ScheduleTab() {

function MapTab({ state, setState }) {
  const nodeAssignments = state.nodeAssignments || {};

  const assignNode = (nodeId, alliance) => {
    const next = { ...nodeAssignments, [nodeId]: alliance };
    setState(prev => ({ ...prev, nodeAssignments: next }));
  };

  const zoneNodes = (zoneId) => KEY_NODES.filter(n => n.zone === zoneId);

  const nodeTypeIcon = (type) => {
    switch(type) {
      case "building": return "🏰";
      case "fort": return "⛰️";
      case "city": return "🏛️";
      case "tower": return "🗼";
      case "palace": return "👑";
      default: return "📍";
    }
  };

  const [mapZoom, setMapZoom] = React.useState(1);
  const [mapPos, setMapPos] = React.useState({ x: 0, y: 0 });
  const [dragging, setDragging] = React.useState(false);
  const [dragStart, setDragStart] = React.useState({ x: 0, y: 0 });
  const mapRef = React.useRef(null);

  const handleWheel = (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    setMapZoom(prev => Math.max(0.5, Math.min(5, prev * delta)));
  };

  const handleMouseDown = (e) => {
    setDragging(true);
    setDragStart({ x: e.clientX - mapPos.x, y: e.clientY - mapPos.y });
  };

  const handleMouseMove = (e) => {
    if (!dragging) return;
    setMapPos({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y });
  };

  const handleMouseUp = () => setDragging(false);

  const handleTouchStart = (e) => {
    if (e.touches.length === 1) {
      setDragging(true);
      setDragStart({ x: e.touches[0].clientX - mapPos.x, y: e.touches[0].clientY - mapPos.y });
    }
  };

  const handleTouchMove = (e) => {
    if (!dragging || e.touches.length !== 1) return;
    e.preventDefault();
    setMapPos({ x: e.touches[0].clientX - dragStart.x, y: e.touches[0].clientY - dragStart.y });
  };

  const handleTouchEnd = () => setDragging(false);

  return (
    <div>
      {/* Zoomable Stitched Map */}
      <div style={S.card}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px" }}>
          <div style={S.cardTitle}>Desolate Desert Map</div>
          <div style={{ display: "flex", gap: "8px", alignItems: "center" }}>
            <button onClick={() => setMapZoom(z => Math.max(0.5, z * 0.8))} style={{ ...S.select, cursor: "pointer", padding: "4px 10px" }}>-</button>
            <span style={{ fontSize: "12px", color: "#94a3b8", minWidth: "45px", textAlign: "center" }}>{Math.round(mapZoom * 100)}%</span>
            <button onClick={() => setMapZoom(z => Math.min(5, z * 1.25))} style={{ ...S.select, cursor: "pointer", padding: "4px 10px" }}>+</button>
            <button onClick={() => { setMapZoom(1); setMapPos({ x: 0, y: 0 }); }} style={{ ...S.select, cursor: "pointer", padding: "4px 10px", fontSize: "11px" }}>Reset</button>
          </div>
        </div>
        <div
          ref={mapRef}
          onWheel={handleWheel}
          onMouseDown={handleMouseDown}
          onMouseMove={handleMouseMove}
          onMouseUp={handleMouseUp}
          onMouseLeave={handleMouseUp}
          onTouchStart={handleTouchStart}
          onTouchMove={handleTouchMove}
          onTouchEnd={handleTouchEnd}
          style={{
            width: "100%", height: "500px", overflow: "hidden",
            borderRadius: "8px", background: "#000", cursor: dragging ? "grabbing" : "grab",
            position: "relative", userSelect: "none", touchAction: "none"
          }}
        >
          <img
            src="dd_map_stitched_v2.jpg"
            alt="Desolate Desert Map"
            draggable={false}
            style={{
              position: "absolute",
              left: `calc(50% + ${mapPos.x}px)`,
              top: `calc(50% + ${mapPos.y}px)`,
              transform: `translate(-50%, -50%) scale(${mapZoom})`,
              transformOrigin: "center center",
              maxWidth: "none",
              transition: dragging ? "none" : "transform 0.1s ease-out"
            }}
          />
        </div>
        <div style={{ fontSize: "11px", color: "#94a3b8", textAlign: "center", marginTop: "8px" }}>
          Scroll to zoom, drag to pan. Server positions: Era 8 (Purple) | Era #023 (Blue) | Era #014 (Green) | Era #019 (Orange)
        </div>
      </div>

      {ZONES.map(zone => (
        <div key={zone.id} style={{ ...S.card, borderColor: zone.color + "66" }}>
          <div style={{ ...S.cardTitle, color: zone.color }}>{zone.name} — Key Nodes</div>
          <div style={{ display: "grid", gap: "8px" }}>
            {zoneNodes(zone.id).map(node => (
              <div key={node.id} style={{ display: "flex", alignItems: "center", gap: "12px", padding: "10px", background: "#0f172a", borderRadius: "8px" }}>
                <span style={{ fontSize: "20px" }}>{nodeTypeIcon(node.type)}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 600, fontSize: "13px" }}>{node.name}</div>
                  <div style={{ fontSize: "11px", color: "#94a3b8" }}>{node.desc}</div>
                </div>
                {node.points > 0 && (
                  <span style={S.badge("#22c55e")}>{node.points} pts/min</span>
                )}
                <select
                  style={{ ...S.select, width: "80px" }}
                  value={nodeAssignments[node.id] || ""}
                  onChange={e => assignNode(node.id, e.target.value)}
                >
                  <option value="">—</option>
                  {EVENT_CONFIG.ourAlliances.map(a => (
                    <option key={a} value={a}>{a}</option>
                  ))}
                </select>
              </div>
            ))}
          </div>
        </div>
      ))}

      {/* Legend */}
      <div style={S.card}>
        <div style={S.cardTitle}>Assignment Legend</div>
        <div style={{ display: "flex", gap: "16px", flexWrap: "wrap" }}>
          {EVENT_CONFIG.ourAlliances.map((a, i) => {
            const colors = ["#ef4444", "#3b82f6", "#22c55e", "#f59e0b"];
            return (
              <div key={a} style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                <div style={{ width: "12px", height: "12px", borderRadius: "3px", background: colors[i] }} />
                <span style={{ fontSize: "13px", fontWeight: 600 }}>{a}</span>
                <span style={{ fontSize: "11px", color: "#94a3b8" }}>
                  ({Object.values(nodeAssignments).filter(v => v === a).length} nodes)
                </span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

let KINGDOM_POINTS = {
  era8: "—",
  era023: "—",
  era014: "—",
  era019: "—",
  lastUpdated: "Awaiting event start",
};

let ALLIANCE_POINTS = [
  { tag: "WC1", points: "—" },
  { tag: "MyT", points: "—" },
  { tag: "REU", points: "—" },
  { tag: "AGC", points: "—" },
];

// Desert Star scoreboards (event scoring — distinct from raw power/merits)
let KINGDOM_SCOREBOARD = [];   // [{rank, server, points}]
let ALLIANCE_SCOREBOARD = [];  // [{rank, tag, name, server, points}]

// Placer Gold tracker (cap 500k; costs/generation partly TBD)
let PLACER_GOLD = { cap: 500000, flagZone1Cost: 5000, note: "", alliances: [] };

function PointsTab() {
  return (
    <div>
      {/* Kingdom Scoreboard (Desert Star points) */}
      <div style={S.card}>
        <div style={S.cardTitle}>Kingdom Rankings — Desert Star</div>
        {(() => {
          // Fixed color order: Orange (#019) > Blue (#023) > Purple (Era 8) > Green (#014)
          const ORDER = ["Era #019", "Era #023", "Era 8", "Era #014"];
          const ptsFor = (srv) => {
            const row = (KINGDOM_SCOREBOARD || []).find(k => k.server === srv);
            return row ? Number(String(row.points).replace(/,/g, "")) : 0;
          };
          const segs = ORDER.map(srv => ({ srv, c: serverColor(srv), pts: ptsFor(srv), us: srv === "Era 8" }));
          const total = segs.reduce((s, x) => s + x.pts, 0);
          if (!total) return <div style={{ fontSize: "12px", color: "#64748b" }}>Awaiting scoreboard data.</div>;
          const fmt = (n) => n >= 1e9 ? (n/1e9).toFixed(2) + "B" : n >= 1e6 ? (n/1e6).toFixed(0) + "M" : n.toLocaleString();
          return (
            <div>
              {/* single proportional stacked bar */}
              <div style={{ display: "flex", width: "100%", height: "42px", borderRadius: "8px", overflow: "hidden", border: "1px solid var(--border)" }}>
                {segs.map(s => { const pct = (s.pts / total) * 100; return (
                  <div key={s.srv} title={s.srv + ": " + s.pts.toLocaleString()} style={{ width: pct + "%", background: s.c.hex, display: "flex", alignItems: "center", justifyContent: "center", position: "relative", borderRight: "1px solid rgba(0,0,0,0.25)" }}>
                    {pct >= 9 ? <span style={{ fontSize: "12px", fontWeight: 700, color: "#0b1120", textShadow: "0 1px 1px rgba(255,255,255,0.25)" }}>{pct.toFixed(1)}%</span> : null}
                  </div>
                ); })}
              </div>
              {/* legend */}
              <div style={{ display: "flex", flexWrap: "wrap", gap: "14px", marginTop: "10px", justifyContent: "center" }}>
                {segs.map(s => (
                  <div key={s.srv} style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                    <span style={{ width: "12px", height: "12px", borderRadius: "3px", background: s.c.hex, display: "inline-block" }} />
                    <span style={{ fontSize: "12px", color: "#cbd5e1", fontWeight: s.us ? 700 : 500 }}>{s.srv}{s.us ? " (Us)" : ""}</span>
                    <span style={{ fontSize: "12px", color: s.c.hex, fontWeight: 700, fontVariantNumeric: "tabular-nums" }}>{fmt(s.pts)}</span>
                  </div>
                ))}
              </div>
            </div>
          );
        })()}
        <div style={{ marginTop: "10px", fontSize: "11px", color: "#64748b", textAlign: "center" }}>
          Last updated: {KINGDOM_POINTS.lastUpdated} — Points lead determines Aaru Palace time selection priority
        </div>
      </div>

      {/* Cross-server Alliance Scoreboard (Desert Star points) */}
      {ALLIANCE_SCOREBOARD && ALLIANCE_SCOREBOARD.length ? (
        <div style={S.card}>
          <div style={S.cardTitle}>Alliance Rankings — Desert Star</div>
          <table style={S.table}>
            <thead>
              <tr>
                <th style={S.th}>#</th>
                <th style={S.th}>Alliance</th>
                <th style={{ ...S.th, textAlign: "right" }}>Points</th>
              </tr>
            </thead>
            <tbody>
              {ALLIANCE_SCOREBOARD.map((a, i) => { const c = serverColor(a.server); const us = a.server === "Era 8"; return (
                <tr key={i} style={us ? { background: "rgba(154,109,212,0.10)" } : undefined}>
                  <td style={S.td}>{a.rank || i + 1}</td>
                  <td style={S.td}><span style={{ fontWeight: 600, color: c.hex }}>{a.name} [{a.tag}]</span> <span style={{ fontSize: "11px", color: "#64748b" }}>{a.server}</span></td>
                  <td style={{ ...S.td, textAlign: "right", fontVariantNumeric: "tabular-nums" }}>{a.points}</td>
                </tr>
              ); })}
            </tbody>
          </table>
        </div>
      ) : null}

      {/* Per-Alliance Points (our alliances) */}
      <div style={S.card}>
        <div style={S.cardTitle}>Era 8 Alliance Desert Points</div>
        <table style={S.table}>
          <thead>
            <tr>
              <th style={S.th}>Alliance</th>
              <th style={S.th}>Desert Points</th>
            </tr>
          </thead>
          <tbody>
            {ALLIANCE_POINTS.map(a => (
              <tr key={a.tag}>
                <td style={S.td}><span style={{ fontWeight: 600 }}>{a.tag}</span></td>
                <td style={S.td}>{a.points}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Placer Gold tracker */}
      {PLACER_GOLD && PLACER_GOLD.alliances && PLACER_GOLD.alliances.length ? (
        <div style={S.card}>
          <div style={S.cardTitle}>Placer Gold — Estimated Balances</div>
          <div style={{ fontSize: "11px", color: "#64748b", marginBottom: "10px" }}>{PLACER_GOLD.note}</div>
          <table style={S.table}>
            <thead>
              <tr>
                <th style={S.th}>Alliance</th>
                <th style={{ ...S.th, textAlign: "right" }}>Current</th>
                <th style={{ ...S.th, minWidth: "130px" }}>Cap ({(PLACER_GOLD.cap/1000)}k)</th>
                <th style={{ ...S.th, textAlign: "right" }}>Gen /h</th>
                <th style={{ ...S.th, textAlign: "center" }}>Gates</th>
                <th style={{ ...S.th, textAlign: "center" }}>Pillars</th>
                <th style={{ ...S.th, textAlign: "center" }}>Flags</th>
              </tr>
            </thead>
            <tbody>
              {PLACER_GOLD.alliances.map(a => {
                const has = a.current != null;
                const pct = has ? Math.min(100, Math.round((a.current / PLACER_GOLD.cap) * 100)) : 0;
                const capped = has && a.current >= PLACER_GOLD.cap;
                const flagTxt = a.flags != null ? (a.flags + (a.flagsBuilding ? " (+" + a.flagsBuilding + ")" : "")) : "—";
                return (
                <tr key={a.tag}>
                  <td style={S.td}><span style={{ fontWeight: 600 }}>{a.tag}</span>{a.confirmed ? <span style={{ color: "#3daa6d", fontSize: "9px", marginLeft: "4px" }}>●</span> : null}</td>
                  <td style={{ ...S.td, textAlign: "right", fontVariantNumeric: "tabular-nums", color: capped ? "#ef4444" : (has ? "#e8eaf0" : "#64748b") }}>{has ? a.current.toLocaleString() : "—"}</td>
                  <td style={S.td}>
                    <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                      <div style={{ flex: 1, height: "6px", background: "#0f172a", borderRadius: "3px", overflow: "hidden" }}>
                        <div style={{ width: pct + "%", height: "100%", background: capped ? "#ef4444" : "#f5731f", borderRadius: "3px" }} />
                      </div>
                      <span style={{ fontSize: "11px", color: "#94a3b8", minWidth: "32px" }}>{has ? pct + "%" : "—"}</span>
                    </div>
                  </td>
                  <td style={{ ...S.td, textAlign: "right", fontVariantNumeric: "tabular-nums", color: (a.perHour > 0 ? "#3daa6d" : "#64748b") }}>{a.perHour > 0 ? "+" + a.perHour.toLocaleString() : "0"}</td>
                  <td style={{ ...S.td, textAlign: "center", color: (a.gates ? "#e8eaf0" : "#64748b") }}>{a.gates || "0"}</td>
                  <td style={{ ...S.td, textAlign: "center", color: (a.pillarCities ? "#f5731f" : "#64748b"), fontWeight: (a.pillarCities ? 600 : 400) }}>{a.pillarCities || "0"}</td>
                  <td style={{ ...S.td, textAlign: "center", color: "#94a3b8" }}>{flagTxt}</td>
                </tr>
              ); })}
            </tbody>
          </table>
          <div style={{ fontSize: "11px", color: "#64748b", marginTop: "8px" }}>
            <strong>Gates</strong> = gates/docks held (3k/h each) · <strong>Pillars</strong> = Pillar Cities held (8k/h each) · <strong>Flags</strong> = flags built (+ number building). <span style={{ color: "#3daa6d" }}>●</span> next to a tag = panel-confirmed balance; others' /h derived from holdings. Cap warning at 500k — spend before capping; gold is wasted once maxed.
          </div>
        </div>
      ) : null}

      {/* Placer Gold — node capture yields */}
      {PLACER_GOLD && PLACER_GOLD.nodes && PLACER_GOLD.nodes.length ? (
        <div style={S.card}>
          <div style={S.cardTitle}>Placer Gold — Node Capture Yields</div>
          <div style={{ fontSize: "11px", color: "#64748b", marginBottom: "10px" }}>
            First-capture bonus goes to the <strong>first</strong> alliance to take the node; the /h generation then accrues to whoever holds it. Grab high-value nodes early — the one-time bonus is the prize.
          </div>
          <table style={S.table}>
            <thead>
              <tr>
                <th style={S.th}>Node</th>
                <th style={{ ...S.th, textAlign: "right" }}>First-capture bonus</th>
                <th style={{ ...S.th, textAlign: "right" }}>Generation /h</th>
              </tr>
            </thead>
            <tbody>
              {PLACER_GOLD.nodes.map(n => {
                const none = !n.firstBonus && !n.perHour;
                return (
                <tr key={n.key}>
                  <td style={{ ...S.td, color: none ? "#64748b" : "#e8eaf0" }}>{n.label}</td>
                  <td style={{ ...S.td, textAlign: "right", fontVariantNumeric: "tabular-nums", color: n.firstBonus > 0 ? "#f5731f" : "#64748b", fontWeight: n.firstBonus > 0 ? 600 : 400 }}>{n.firstBonus > 0 ? n.firstBonus.toLocaleString() : "—"}</td>
                  <td style={{ ...S.td, textAlign: "right", fontVariantNumeric: "tabular-nums", color: n.perHour > 0 ? "#3daa6d" : "#64748b" }}>{n.perHour > 0 ? "+" + n.perHour.toLocaleString() : "—"}</td>
                </tr>
              ); })}
            </tbody>
          </table>
          <div style={{ fontSize: "11px", color: "#64748b", marginTop: "8px" }}>
            Aaru Palace and Towers of Rotation yield no Placer Gold. Flag <em>costs</em>: Z1 5k, Z2 50k (flags ≤10th) — higher count-tiers (11th+, 20th+…) still TBD.
          </div>
        </div>
      ) : null}

      {/* Achievements — per-alliance progress */}
      <div style={S.card}>
        <div style={S.cardTitle}>Conquest Achievements — Alliance Progress</div>
        <div style={{ fontSize: "11px", color: "#64748b", marginBottom: "10px" }}>
          Progress toward each alliance-level achievement. <span style={{ color: "#3daa6d" }}>✓</span> = met.
          Personal requirements (met individually, not tracked here) shown at right. Point-based rows for REU/MyT/AGC pending scouting.
        </div>
        <div style={{ overflowX: "auto" }}>
        <table style={S.table}>
          <thead>
            <tr>
              <th style={S.th}>Achievement</th>
              <th style={S.th}>Requirement</th>
              {["WC1","REU","MyT","AGC"].map(tag => <th key={tag} style={{ ...S.th, textAlign: "center" }}>{tag}</th>)}
              <th style={S.th}>Personal</th>
            </tr>
          </thead>
          <tbody>
            {ACHIEVEMENTS.map(a => {
              const abbr = (n) => { n = Number(n); if (n >= 1e9) return (n/1e9).toFixed(2).replace(/\.?0+$/,"")+"B"; if (n >= 1e6) return (n/1e6).toFixed(0)+"M"; if (n >= 1e3) return (n/1e3).toFixed(0)+"K"; return String(n); };
              const cell = (tag) => {
                const cur = a.cur ? a.cur[tag] : null;
                if (cur == null) return <span style={{ color: "#475569" }}>—</span>;
                const met = cur >= a.target;
                const label = a.target >= 1e6 ? (abbr(cur) + "/" + abbr(a.target)) : (cur + "/" + a.target);
                return <span style={{ color: met ? "#3daa6d" : "#94a3b8", fontWeight: met ? 700 : 400, fontVariantNumeric: "tabular-nums", whiteSpace: "nowrap" }}>{met ? "✓ " : ""}{label}</span>;
              };
              return (
              <tr key={a.name}>
                <td style={S.td}><span style={{ fontWeight: 600 }}>{a.name}</span></td>
                <td style={{ ...S.td, fontSize: "12px", color: "#94a3b8" }}>{a.req}{a.target >= 1e6 ? " (" + abbr(a.target) + ")" : (a.target > 1 ? " (" + a.target + ")" : "")}</td>
                {["WC1","REU","MyT","AGC"].map(tag => <td key={tag} style={{ ...S.td, textAlign: "center", fontSize: "12px" }}>{cell(tag)}</td>)}
                <td style={{ ...S.td, fontSize: "11px", color: "#64748b" }}>{a.personal}</td>
              </tr>
            ); })}
          </tbody>
        </table>
        </div>
      </div>
    </div>
  );
}

let DEFAULT_DIPLOMACY = [
  { id: 1, server: "Era #023", alliance: "TBD", relation: "ally", notes: "Shared half (left/right eyes) — highest-priority peace. Beat us in TME invasion recently; SD rank 13." },
  { id: 2, server: "Era #019", alliance: "TBD", relation: "ally", notes: "SD rank 2 — must-win for their top-3 season reward. Appease/feed to survive." },
  { id: 3, server: "Era #014", alliance: "TBD", relation: "ally", notes: "SD rank 11. Maintain peace." },
];

let CONTACTS = [];

function DiplomacyTab({ state, setState }) {
  const diplomacy = state.diplomacy || DEFAULT_DIPLOMACY;

  const addEntry = () => {
    const next = [...diplomacy, { server: "", alliance: "", relation: "neutral", notes: "", id: Date.now() }];
    setState(prev => ({ ...prev, diplomacy: next }));
  };

  const updateEntry = (id, field, value) => {
    const next = diplomacy.map(d => d.id === id ? { ...d, [field]: value } : d);
    setState(prev => ({ ...prev, diplomacy: next }));
  };

  const removeEntry = (id) => {
    const next = diplomacy.filter(d => d.id !== id);
    setState(prev => ({ ...prev, diplomacy: next }));
  };

  const relationColors = { ally: "#22c55e", nap: "#3b82f6", neutral: "#94a3b8", hostile: "#ef4444" };

  return (
    <div>
      <div style={S.card}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px" }}>
          <div style={S.cardTitle}>Diplomacy Tracker</div>
          <button style={S.btn("#7c3aed")} onClick={addEntry}>+ Add</button>
        </div>
        <div style={{ fontSize: "12px", color: "#94a3b8", marginBottom: "12px" }}>
          Track relationships with alliances from other servers. Relations: Ally (coordinate together), NAP (non-aggression pact), Neutral (unknown/undecided), Hostile (target).
        </div>
        {diplomacy.length === 0 && (
          <div style={{ textAlign: "center", padding: "24px", color: "#64748b", fontSize: "13px" }}>
            No diplomacy entries yet. Add relationships with other servers' alliances.
          </div>
        )}
        {diplomacy.map(d => (
          <div key={d.id} style={{ display: "flex", gap: "8px", alignItems: "center", marginBottom: "8px", padding: "10px", background: "#0f172a", borderRadius: "8px", flexWrap: "wrap" }}>
            <input
              style={{ ...S.input, width: "100px" }}
              placeholder="Server"
              value={d.server}
              onChange={e => updateEntry(d.id, "server", e.target.value)}
            />
            <input
              style={{ ...S.input, width: "80px" }}
              placeholder="Alliance"
              value={d.alliance}
              onChange={e => updateEntry(d.id, "alliance", e.target.value)}
            />
            <select
              style={S.select}
              value={d.relation}
              onChange={e => updateEntry(d.id, "relation", e.target.value)}
            >
              <option value="ally">Ally</option>
              <option value="nap">NAP</option>
              <option value="neutral">Neutral</option>
              <option value="hostile">Hostile</option>
            </select>
            <span style={{ ...S.badge(relationColors[d.relation]), textTransform: "uppercase" }}>{d.relation}</span>
            <input
              style={{ ...S.input, flex: 1, minWidth: "120px" }}
              placeholder="Notes..."
              value={d.notes}
              onChange={e => updateEntry(d.id, "notes", e.target.value)}
            />
            <button style={S.btnSmall("#ef4444")} onClick={() => removeEntry(d.id)}>X</button>
          </div>
        ))}
      </div>

      {/* Contacts */}
      <div style={S.card}>
        <div style={S.cardTitle}>Key Contacts</div>
        {CONTACTS.map(c => (
          <div key={c.name} style={{ display: "flex", gap: "12px", alignItems: "center", padding: "10px", background: "#0f172a", borderRadius: "8px", marginBottom: "6px" }}>
            <span style={S.badge("#a855f7")}>{c.server}</span>
            <span style={{ fontWeight: 700 }}>{c.name}</span>
            <span style={{ fontSize: "11px", color: "#94a3b8", flex: 1 }}>{c.note}</span>
          </div>
        ))}
      </div>

      {/* Diplomacy Rules */}
      <div style={S.card}>
        <div style={S.cardTitle}>Rules of Engagement</div>
        <div style={{ display: "grid", gap: "8px" }}>
          <div style={{ padding: "10px", background: "#22c55e11", border: "1px solid #22c55e44", borderRadius: "8px" }}>
            <div style={{ fontWeight: 700, color: "#22c55e", fontSize: "13px" }}>Allies (Era #014)</div>
            <div style={{ fontSize: "12px", color: "#94a3b8", marginTop: "4px" }}>No zeroing citadels. No killing farmers. Coordinate and support each other. Fight over Aaru as normal (every kingdom for itself at the Palace).</div>
          </div>
          <div style={{ padding: "10px", background: "#94a3b811", border: "1px solid #94a3b844", borderRadius: "8px" }}>
            <div style={{ fontWeight: 700, color: "#94a3b8", fontSize: "13px" }}>Neutral (Era #023)</div>
            <div style={{ fontSize: "12px", color: "#94a3b8", marginTop: "4px" }}>Shared half (left/right eyes). Keep the peace — if they don't mess with us, we don't mess with them. If they do, respond in kind.</div>
          </div>
          <div style={{ padding: "10px", background: "#ef444411", border: "1px solid #ef444444", borderRadius: "8px" }}>
            <div style={{ fontWeight: 700, color: "#ef4444", fontSize: "13px" }}>Enemy (Era #019)</div>
            <div style={{ fontSize: "12px", color: "#94a3b8", marginTop: "4px" }}>SD rank 2, must-win for their top-3 season reward — heavily outmatched. Avoid feeding kills; bubble/dodge bad trades. Survive rather than trade blows head-on.</div>
          </div>
        </div>
      </div>

      {/* Aaru Palace Time Preference */}
      <div style={S.card}>
        <div style={S.cardTitle}>Aaru Palace Time Vote</div>
        <div style={{ fontSize: "12px", color: "#94a3b8", marginBottom: "12px" }}>
          Top 300 power-ranked players vote. Kingdom with most Desert Points picks the time. Voting closes Saturday 00:00 UTC (2026-07-11).
        </div>
        <div style={{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
          {AARU_TIME_SLOTS.map(slot => (
            <button
              key={slot.label}
              style={S.btn(state.aaruTimeSlot === slot.label ? "#22c55e" : "#334155")}
              onClick={() => setState(prev => ({ ...prev, aaruTimeSlot: slot.label }))}
            >
              {slot.label}
            </button>
          ))}
        </div>

function RoutePlannerTab({ state, setState }) {

/* ═══════════════════════════════════════════════════
   RESEARCH / SCOUTING
   ═══════════════════════════════════════════════════ */
let RESEARCH = {
  ours: { server: "Era 8", sdRank: null, alliances: [], players: [] },
  opponents: []
};

// M:P % + activity tier (players run a wide scale; alliances a low one)
const rmp = (m, p) => { const mm=parseInt(String(m).replace(/,/g,""),10)||0; const pp=parseInt(String(p).replace(/,/g,""),10)||1; return ((mm/pp)*100); };
const rfmt = (v) => { const n=parseInt(String(v).replace(/,/g,""),10); if(isNaN(n))return v; if(n>=1e9)return (n/1e9).toFixed(2)+"B"; if(n>=1e6)return (n/1e6).toFixed(1)+"M"; return String(v); };
const allianceMpCls = (pct) => pct>=8?"hi":pct>=4?"mid":"lo";
const playerMpCls = (pct) => pct>=65?"hi":pct>=35?"mid":"lo";

// Per-server map-position colors (muted): us purple, and the three opponents
// matched to their map positions. rgb triplets so we can tint bar/border.
const SERVER_COLORS = {
  "Era 8":    { rgb: "154,109,212", hex: "#9a6dd4" },  // purple
  "Era #023": { rgb: "91,139,196",  hex: "#5b8bc4" },  // blue
  "Era #014": { rgb: "90,168,122",  hex: "#5aa87a" },  // green
  "Era #019": { rgb: "212,147,74",  hex: "#d4934a" }   // orange
};
const serverColor = (srv) => SERVER_COLORS[srv] || { rgb: "138,144,165", hex: "#8a90a5" };

// One server's table (alliances OR players) as a cmp-card, tinted by map color.
function ServerTable({ server, sdRank, priority, rows, kind }) {
  const c = serverColor(server);
  const priBadge = { critical: "#ef4444", high: "#f5731f", medium: "#f59e0b", low: "#94a3b8" };
  const cls = kind === "players" ? playerMpCls : allianceMpCls;
  return (
    <div className="cmp-card" style={{ borderColor: "rgba(" + c.rgb + ",0.4)" }}>
      <div className="cmp-head" style={{ background: "rgba(" + c.rgb + ",0.12)", borderBottomColor: "rgba(" + c.rgb + ",0.4)", color: c.hex, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
        <span>{server}{server === "Era 8" ? " · Us" : ""}</span>
        {sdRank != null && <span style={{ fontSize: 10, fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 700, letterSpacing: 0.5, color: "#cbd5e1", background: "rgba(255,255,255,0.06)", padding: "1px 6px", borderRadius: 4 }}>SD #{sdRank}</span>}
        {priority && <span style={{ fontSize: 9.5, fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 700, letterSpacing: 0.5, textTransform: "uppercase", color: priBadge[priority] || "#94a3b8" }}>{priority}</span>}
      </div>
      {rows && rows.length ? (
        <table className="cmp-tbl cmp-tbl-wrap">
          <thead><tr><th className="c-rk">#</th><th className="c-nm"></th><th className="c-p">Power</th><th className="c-mp">M:P</th></tr></thead>
          <tbody>
          {rows.map((r, i) => { const has = r.merits !== "" && r.merits != null; const pct = rmp(r.merits, r.power);
            const nm = kind === "players"
              ? (<span>{r.name} <span className="tg">[{r.alliance}]</span></span>)
              : (<span>{r.name ? r.name + " " : ""}<span className="tg">[{r.tag}]</span></span>);
            return (
            <tr key={i}>
              <td className="c-rk">{r.rank || i + 1}</td>
              <td className="c-nm">{nm}</td>
              <td className="c-p" style={{ color: c.hex }}>{rfmt(r.power)}</td>
              <td className={"c-mp " + (has ? cls(pct) : "")} style={has ? undefined : { color: "#64748b" }}>{has ? pct.toFixed(1) + "%" : "—"}</td>
            </tr>
          ); })}
          </tbody>
        </table>
      ) : <div style={{ padding: "14px 12px", fontSize: 12, color: "#64748b", fontStyle: "italic" }}>Awaiting scouting data.</div>}
    </div>
  );
}

function ResearchTab() {
  const r = RESEARCH || { ours: {}, opponents: [] };
  // ordered server list: us first, then opponents as given
  const servers = [
    { server: r.ours?.server || "Era 8", sdRank: r.ours?.sdRank, priority: null, alliances: r.ours?.alliances || [], players: r.ours?.players || [] },
    ...(r.opponents || []).map(o => ({ server: o.server, sdRank: o.sdRank, priority: o.priority, alliances: o.alliances || [], players: o.players || [] }))
  ];
  return (
    <div>
      <div style={S.card}>
        <div style={S.cardTitle}>Scouting &amp; Research</div>
        <div style={{ fontSize: 12, color: "#94a3b8", lineHeight: 1.6 }}>
          Top alliances and players per server, colored by map position
          (<span style={{ color: "#9a6dd4" }}>Era 8</span>, <span style={{ color: "#5b8bc4" }}>#023</span>,
          <span style={{ color: "#5aa87a" }}> #014</span>, <span style={{ color: "#d4934a" }}>#019</span>).
          We're <strong style={{ color: "#e8eaf0" }}>SD rank {r.ours?.sdRank ?? "—"}</strong> and heavily outmatched — appease the
          contenders and survive. Power is raw strength; M:P (merits ÷ power) flags combat activity:
          <span style={{ color: "#3daa6d" }}> green</span> high, <span style={{ color: "#d4a843" }}>amber</span> average,
          <span style={{ color: "#c9603f" }}> red</span> low/parked.
        </div>
      </div>

      {/* ALLIANCES */}
      <div style={S.card}>
        <div style={S.cardTitle}>Top Alliances</div>
        <div className="cmp-grid">
          {servers.map((s, i) => <ServerTable key={i} server={s.server} sdRank={s.sdRank} priority={s.priority} rows={s.alliances} kind="alliances" />)}
        </div>
      </div>

      {/* PLAYERS */}
      <div style={S.card}>
        <div style={S.cardTitle}>Top Players</div>
        <div className="cmp-grid">
          {servers.map((s, i) => <ServerTable key={i} server={s.server} sdRank={s.sdRank} priority={s.priority} rows={s.players} kind="players" />)}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════════ */
function App() {
  const [state, setStateRaw] = useState(() => loadState());
  const [tab, setTab] = useState("overview");

  const setState = useCallback((updater) => {
    setStateRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      saveState(next);
      return next;
    });
  }, []);

  // Standard event-meta block (Start|End|TZ + countdown + stage + ical stub).
  useEffect(() => {
    let tries = 0;
    // only treat a value as a real date if it parses as YYYY-MM-DD; otherwise
    // pass it through as a label (e.g. "TBD") and skip the countdown ISO.
    const isDate = (d) => typeof d === "string" && /^\d{4}-\d{2}-\d{2}$/.test(d) && !isNaN(Date.parse(d + "T00:00:00Z"));
    const fmt = (d) => isDate(d) ? new Date(d + "T00:00:00Z").toLocaleDateString("en-US",{month:"short",day:"numeric",timeZone:"UTC"}) : (d || "TBD");
    const mount = () => {
      if (window.EventHeader && document.getElementById("evtMeta")) {
        const ec = EVENT_CONFIG;
        window.EventHeader.mount("#evtMeta", {
          startLabel: fmt(ec.eventStart),
          endLabel: fmt(ec.eventEnd),
          timezone: "UTC+0",
          startISO: isDate(ec.eventStart) ? ec.eventStart + "T00:00:00Z" : null,
          endISO: isDate(ec.eventEnd) ? ec.eventEnd + "T00:00:00Z" : null,
          liveLabel: "Contest Live",
          ical: { stub: true, label: "Add to Calendar" }
        });
      } else if (tries++ < 50) { setTimeout(mount, 50); }
    };
    mount();
  }, []);

  const TABS = [
    { id: "overview", label: "Overview" },
    { id: "research", label: "Research" },
    { id: "schedule", label: "Schedule" },
    { id: "map", label: "Map & Nodes" },
    { id: "routes", label: "Route Planner" },
    { id: "pve", label: "PvE Guide" },
    { id: "points", label: "Points" },
    { id: "diplomacy", label: "Diplomacy" },
  ];

  return (
    <div style={S.app}>
      <div style={S.header}>
        <div style={S.headerSub}>Age of Empires Mobile — Era 8 Command Center</div>
        <h1 style={S.headerTitle}>DESOLATE DESERT</h1>
        <div style={{ fontSize: "var(--fs-sub,12px)", color: "#64748b", marginTop: "4px" }}>
          {EVENT_CONFIG.servers.join(" vs ")}
        </div>
        <div id="evtMeta"></div>
      </div>

      <div className="tabs">
        {TABS.map(t => (
          <button key={t.id} className={"tab"+(tab === t.id?" active":"")} onClick={() => setTab(t.id)}>
            {t.label}
          </button>
        ))}
      </div>

      <div style={S.content}>
        {tab === "overview" && <OverviewTab state={state} setState={setState} />}
        {tab === "research" && <ResearchTab />}
        {tab === "schedule" && <ScheduleTab />}
        {tab === "map" && <MapTab state={state} setState={setState} />}
        {tab === "routes" && <RoutePlannerTab state={state} setState={setState} />}
        {tab === "pve" && <PveTab />}
        {tab === "points" && <PointsTab />}
        {tab === "diplomacy" && <DiplomacyTab state={state} setState={setState} />}
      </div>
    </div>
  );
}

// Overlay published live config (../data/live/desolate.json) onto the in-code defaults,
// then mount. On any failure the in-code defaults render unchanged. localStorage (diplomacy
// edits, routes, node assignments) still overlays on top via loadState() in App's state.
(async () => {
  try {
    const res = await fetch("../data/live/desolate.json");
    if (res.ok) {
      const j = await res.json();
      if (j) {
        if (j.eventConfig)    EVENT_CONFIG    = j.eventConfig;
        if (j.kingdomPoints)  KINGDOM_POINTS  = j.kingdomPoints;
        if (j.alliancePoints) ALLIANCE_POINTS = j.alliancePoints;
        if (j.diplomacy)      DEFAULT_DIPLOMACY = j.diplomacy;
        if (j.contacts)       CONTACTS        = j.contacts;
        if (j.research)       RESEARCH        = j.research;
        if (j.kingdomScoreboard)  KINGDOM_SCOREBOARD  = j.kingdomScoreboard;
        if (j.allianceScoreboard) ALLIANCE_SCOREBOARD = j.allianceScoreboard;
        if (j.placerGold)         PLACER_GOLD         = j.placerGold;
      }
    }
  } catch (e) {
    console.error("Desolate live config load failed; using in-code defaults", e);
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
})();
