<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Workshop — Era8 Brief</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/kvk-theme.css">
<style>
:root {
  --gold:#d4a017; --gold-light:#f0c842; --gold-dim:#7a5c0e;
  --teal:#1abc9c; --crimson:#c0392b;
  --bg:#0a0c14; --bg2:#11141f; --bg3:#161a28;
  --border:rgba(212,160,23,0.25); --text:#e8dcc8; --dim:#7a7060;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;}
.page{max-width:var(--w-content);margin:0 auto;padding:18px;}

/* LANG SWITCHER */
.lang-bar{display:flex;justify-content:flex-end;gap:6px;margin-bottom:14px;}
.lang-btn{font-family:var(--font-ui);font-size:11px;letter-spacing:1px;padding:5px 12px;border-radius:4px;border:1px solid var(--border);background:var(--bg2);color:var(--dim);cursor:pointer;transition:all .15s;}
.lang-btn:hover{color:var(--gold-light);border-color:rgba(212,160,23,0.5);}
.lang-btn.active{background:rgba(212,160,23,0.12);border-color:rgba(212,160,23,0.5);color:var(--gold-light);}

/* HEADER */
.header{text-align:center;padding:56px 16px 36px;min-height:260px;display:flex;flex-direction:column;justify-content:center;border-bottom:2px solid var(--kvk-accent-dim);margin-bottom:18px;position:relative;overflow:hidden;}
.header::after{content:'';position:absolute;inset:0;z-index:0;background-image:var(--kvk-bg);background-size:cover;background-position:center top;background-repeat:no-repeat;opacity:.55;pointer-events:none;-webkit-mask-image:linear-gradient(to bottom,rgba(0,0,0,.95) 0%,rgba(0,0,0,.55) 70%,transparent 100%);mask-image:linear-gradient(to bottom,rgba(0,0,0,.95) 0%,rgba(0,0,0,.55) 70%,transparent 100%);}
.header::before{content:'';position:absolute;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse at center top,rgba(var(--kvk-accent-rgb),0.14) 0%,transparent 70%);}
.header>*{position:relative;z-index:2;}
.header-pre{font-size:10px;letter-spacing:5px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:6px;}
.header-title{font-family:var(--font-display);font-size:30px;color:var(--gold-light);text-shadow:0 0 40px rgba(212,160,23,0.4);margin-bottom:4px;}
.header-sub{font-size:11px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px 16px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.4;}
.ctitle{font-family:var(--font-ui);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:10px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;}

/* TIMING */
.time-block{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.time-block:last-child{border-bottom:none;padding-bottom:0;}
.time-icon{font-size:22px;width:32px;text-align:center;flex-shrink:0;}
.time-val{font-family:var(--font-ui);font-size:18px;color:var(--gold-light);font-weight:700;}

/* SPAWN */
.spawn-info{text-align:center;padding:6px 0;}
.spawn-big{font-size:38px;margin-bottom:6px;}
.spawn-line{font-family:var(--font-ui);font-size:13px;color:var(--gold-light);margin-bottom:4px;}
.spawn-sub{font-size:11px;color:var(--dim);}
.r45-badge{display:inline-flex;align-items:center;gap:5px;margin-top:10px;padding:5px 12px;border-radius:12px;background:rgba(212,160,23,0.15);border:1px solid rgba(212,160,23,0.35);font-family:var(--font-ui);font-size:11px;color:var(--gold-light);letter-spacing:1px;}

/* REWARDS */
.reward-box{border-radius:5px;padding:10px 12px;text-align:center;margin-bottom:8px;}
.reward-box:last-child{margin-bottom:0;}
.rb-capture{background:rgba(212,160,23,0.08);border:1px solid rgba(212,160,23,0.3);}
.rb-hold{background:rgba(26,188,156,0.08);border:1px solid rgba(26,188,156,0.25);}
.rb-num{font-family:var(--font-display);font-size:28px;line-height:1;}
.rb-capture .rb-num{color:var(--gold-light);text-shadow:0 0 20px rgba(212,160,23,0.5);}
.rb-hold .rb-num{color:var(--teal);}
.rb-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
.rb-capture .rb-label{color:var(--gold-dim);}
.rb-hold .rb-label{color:rgba(26,188,156,0.6);}
.rb-sub{font-size:11px;color:var(--dim);margin-top:3px;line-height:1.4;}

/* ZONE DIAGRAM */
.zone-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;}
.sq-diagram{position:relative;width:188px;height:188px;margin-top:20px;}
.sq-outer{position:absolute;inset:0;border:2px dashed rgba(212,160,23,0.35);background:rgba(212,160,23,0.03);border-radius:3px;}
.sq-label-outer{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--gold-dim);white-space:nowrap;}
.sq-ws{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;background:rgba(212,160,23,0.12);border:2px solid var(--gold);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:22px;z-index:3;}
.sq-march{position:absolute;width:20px;height:20px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:11px;z-index:4;}
.march-friendly{background:rgba(26,188,156,0.2);border:1px solid rgba(26,188,156,0.5);}
.march-t1{background:rgba(58,123,213,0.2);border:1px solid rgba(58,123,213,0.45);}
.march-kraken{background:rgba(212,160,23,0.15);border:1px solid rgba(212,160,23,0.4);}
.march-enemy{background:rgba(192,57,43,0.2);border:1px solid rgba(192,57,43,0.5);}
.zr-row{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;}
.zr-row:last-child{border-bottom:none;}
.zr-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.zr-em{color:var(--gold-light);font-weight:700;}

/* ROLES */
.role-card{border-radius:6px;padding:12px 10px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;}
.role-card:last-child{margin-bottom:0;}
.rc-fighter{background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.35);}
.rc-kraken{background:rgba(212,160,23,0.08);border:1px solid rgba(212,160,23,0.3);}
.rc-support{background:rgba(58,123,213,0.1);border:1px solid rgba(58,123,213,0.3);}
.rc-icon{font-size:26px;flex-shrink:0;}
.rc-title{font-family:var(--font-ui);font-size:12px;font-weight:700;margin-bottom:3px;}
.rc-fighter .rc-title{color:#e74c3c;}
.rc-kraken .rc-title{color:var(--gold-light);}
.rc-support .rc-title{color:#7aadff;}
.rc-desc{font-size:12px;color:var(--dim);line-height:1.5;}
.rc-desc em{font-style:normal;color:var(--text);}

/* STRATEGY */
.ws-target-row{display:flex;gap:10px;margin:10px 0;}
.ws-t-node{flex:1;border-radius:6px;padding:10px 8px;text-align:center;}
.wst-go{background:rgba(26,188,156,0.1);border:2px solid rgba(26,188,156,0.4);}
.wst-skip{background:rgba(192,57,43,0.06);border:2px dashed rgba(192,57,43,0.25);opacity:0.5;}
.wst-icon{font-size:22px;}
.wst-badge{font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-top:4px;}
.wst-go .wst-badge{color:var(--teal);}
.wst-skip .wst-badge{color:rgba(192,57,43,0.6);}
.ws-reasoning{background:var(--bg3);border-left:3px solid var(--gold-dim);border-radius:0 4px 4px 0;padding:8px 10px;font-size:12px;color:var(--dim);line-height:1.5;}
.ws-reasoning strong{color:var(--gold);}
.opp-row{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin:10px 0;}
.opp-side{border-radius:6px;padding:10px;text-align:center;}
.opp-bad{background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.3);}
.opp-good{background:rgba(26,188,156,0.08);border:1px solid rgba(26,188,156,0.25);}
.opp-icon{font-size:22px;margin-bottom:4px;}
.opp-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.opp-bad .opp-lbl{color:rgba(192,57,43,0.7);}
.opp-good .opp-lbl{color:rgba(26,188,156,0.6);}
.opp-val{font-family:var(--font-ui);font-size:15px;}
.opp-bad .opp-val{color:#e74c3c;}
.opp-good .opp-val{color:var(--teal);}
.opp-sub{font-size:10px;color:var(--dim);margin-top:3px;line-height:1.4;}
.vs-mid{font-family:var(--font-ui);font-size:16px;color:var(--gold-dim);text-align:center;}
.opp-warning{background:var(--bg3);border-left:3px solid var(--crimson);border-radius:0 4px 4px 0;padding:8px 10px;font-size:11px;color:var(--dim);line-height:1.5;}
.opp-warning strong{color:var(--text);}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:12px;margin:22px 0 14px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.div-label{font-family:var(--font-ui);font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-dim);white-space:nowrap;}

/* CITADELS */
.cit-panels{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.cit-panel{background:var(--bg3);border-radius:6px;padding:14px 14px 10px;}
.cit-panel-title{font-family:var(--font-ui);font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.06);}
.cit-panel.panel-ours .cit-panel-title{color:var(--teal);}
.cit-panel.panel-theirs .cit-panel-title{color:#e74c3c;}
.cit-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.cit-row:last-child{border-bottom:none;padding-bottom:0;}
.cit-tri{flex-shrink:0;width:36px;height:32px;}
.cit-tri svg{width:100%;height:100%;}
.cit-row-name{font-family:var(--font-ui);font-size:11px;font-weight:700;}
.cit-row-desc{font-size:11px;color:var(--dim);line-height:1.4;margin-top:1px;}
.cit-row-action{display:inline-block;margin-top:3px;font-size:9px;text-transform:uppercase;letter-spacing:1px;padding:1px 7px;border-radius:6px;font-weight:700;}
.act-reinforce{background:rgba(58,123,213,0.2);color:#7aadff;border:1px solid rgba(58,123,213,0.4);}
.act-support{background:rgba(232,197,58,0.15);color:#f0d060;border:1px solid rgba(232,197,58,0.3);}
.act-ignore{background:rgba(255,255,255,0.04);color:var(--dim);border:1px dashed rgba(255,255,255,0.15);}
.act-attack{background:rgba(231,76,60,0.2);color:#e74c3c;border:1px solid rgba(231,76,60,0.4);}

.footer{text-align:center;padding:16px 0;border-top:1px solid var(--border);margin-top:20px;font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;}

@media(max-width:580px){
  .row2,.row3{grid-template-columns:1fr;}
  .header-title{font-size:22px;}
  .cit-panels{grid-template-columns:1fr;}
}
</style>
</head>
<body data-kvk="workshop">
<div class="page">

<!-- LANG SWITCHER moved to the shared header (see registration at end of body) -->

<!-- HEADER -->
<div class="header" style="--kvk-bg:url('../assets/kvk-bg/primordial.jpg')">
  <div class="header-pre" data-t="header_pre"></div>
  <div class="header-title" data-t="header_title"></div>
  <div class="header-sub" data-t="header_sub"></div>
</div>

<!-- ROW 1 -->
<div class="row3">
  <div class="card">
    <div class="ctitle" data-t="when_title"></div>
    <div class="time-block">
      <div class="time-icon">🕓</div>
      <div>
        <div class="time-val">19:00–20:00</div>
        <div style="font-size:10px;color:var(--dim)" data-t="our_pick"></div>
      </div>
    </div>
    <div class="spawn-sub" data-t="when_note" style="margin-top:8px"></div>
    <div class="r45-badge" data-t="when_options"></div>
  </div>

  <div class="card">
    <div class="ctitle" data-t="spawn_title"></div>
    <div class="spawn-info">
      <div class="spawn-big">🏭🏭🏭</div>
      <div class="spawn-line" data-t="spawn_line"></div>
      <div class="spawn-sub" data-t="spawn_sub"></div>
      <div class="r45-badge" data-t="r45_badge"></div>
    </div>
  </div>

  <div class="card">
    <div class="ctitle" data-t="rewards_title"></div>
    <div class="reward-box rb-capture">
      <div class="rb-num">600M</div>
      <div class="rb-label" data-t="pts_capture"></div>
      <div class="rb-sub" data-t="pts_capture_sub"></div>
    </div>
    <div class="reward-box rb-hold">
      <div class="rb-num">+500</div>
      <div class="rb-label" data-t="pts_hold"></div>
    </div>
  </div>
</div>

<!-- ROW 2 -->
<div class="row2">
  <div class="card">
    <div class="ctitle" data-t="zone_title"></div>
    <div class="zone-wrap">
      <div class="sq-diagram">
        <div class="sq-outer">
          <div class="sq-label-outer" data-t="zone_label"></div>
        </div>
        <div class="sq-ws">🏭</div>
        <div class="sq-march march-friendly" style="top:18%;left:30%;">⚔</div>
        <div class="sq-march march-friendly" style="top:25%;left:55%;">⚔</div>
        <div class="sq-march march-friendly" style="top:55%;left:60%;">⚔</div>
        <div class="sq-march march-friendly" style="top:62%;left:28%;">⚔</div>
        <div class="sq-march march-t1" style="top:8%;right:4%;">🛡</div>
        <div class="sq-march march-t1" style="top:28%;right:4%;">🛡</div>
        <div class="sq-march march-t1" style="top:48%;right:4%;">🛡</div>
        <div class="sq-march march-t1" style="top:68%;right:4%;">🛡</div>
        <div class="sq-march march-kraken" style="top:18%;left:4%;">🐙</div>
        <div class="sq-march march-kraken" style="top:42%;left:4%;">🐙</div>
        <div class="sq-march march-kraken" style="top:66%;left:4%;">🐙</div>
        <div class="sq-march march-enemy" style="top:38%;left:-28px;">😡</div>
        <div style="position:absolute;top:43%;left:-8px;font-size:11px;color:rgba(192,57,43,0.5);">→</div>
        <div style="position:absolute;bottom:-18px;left:2px;font-size:8px;color:rgba(192,57,43,0.5);letter-spacing:1px;" data-t="diag_enemy"></div>
        <div style="position:absolute;bottom:-18px;right:2px;font-size:8px;color:rgba(58,123,213,0.55);letter-spacing:1px;" data-t="diag_t1"></div>
      </div>
    </div>
    <div style="margin-top:20px;">
      <div class="zr-row"><div class="zr-icon">🚶</div><div data-t="zr_teleport"></div></div>
      <div class="zr-row"><div class="zr-icon">♾️</div><div data-t="zr_nocap"></div></div>
      <div class="zr-row"><div class="zr-icon">👥</div><div data-t="zr_more"></div></div>
      <div class="zr-row"><div class="zr-icon">⏬</div><div data-t="zr_timer"></div></div>
      <div class="zr-row"><div class="zr-icon">⚖️</div><div data-t="zr_tier"></div></div>
    </div>
    <div style="margin-top:10px;background:rgba(212,160,23,0.08);border:1px solid rgba(212,160,23,0.35);border-radius:5px;padding:9px 12px;display:flex;align-items:flex-start;gap:8px;">
      <span style="font-size:18px;flex-shrink:0;">🔒</span>
      <div style="font-size:12px;line-height:1.5;" data-t="stay_inside"></div>
    </div>
  </div>

  <div class="card">
    <div class="ctitle" data-t="role_title"></div>
    <div class="role-card rc-fighter">
      <div class="rc-icon">⚔️</div>
      <div class="rc-body">
        <div class="rc-title" data-t="role_fighter_name"></div>
        <div class="rc-desc" data-t="role_fighter_desc"></div>
      </div>
    </div>
    <div class="role-card rc-kraken">
      <div class="rc-icon">🐙</div>
      <div class="rc-body">
        <div class="rc-title" data-t="role_kraken_name"></div>
        <div class="rc-desc" data-t="role_kraken_desc"></div>
      </div>
    </div>
    <div class="role-card rc-support">
      <div class="rc-icon">🛡️</div>
      <div class="rc-body">
        <div class="rc-title" data-t="role_support_name"></div>
        <div class="rc-desc" data-t="role_support_desc"></div>
      </div>
    </div>
  </div>
</div>

<!-- ALERTS ROW -->
<div class="row2">
  <div class="card" style="border-color:rgba(192,57,43,0.4);">
    <div class="ctitle" style="color:rgba(192,57,43,0.7);" data-t="lost_title"></div>
    <div style="display:flex;align-items:flex-start;gap:10px;font-size:13px;line-height:1.6;">
      <span style="font-size:22px;flex-shrink:0;">🏃</span>
      <div data-t="lost_body"></div>
    </div>
  </div>
  <div class="card" style="border-color:rgba(232,197,58,0.35);">
    <div class="ctitle" style="color:rgba(232,197,58,0.6);" data-t="citwatch_title"></div>
    <div style="display:flex;align-items:flex-start;gap:10px;font-size:13px;line-height:1.6;">
      <span style="font-size:22px;flex-shrink:0;">📢</span>
      <div data-t="citwatch_body"></div>
    </div>
  </div>
</div>

<!-- STRATEGIES -->
<div class="row2">
  <div class="card">
    <div class="ctitle" data-t="strat1_title"></div>
    <div class="ws-target-row">
      <div class="ws-t-node wst-go"><div class="wst-icon">🏭</div><div class="wst-badge" data-t="take"></div></div>
      <div class="ws-t-node wst-skip"><div class="wst-icon">🏭</div><div class="wst-badge" data-t="skip"></div></div>
      <div class="ws-t-node wst-go"><div class="wst-icon">🏭</div><div class="wst-badge" data-t="take"></div></div>
    </div>
    <div class="ws-reasoning" data-t="strat1_body"></div>
  </div>

  <div class="card">
    <div class="ctitle" data-t="strat2_title"></div>
    <div class="opp-row">
      <div class="opp-side opp-bad">
        <div class="opp-icon">⚔️⏳</div>
        <div class="opp-lbl" data-t="opp_bad_lbl"></div>
        <div class="opp-val">–500 pts/s</div>
        <div class="opp-sub" data-t="opp_bad_sub"></div>
      </div>
      <div class="vs-mid" data-t="vs"></div>
      <div class="opp-side opp-good">
        <div class="opp-icon">🏭⏱️</div>
        <div class="opp-lbl" data-t="opp_good_lbl"></div>
        <div class="opp-val">+500 pts/s</div>
        <div class="opp-sub" data-t="opp_good_sub"></div>
      </div>
    </div>
    <div class="opp-warning" data-t="strat2_body"></div>
  </div>
</div>

<!-- ADDENDUM -->
<div class="divider"><div class="div-label" data-t="addendum_label"></div></div>

<div class="card">
  <div class="ctitle" data-t="cit_title"></div>
  <p style="font-size:12px;color:var(--dim);margin-bottom:14px;text-align:center;" data-t="cit_intro"></p>

  <div class="cit-panels">
    <div class="cit-panel panel-ours">
      <div class="cit-panel-title" data-t="our_map"></div>
      <div class="cit-row">
        <div class="cit-tri"><svg viewBox="0 0 36 32" xmlns="http://www.w3.org/2000/svg"><polygon points="18,2 34,30 2,30" fill="rgba(58,123,213,0.22)" stroke="#3a7bd5" stroke-width="2" stroke-linejoin="round"/></svg></div>
        <div class="cit-row-text">
          <div class="cit-row-name" style="color:#7aadff" data-t="col_blue"></div>
          <div class="cit-row-desc" data-t="our_blue_desc"></div>
          <span class="cit-row-action act-reinforce" data-t="act_reinforce"></span>
        </div>

let currentLang = 'en';

function setLang(lang) {
  currentLang = lang;
  const strings = T[lang];
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    if (strings[key] !== undefined) el.innerHTML = strings[key];
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase() === lang || (lang === 'ko' && btn.textContent === '한국어'));
  });
  document.documentElement.lang = lang;
}

// Init with English
setLang('en');
