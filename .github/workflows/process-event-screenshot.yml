name: Process Event Screenshot

on:
  issues:
    types: [opened]

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'event-submission')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk

      - name: Extract image URLs from issue body
        id: images
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const imagePattern = /!\[.*?\]\((.*?)\)|<img[^>]+src="([^"]+)"/g;
            const urls = [];
            let match;
            while ((match = imagePattern.exec(body)) !== null) {
              urls.push(match[1] || match[2]);
            }
            core.setOutput('urls', JSON.stringify(urls));
            core.setOutput('count', urls.length);

      - name: Determine event type from title
        id: event
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const types = ['wonders', 'dawns', 'gee', 'kvk', 'deserts', 'tmg'];
            const found = types.find(t => title.includes(t)) || 'unknown';
            core.setOutput('type', found);

      - name: Process screenshots with Claude
        id: extract
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IMAGE_URLS: ${{ steps.images.outputs.urls }}
          EVENT_TYPE: ${{ steps.event.outputs.type }}
        run: node scripts/process-screenshot.js

      - name: Commit updated data
        run: |
          git config user.name "AoEM Bot"
          git config user.email "bot@era8.local"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ${{ steps.event.outputs.type }} data from issue #${{ github.event.issue.number }}"
            git push
          fi

      - name: Label as failed on error
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['processing-failed']
            });

      - name: Comment on issue with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = 'Processing complete.';
            try {
              summary = fs.readFileSync('/tmp/processing-summary.txt', 'utf8');
            } catch (e) {}
            const failed = '${{ job.status }}' !== 'success';
            const suffix = failed ? '\n\n_Will retry automatically every 6 hours._' : '';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Event Processing Results\n\n${summary}${suffix}\n\n---\n_Processed automatically by Era8 Bot_`
            });
